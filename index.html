          ${e.fases.map(fa => `
            <div class="ef-fase">
              <div class="ef-fase-head"><span class="ef-fase-n">${escapeHtml(fa.n)}</span><span class="ef-fase-min">${escapeHtml(fa.min)}</span></div>
              <h4 class="ef-fase-titulo">${escapeHtml(fa.titulo)}</h4>
              <p class="ef-fase-texto">${escapeHtml(fa.texto)}</p>
              ${fa.herramientas && fa.herramientas !== '—' ? `<p class="ef-fase-herr">${escapeHtml(fa.herramientas)}</p>` : ''}
            </div>`).join('')}
        </div>
      </div>`;

    const g = e.giros;
    $('#ef-giros').innerHTML = g ? `
      <div class="ef-bloque ef-giros-bloque">
        <p class="ef-lbl">${escapeHtml(g.titulo)}</p>
        <p class="ef-giros-intro">${md(g.intro)}</p>
        <div class="ef-cartas">
          ${g.cartas.map(c => `<div class="ef-carta"><span class="ef-carta-t">${escapeHtml(c.t)}</span><span class="ef-carta-x">${escapeHtml(c.x)}</span></div>`).join('')}
        </div>
      </div>` : '';

    const en = e.entrega;
    $('#ef-entrega').innerHTML = en ? `
      <div class="ef-bloque">
        <p class="ef-lbl">${escapeHtml(en.titulo)}</p>
        <ul class="ef-lista">${en.puntos.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
      </div>` : '';

    const r = e.rubrica;
    $('#ef-rubrica').innerHTML = r ? `
      <div class="ef-bloque">
        <p class="ef-lbl">${escapeHtml(r.titulo)}</p>
        <div class="ef-rubrica">
          ${r.items.map(it => `<div class="ef-crit"><span class="ef-crit-c">${escapeHtml(it.c)}</span><span class="ef-crit-x">${escapeHtml(it.x)}</span></div>`).join('')}
        </div>
      </div>` : '';

    $('#ef-cierre').textContent = e.cierre || '';
  }

  function renderAnexoCoste() {
    const c = narr.anexo_coste;
    if (!c) return;
    $('#ac-tag').textContent = c.tag || 'Anexo';
    $('#ac-titulo').textContent = c.titulo;
    $('#ac-subtitulo').innerHTML = md(c.subtitulo);
    $('#ac-intro').innerHTML = `<p>${md(c.intro)}</p>`;

    $('#ac-tabla').innerHTML = `
      <p class="ac-lbl">Lo que pagas</p>
      <div class="ac-tabla">
        ${c.tabla.map(f => `
          <div class="ac-fila">
            <div class="ac-concepto">${escapeHtml(f.concepto)}</div>
            <div class="ac-rango">${escapeHtml(f.rango)}</div>
            <div class="ac-nota-fila">${escapeHtml(f.nota)}</div>
          </div>`).join('')}
      </div>`;

    $('#ac-oculto').innerHTML = `
      <p class="ac-lbl">El coste que no se ve</p>
      <ul class="ac-lista">${c.oculto.map(x => `<li>${md(x)}</li>`).join('')}</ul>`;

    $('#ac-roi').innerHTML = `
      <p class="ac-lbl">Cómo justificarlo</p>
      <ul class="ac-lista">${c.roi.map(x => `<li>${md(x)}</li>`).join('')}</ul>`;

    $('#ac-regla').textContent = c.regla;
    $('#ac-nota').textContent = c.nota;
  }

  /* ---------- Casos: abrir ámbito, expandir caso ---------- */

  function abrirAmbito(id, casoId) {
    const a = datos.ambitos.find(x => x.id === Number(id));
    if (!a) return;
    ambitoActivo = a;

    numeroAmbito.textContent = a.numero;
    tituloAmbito.textContent = a.nombre;
    descAmbito.textContent   = a.descripcion;
    crumbAmbito.textContent  = `${a.numero} · ${a.nombre}`;

    const hiloFase = narr.hilo?.fases?.[a.numero];
    const ambitoHilo = $('#ambito-hilo');
    if (ambitoHilo) {
      if (hiloFase) {
        ambitoHilo.hidden = false;
        ambitoHilo.innerHTML = `<span class="ambito-hilo-lbl">${escapeHtml(narr.hilo.fase_lbl)}</span>${escapeHtml(hiloFase)}`;
      } else {
        ambitoHilo.hidden = true;
        ambitoHilo.innerHTML = '';
      }
    }

    gridCasos.innerHTML = a.casos.map(renderCasoCard).join('');
    cambiarVista('casos');

    // Si viene un caso concreto (desde Ejercicios), lo abrimos.
    if (casoId) {
      const card = gridCasos.querySelector(`.card-caso[data-caso="${casoId}"]`);
      if (card) toggleCaso(card);
    }
  }

  function renderCasoCard(caso) {
    const destacado = caso.destacado
      ? `<span class="badge-destacado" title="Caso a desarrollar en clase">★ Caso en clase</span>`
      : '';
    return `
      <article class="card-caso${caso.destacado ? ' card-caso--destacado' : ''}" data-caso="${caso.id}" role="listitem">
        <button class="caso-toggle" aria-expanded="false" aria-label="Ver caso ${caso.id}">
          <div class="caso-meta">
            <span class="caso-numero">${caso.id}</span>
            <span class="pill">${escapeHtml(caso.herramienta)}</span>
            ${destacado}
          </div>
          <h3 class="caso-titulo">${escapeHtml(caso.titulo)}</h3>
          <p class="caso-descripcion">${escapeHtml(caso.descripcion)}</p>
          <div class="caso-etiquetas">${chipsCaso(caso)}</div>
        </button>
      </article>
    `;
  }

  function renderDetalleCaso(caso) {
    const pasosHtml = caso.pasos.map(paso => {
      const encontrado = extraerPrompt(paso);
      if (encontrado) {
        const intro = encontrado.intro
          ? `<p class="paso-texto">${escapeHtml(encontrado.intro)}:</p>`
          : '';
        return `
          <li>
            <div>
              ${intro}
              <div class="paso-prompt" data-prompt="${escapeHtml(encontrado.prompt)}">${escapeHtml(encontrado.prompt)}<button class="btn-copiar" type="button">Copiar</button></div>
            </div>
          </li>`;
      }
      return `<li><p class="paso-texto">${escapeHtml(paso)}</p></li>`;
    }).join('');

    const advertenciaHtml = caso.advertencia
      ? `<div class="detalle-seccion">
           <div class="aviso-caso">
             <p class="aviso-etiqueta">Advertencia</p>
             <p class="aviso-texto">${escapeHtml(caso.advertencia)}</p>
           </div>
         </div>`
      : '';

    const art = artefactos[caso.id];
    const demoHtml = art
      ? `<div class="detalle-seccion detalle-artefacto">
           <p class="detalle-etiqueta detalle-etiqueta--demo">★ Caso para trabajar en clase</p>
           <p class="artefacto-reto">${escapeHtml(art.reto)}</p>
           <button class="artefacto-cta" type="button" data-descargar-artefacto="${caso.id}">
             <span class="artefacto-cta-icono" aria-hidden="true">↓</span>
             <span class="artefacto-cta-texto">
               <span class="artefacto-cta-titulo">Descargar ${escapeHtml(art.nombre)}</span>
               <span class="artefacto-cta-sub">${escapeHtml(art.descripcion)}</span>
             </span>
           </button>
         </div>`
      : '';

    return `
      <button class="btn-cerrar-flotante" type="button" aria-label="Cerrar caso">×</button>
      <div class="caso-detalle">
        ${demoHtml}
        ${advertenciaHtml}
        <div class="detalle-seccion">
          <p class="detalle-etiqueta">Input que necesita la IA</p>
          <div class="bloque-input">${escapeHtml(caso.input)}</div>
        </div>
        <div class="detalle-seccion">
          <p class="detalle-etiqueta">Cómo se hace</p>
          <ol class="pasos">${pasosHtml}</ol>
        </div>
        <button class="btn-cerrar-caso" type="button">← Cerrar caso</button>
      </div>
    `;
  }

  function toggleCaso(cardEl) {
    const id = cardEl.dataset.caso;
    const caso = ambitoActivo.casos.find(c => c.id === id);
    if (!caso) return;

    if (cardEl.classList.contains('abierta')) {
      cerrarCaso(cardEl);
      return;
    }
    const abiertaPrev = gridCasos.querySelector('.card-caso.abierta');
    if (abiertaPrev) cerrarCaso(abiertaPrev);

    cardEl.insertAdjacentHTML('beforeend', renderDetalleCaso(caso));
    cardEl.classList.add('abierta');
    cardEl.querySelector('.caso-toggle').setAttribute('aria-expanded', 'true');

    requestAnimationFrame(() => {
      const y = cardEl.getBoundingClientRect().top + window.scrollY - 40;
      window.scrollTo({ top: Math.max(y, 0), behavior: 'smooth' });
    });
  }

  function cerrarCaso(cardEl) {
    cardEl.classList.remove('abierta');
    cardEl.querySelector('.caso-toggle').setAttribute('aria-expanded', 'false');
    const detalle = cardEl.querySelector('.caso-detalle');
    if (detalle) detalle.remove();
    const flot = cardEl.querySelector('.btn-cerrar-flotante');
    if (flot) flot.remove();
  }

  function cambiarVista(nombre) {
    vistaActiva = nombre;
    vistaAmbitos.hidden    = nombre !== 'ambitos';
    vistaCasos.hidden      = nombre !== 'casos';
    btnVolver.hidden       = nombre === 'ambitos';
    if (nombre === 'ambitos') {
      const target = document.querySelector('#casos');
      if (target) target.scrollIntoView({ block: 'start', behavior: 'instant' in window ? 'instant' : 'auto' });
    } else {
      window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
    }
  }

  function volverAAmbitos() {
    ambitoActivo = null;
    gridCasos.innerHTML = '';
    cambiarVista('ambitos');
  }

  // Descarga el artefacto real (PDF/XLSX/PNG) embebido en base64.
  function descargarArtefacto(casoId) {
    const art = artefactos[casoId];
    if (!art || !art.b64) return;
    const bin = atob(art.b64);
    const bytes = new Uint8Array(bin.length);
    for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    const blob = new Blob([bytes], { type: art.mime || 'application/octet-stream' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = art.nombre || `artefacto-${casoId}`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  /* ---------- Eventos ---------- */

  gridAmbitos.addEventListener('click', e => {
    const card = e.target.closest('.card-ambito');
    if (card) abrirAmbito(card.dataset.ambito);
  });

  gridCasos.addEventListener('click', e => {
    if (e.target.closest('.btn-cerrar-caso') || e.target.closest('.btn-cerrar-flotante')) {
      const card = e.target.closest('.card-caso');
      if (card) cerrarCaso(card);
      return;
    }
    const dlArte = e.target.closest('[data-descargar-artefacto]');
    if (dlArte) {
      e.stopPropagation();
      descargarArtefacto(dlArte.dataset.descargarArtefacto);
      return;
    }
    const btnCopiar = e.target.closest('.btn-copiar');
    if (btnCopiar) {
      e.stopPropagation();
      copiarPrompt(btnCopiar);
      return;
    }
    if (e.target.closest('.caso-toggle')) {
      const card = e.target.closest('.card-caso');
      if (card) toggleCaso(card);
    }
  });

  // Descarga de artefactos (maquinillos, instrucciones) en la sección Herramientas propias.
  document.querySelector('#artefactos')?.addEventListener('click', e => {
    const b = e.target.closest('[data-descargar-artefacto]');
    if (b) descargarArtefacto(b.dataset.descargarArtefacto);
  });

  // Descarga del artefacto de arranque en el ejercicio final.
  document.querySelector('#ejercicio-final')?.addEventListener('click', e => {
    const b = e.target.closest('[data-descargar-artefacto]');
    if (b) descargarArtefacto(b.dataset.descargarArtefacto);
  });

  // Descarga de la guía de los 8 casos (bloque 04).
  document.querySelector('#casos-guia')?.addEventListener('click', e => {
    const b = e.target.closest('[data-descargar-artefacto]');
    if (b) descargarArtefacto(b.dataset.descargarArtefacto);
  });

  function copiarPrompt(btnCopiar) {
    const bloque = btnCopiar.closest('.paso-prompt');
    const prompt = bloque?.dataset.prompt;
    if (!prompt) return;
    navigator.clipboard?.writeText(prompt).then(() => {
      const original = btnCopiar.textContent;
      btnCopiar.textContent = 'Copiado ✓';
      setTimeout(() => (btnCopiar.textContent = original), 1600);
    });
  }

  btnVolver.addEventListener('click', volverAAmbitos);
  crumbInicio.addEventListener('click', e => { e.preventDefault(); volverAAmbitos(); });

  // Vídeos: carga diferida al hacer click (sustituye la tarjeta por el iframe)
  document.addEventListener('click', e => {
    const card = e.target.closest('.video-card');
    if (!card || card.classList.contains('cargado')) return;
    const id = card.dataset.yt;
    if (!id) return;
    const start = card.dataset.start;
    const watch = `https://www.youtube.com/watch?v=${encodeURIComponent(id)}${start ? `&t=${encodeURIComponent(start)}s` : ''}`;
    // En file:// (standalone abierto con doble clic) YouTube bloquea el embed → abrir directo.
    if (location.protocol === 'file:') { window.open(watch, '_blank', 'noopener'); return; }
    card.classList.add('cargado');
    let src = `https://www.youtube-nocookie.com/embed/${encodeURIComponent(id)}?autoplay=1&rel=0`;
    if (start) src += `&start=${encodeURIComponent(start)}`;
    if (card.dataset.end) src += `&end=${encodeURIComponent(card.dataset.end)}`;
    card.innerHTML = `<div class="video-frame"><iframe src="${src}" title="Vídeo" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>
      <a class="video-fallback" href="${watch}" target="_blank" rel="noopener">¿No se ve? Ábrelo en YouTube ↗</a>`;
  });

  document.addEventListener('keydown', e => {
    if (e.key !== 'Escape') return;
    const abierta = gridCasos.querySelector('.card-caso.abierta');
    if (abierta) { cerrarCaso(abierta); return; }
    if (vistaActiva !== 'ambitos') volverAAmbitos();
  });

  cargar();
})();

  </script>
</body>
</html>
