 omisiones.'", "Pide un análisis de riesgos: 'qué partidas parecen sospechosamente baratas y podrían generar sobrecostes en obra'.", "Solicita recomendación argumentada: 'si tuvieras que elegir uno, cuál y por qué. Justifica con datos, no con precio'.", "Cierra pidiendo un email de aclaración a cada industrial con las dudas concretas detectadas."], "riesgo": "medio", "madurez": "intermedio", "destacado": true}, {"id": "3.10", "titulo": "Fichas técnicas para el industrial", "herramienta": "Claude", "descripcion": "Genera fichas técnicas claras y completas de piezas a medida (ebanistería, cerrajería, tapicería) que reducen malentendidos con el industrial y aceleran la fabricación.", "input": "Boceto o descripción de la pieza + material y acabado deseado.", "pasos": ["Describe la pieza con el máximo detalle disponible: 'Mesa a medida para restaurante. Roble macizo, 240x90x75 cm, patas cónicas de acero negro mate 40x40 mm, canto biselado 5 mm, acabado aceite natural mate, uso intenso'.", "Lanza el prompt: 'Redacta la ficha técnica completa de esta pieza para enviar al ebanista. Incluye: descripción, dimensiones exactas con tolerancias admisibles, materiales con referencia comercial, herrajes, acabado con muestra a validar, plazo estimado, condiciones de entrega y montaje, garantía, precio acordado.'", "Sube un boceto o imagen de referencia y pide que la integre describiéndola.", "Pide una versión reducida en 1 página para imprimir y firmar.", "Cierra con: 'redacta el email profesional al ebanista con esta ficha adjunta'."], "riesgo": "bajo", "madurez": "basico"}]}, {"id": 4, "numero": "04", "nombre": "Documental / Administrativo", "descripcion": "Memorias, pliegos, actas, base de conocimiento y entregables. Documentación que consume horas y que la IA acelera radicalmente.", "casos": [{"id": "4.1", "titulo": "Redacción de memorias descriptivas", "herramienta": "Claude", "descripcion": "Redacta y estructura la memoria del proyecto a partir de notas, datos y plantillas previas, manteniendo tono técnico coherente.", "input": "Notas sueltas del proyecto + plantilla o memoria anterior de referencia.", "pasos": ["Sube una memoria anterior del estudio como referencia de tono y estructura.", "Sube las notas, datos técnicos y decisiones del proyecto actual.", "Lanza el prompt: 'Redacta la memoria descriptiva del proyecto adjunto siguiendo la estructura y tono de la memoria de referencia. Estructura por apartados: introducción, contexto, propuesta, materiales, instalaciones, presupuesto orientativo.'", "Pide revisión de cada apartado con foco distinto: 'ahora revisa la memoria buscando repeticiones y palabras huecas'.", "Cierra pidiendo la versión final limpia con formato listo para exportar a Word."], "riesgo": "bajo", "madurez": "basico"}, {"id": "4.2", "titulo": "Elaboración de pliegos de condiciones", "herramienta": "Claude", "descripcion": "Genera borradores de pliegos técnicos y administrativos a partir de las características del proyecto y de pliegos tipo.", "input": "Descripción del proyecto + pliego tipo o anterior del estudio.", "pasos": ["Sube un pliego anterior del estudio como plantilla.", "Describe el proyecto actual con sus particularidades.", "Lanza el prompt: 'Genera el pliego de condiciones para este proyecto usando la plantilla adjunta. Adapta las partidas al alcance real: [enumera partidas específicas]. Incluye calidades, marcas de referencia y criterios de aceptación.'", "Pide revisión partida a partida marcando dudas o inconsistencias.", "Cierra con: 'lista las partidas de la plantilla que NO aplican a este proyecto para poder eliminarlas del documento final'."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "4.3", "titulo": "Resumen de documentación técnica", "herramienta": "Google NotebookLM", "descripcion": "Sintetiza informes, estudios geotécnicos, normativas o documentación de fabricantes en puntos clave para identificar rápidamente lo que afecta al proyecto.", "input": "PDFs de la documentación técnica.", "pasos": ["Sube todos los PDFs a un nuevo notebook en NotebookLM.", "Lanza el prompt inicial: 'Resúmeme cada documento en 5 puntos clave. Después indícame qué información afecta directamente a un proyecto de interiorismo de [tipo]'.", "Haz preguntas específicas: 'qué dice el geotécnico sobre humedades' o 'qué exige la normativa acústica para restauración'.", "Pide referencias cruzadas: 'qué contradicciones o solapes existen entre estos documentos'.", "Cierra generando un audio-resumen en NotebookLM para escuchar el briefing en el coche."], "riesgo": "bajo", "madurez": "basico"}, {"id": "4.4", "titulo": "Actas de reunión automáticas", "herramienta": "Descript", "descripcion": "Transcribe reuniones con cliente, equipo o dirección de obra y genera actas con acuerdos, decisiones y tareas pendientes.", "input": "Audio de la reunión (grabación o en vivo).", "pasos": ["Graba la reunión con Descript (o súbele el audio); transcribe automáticamente.", "Con la transcripción lista, pide el resumen: 'Genera un acta con participantes, temas tratados, decisiones tomadas, tareas asignadas con responsable y plazo, y próximos pasos.'", "Refina pidiendo destacar solo las decisiones vinculantes tomadas en la reunión.", "Pide una versión ejecutiva de 5 líneas para quien no estuvo presente.", "Exporta el acta y guárdala en el expediente del proyecto."], "riesgo": "bajo", "madurez": "basico"}, {"id": "4.5", "titulo": "Biblioteca de prompts y procesos del estudio", "herramienta": "Claude, ChatGPT, Google Drive", "descripcion": "Crea una biblioteca interna de prompts, plantillas y procesos reutilizables por fase del proyecto para que el estudio trabaje de forma más consistente. Convierte la IA en sistema de trabajo, no en trucos sueltos.", "input": "Fases del proceso del estudio, ejemplos de prompts que ya funcionan, plantillas de emails, memorias, actas, propuestas y checklists.", "pasos": ["Divide el proceso del estudio por fases: captación, briefing, concepto, anteproyecto, presupuesto, ejecución, obra, entrega y post-ocupación.", "Lanza el prompt: 'Actúa como responsable de operaciones del estudio. Para cada fase del proceso, propón 2-3 prompts útiles con nombre corto y objetivo claro. Incluye para cada uno: cuándo usarlo, qué input mínimo necesita, qué output debe generar y qué criterio usar para revisarlo.'", "Añade a la biblioteca las plantillas ya existentes del estudio (emails, actas, briefings, propuestas, checklists) con una descripción de cuándo y cómo se usan.", "Organiza todo en una base consultable por el equipo (Drive, correo, carpetas del estudio). Cada entrada debe tener: título, fase, tipo (prompt/plantilla/checklist), input, output esperado, riesgo.", "Nombra un responsable de mantenimiento y define una cadencia mensual de revisión (qué se ha usado, qué falta, qué ya no aplica).", "Cierra con una guía de uso de 1 página para nuevos miembros del estudio: cómo buscar en la biblioteca, cómo proponer un nuevo prompt y cómo reportar uno que no funcione."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "4.6", "titulo": "Welcome pack y onboarding de cliente nuevo", "herramienta": "Claude, ChatGPT o Canva", "descripcion": "Crea un paquete de bienvenida para clientes que acaban de contratar el estudio, explicando fases, calendario, entregables, canales de comunicación, responsabilidades y reglas del proceso. Profesionaliza la relación desde el primer día y reduce malentendidos.", "input": "Propuesta aceptada, fases del proyecto, calendario, entregables, equipo, forma de trabajo y dudas frecuentes de clientes anteriores.", "pasos": ["Resume el alcance contratado, las fases del proyecto y el calendario aprobado.", "Lanza el prompt: 'Actúa como responsable de experiencia de cliente en un estudio de interiorismo. Estructura un welcome pack claro y visual para un cliente residencial que acaba de firmar. Cubre: qué recibirá en cada fase, qué debe aportar el cliente, cuándo se toman las decisiones críticas y cómo se comunican cambios.'", "Añade una sección de normas sanas de trabajo: canales oficiales (email vs WhatsApp), tiempos de respuesta esperados en cada dirección, cómo se aprueban decisiones y cómo se gestionan cambios de alcance (enlaza con caso 7.1).", "Genera una sección de preguntas frecuentes cubriendo dudas típicas: retrasos, imprevistos, facturación, elección de materiales, visitas de obra.", "Pide una versión maquetable en Canva con el lenguaje gráfico del estudio: portada, índice, calendario visual, contactos, checklist de arranque.", "Cierra con una plantilla de email de envío del welcome pack tras la firma, y un guion de 10 minutos para presentarlo en la primera reunión de arranque."], "riesgo": "bajo", "madurez": "basico", "destacado": true}, {"id": "4.7", "titulo": "Redacción de correos profesionales", "herramienta": "Claude", "descripcion": "Genera borradores de correos a clientes, administraciones, propiedad o proveedores con el tono y nivel de formalidad adecuados.", "input": "Contexto del correo + relación con el destinatario + objetivo.", "pasos": ["Describe la situación a Claude: 'Tengo que decirle a un cliente particular que la obra se retrasa 3 semanas por un problema con el industrial de carpintería. Es exigente pero razonable, con buena relación.'", "Lanza el prompt: 'Redacta un correo que: (1) informe con claridad, (2) asuma responsabilidad sin autoflagelarse, (3) proponga solución, (4) mantenga la relación. Tono profesional, cercano, sin excusas.'", "Pide 3 variantes: una más directa, una más diplomática, una más breve.", "Solicita revisión de cada versión buscando frases que puedan sonar defensivas.", "Cierra pidiendo la respuesta más probable del cliente para poder preparar el siguiente paso."], "riesgo": "bajo", "madurez": "basico", "destacado": false}, {"id": "4.8", "titulo": "Manual de uso y mantenimiento para el cliente", "herramienta": "Claude o ChatGPT", "descripcion": "Genera un documento final de entrega con cuidados de materiales, limpieza, garantías, proveedores, iluminación, climatización, textiles, mobiliario y recomendaciones de uso. Aumenta el valor percibido del estudio y reduce problemas post-entrega.", "input": "Listado de materiales, fichas técnicas, proveedores, garantías y fotografías finales del proyecto.", "pasos": ["Reúne todos los materiales, acabados, luminarias, mobiliario y proveedores principales del proyecto en una tabla simple.", "Lanza el prompt: 'Actúa como interiorista responsable de la entrega. Redacta un manual de uso y mantenimiento para el cliente final (no técnico) organizado por estancia y por tipo de elemento (suelos, revestimientos, mobiliario, textiles, iluminación, climatización). Para cada elemento: cómo se limpia, con qué frecuencia, qué evitar, garantía, proveedor de contacto.'", "Pide un tono claro y cálido: 'reescribe con lenguaje cercano, sin jerga técnica, como si se lo explicaras al cliente en la entrega del proyecto'.", "Añade garantías, contactos de proveedores y recomendaciones estacionales de uso (por ejemplo, textiles en verano, madera en calefacción).", "Pide una versión visualmente elegante en Markdown lista para maquetar en el mismo lenguaje gráfico del estudio.", "Cierra con una checklist de entrega final firmable por el cliente (elementos recibidos, garantías entregadas, manual entregado)."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "4.9", "titulo": "Onboarding de nuevos empleados, becarios o colaboradores", "herramienta": "NotebookLM, Claude o ChatGPT", "descripcion": "Convierte documentación del estudio, proyectos anteriores, estructura de carpetas, estándares de entrega y procesos internos en un sistema de onboarding para nuevas incorporaciones. Usa IA para transferir cultura de estudio y reducir explicaciones repetidas.", "input": "Manual interno, estructura de carpetas, ejemplos de proyectos, plantillas, estándares gráficos, procesos, FAQs internos y criterios de calidad del estudio.", "pasos": ["Reúne documentos representativos del estudio: 2-3 memorias, 2-3 propuestas, plantillas de planos, guía gráfica, protocolo de nombrado de archivos, ejemplos de actas y correos.", "Sube todo a un notebook en NotebookLM o a un documento (o NotebookLM) y lanza el prompt: 'Actúa como responsable de onboarding. Extrae de estos documentos cómo trabaja el estudio: fases del proceso, estándares gráficos, tono de comunicación con cliente, nomenclatura de archivos, entregables típicos y errores frecuentes que evita el estudio.'", "Pide una guía de onboarding organizada por días o semanas: 'estructura las primeras 4 semanas de una nueva incorporación con objetivos claros, lecturas, plantillas a estudiar y pequeños ejercicios prácticos por semana'.", "Genera quizzes o ejercicios prácticos: 'crea 10 preguntas cortas para verificar que la persona ha entendido cómo se nombran archivos, cómo se estructura una memoria y cuál es el tono con cliente'.", "Añade una sección de 'cosas que siempre hacemos' y 'cosas que evitamos' con ejemplos concretos extraídos de los documentos.", "Cierra creando un asistente de preguntas frecuentes: sube toda la biblioteca a un chatbot interno (NotebookLM o Claude Project) para que nuevos miembros pregunten en lenguaje natural y obtengan respuestas basadas en documentos reales del estudio."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "4.10", "titulo": "Preparación de reuniones con cliente", "herramienta": "Claude o ChatGPT", "descripcion": "Prepara reuniones importantes definiendo objetivos, decisiones a cerrar, materiales que llevar, objeciones previsibles y guion de conversación. No solo se documenta después: se llega mejor preparado.", "input": "Estado del proyecto, fase actual, dudas abiertas, perfil del cliente y objetivo de la reunión.", "pasos": ["Resume el estado actual del proyecto en 5-8 líneas (fase, últimas decisiones, dudas abiertas, incidencias).", "Indica el objetivo de la reunión: 'cerrar decisión de paleta cromática', 'presentar 3 alternativas de zonificación', 'renegociar plazo por retraso de industrial'.", "Lanza el prompt: 'Actúa como coach comercial. Diseña una agenda de 45 min para esta reunión con este cliente. Marca en cada bloque qué decisión hay que cerrar, qué material necesito llevar (renders, moodboard, presupuesto) y qué frase clave usaría para abrir cada tema.'", "Pide anticipación de objeciones: 'previendo el perfil de cliente que te describí, dame 5 objeciones que planteará y la respuesta ideal preparada para cada una'.", "Solicita el email de convocatoria previo a la reunión con la agenda resumida y los materiales adjuntos, para que el cliente llegue con expectativas alineadas.", "Cierra con una checklist personal de últimos preparativos (imprimir, cargar dispositivos, muestras físicas)."], "riesgo": "bajo", "madurez": "basico"}]}, {"id": 5, "numero": "05", "nombre": "Legal / Normativo", "descripcion": "Cumplimiento, licencias, contratos y sostenibilidad. La IA como primer filtro y preparación para el especialista, nunca como validación definitiva.", "casos": [{"id": "5.1", "titulo": "Pre-chequeo normativo del proyecto", "herramienta": "Claude", "descripcion": "Revisa memoria, planos y normativa aplicable para detectar posibles puntos críticos antes de consultar con técnico competente, administración o especialista.", "input": "Memoria y planos del proyecto + PDFs de normativa aplicable.", "pasos": ["Sube memoria, planos y normativa aplicable a Claude.", "Lanza el prompt: 'Actúa como técnico municipal. Revisa este proyecto contra el CTE DB-SUA y la ordenanza municipal adjunta. Detecta posibles incumplimientos con referencia al artículo exacto, ubicación en el proyecto y propuesta de corrección. Marca los puntos donde tengas dudas y no puedas afirmar con certeza.'", "Pide priorización por gravedad (bloqueante vs subsanable) y separa hallazgos ciertos de hipótesis.", "Solicita ejemplos de cómo se han resuelto incumplimientos similares en proyectos publicados.", "Cierra con: posibles incumplimientos, artículos a verificar, dudas abiertas, preguntas concretas para el técnico o el ayuntamiento."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "Usar como primera revisión o preparación de preguntas, no como validación definitiva. Requiere verificación con técnico competente antes de licencia."}, {"id": "5.2", "titulo": "Preparación de preconsulta de licencia de actividad", "herramienta": "Claude", "descripcion": "Resume normativa municipal y requisitos de actividad para preparar una preconsulta informada con el ayuntamiento o gestor de licencias.", "input": "Normativa municipal en PDF + descripción del local y actividad.", "pasos": ["Sube la normativa municipal aplicable a Claude.", "Lanza el prompt: 'Voy a montar un restaurante con cocina y terraza en [dirección]. En lenguaje claro: qué licencias podrían aplicarme, qué documentación previsiblemente pedirán, qué plazos manejar y qué banderas rojas anticipar. Cita artículo por afirmación. Marca los puntos donde solo puedas hipotetizar.'", "Pide simulación de casos: 'qué pasa si el local tuviera altura libre inferior a 2,50 m'.", "Solicita las 5 preguntas más importantes que debería hacer en preconsulta al ayuntamiento.", "Pide una lista de documentación técnica que probablemente te pedirán para tener lista antes de la preconsulta.", "Cierra pidiendo un email tipo para solicitar preconsulta municipal con toda la información relevante."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "No afirma que una licencia sea segura. Prepara preguntas y documentación para la preconsulta municipal con técnico o gestor. Usar como primera revisión o preparación de preguntas, no como validación definitiva.", "destacado": true}, {"id": "5.3", "titulo": "Revisión de contratos", "herramienta": "Claude", "descripcion": "Analiza contratos de encargo, obra o colaboración con industriales para detectar cláusulas de riesgo, ambigüedades o términos desequilibrados como preparación a la revisión con abogado.", "input": "Contrato en PDF.", "pasos": ["Sube el contrato a Claude.", "Lanza el prompt: 'Actúa como abogado especializado en contratos de arquitectura e interiorismo. Revisa este contrato desde la perspectiva del interiorista. Enumera: cláusulas de riesgo, ambigüedades, términos desequilibrados, plazos imposibles, penalizaciones desproporcionadas. Para cada uno: qué cambiar y cómo redactarlo.'", "Pide simulación: 'qué pasaría si el proyecto se retrasa 2 meses según este contrato'.", "Solicita las 5 cláusulas más críticas para negociar antes de firmar.", "Cierra con: 'redacta un email al cliente proponiendo estas modificaciones con tono profesional pero firme, indicando que la versión definitiva la validará el abogado del estudio'."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "Usar como primera revisión o preparación de preguntas, no como validación definitiva. Consulta siempre con abogado antes de firmar."}, {"id": "5.4", "titulo": "Redacción de cláusulas y documentos", "herramienta": "Claude", "descripcion": "Genera borradores de cláusulas contractuales, hojas de encargo o acuerdos a partir de plantillas y del caso concreto, para revisar después con asesor legal.", "input": "Contexto del acuerdo + plantillas anteriores del estudio.", "pasos": ["Sube plantillas anteriores como referencia.", "Describe el caso a Claude: 'Encargo de proyecto y dirección de obra de vivienda unifamiliar. Cliente particular. Honorarios por porcentaje. Plazo 6 meses. Cuatro fases con hitos de facturación.'", "Lanza el prompt: 'Redacta la hoja de encargo completa siguiendo la plantilla adjunta. Incluye: objeto, alcance por fases, honorarios y forma de pago, plazos, obligaciones, resolución de conflictos, protección de datos. Marca cláusulas donde recomiendes revisión legal.'", "Pide 3 variantes de la cláusula de honorarios: porcentaje, tanto alzado, mixta.", "Solicita revisión con foco: 'qué protege al estudio en caso de que el cliente cancele a mitad del proyecto'.", "Cierra con la nota de que el documento debe ser revisado por asesor legal antes de firmar."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "Los borradores deben ser revisados por asesor legal antes de usarse contractualmente. Usar como primera revisión o preparación de preguntas, no como validación definitiva."}, {"id": "5.5", "titulo": "Guía de tramitación de licencias", "herramienta": "Perplexity", "descripcion": "Orienta sobre pasos, documentación y plazos para licencias de obra, actividad inocua, actividad calificada o cambio de uso según municipio.", "input": "Municipio + tipo de actuación.", "pasos": ["Define la actuación con precisión: 'Reforma integral de un local en planta baja del Eixample (Barcelona) para restaurante con cocina, sin ampliación de superficie ni cambio estructural'.", "Lanza el prompt: 'Guíame paso a paso en la tramitación de licencias necesarias en Barcelona para este proyecto. Enumera: qué licencias solicitar, orden, documentación técnica exigida, plazos previstos, tasas municipales aproximadas y errores frecuentes. Advierte si algún dato podría estar desactualizado.'", "Pide enlaces directos a los formularios y sedes electrónicas del ayuntamiento.", "Solicita simulación de plazos totales del proceso completo con hitos.", "Cierra pidiendo un checklist descargable para no olvidar ningún paso y confirma siempre con la administración."], "riesgo": "alto", "madurez": "intermedio", "advertencia": "Los plazos, tasas y requisitos cambian por municipio y año. Verifica siempre con la administración competente antes de presentar."}, {"id": "5.6", "titulo": "Benchmarking de sostenibilidad", "herramienta": "Claude", "descripcion": "Compara el proyecto con estándares como WELL, LEED ID+C, BREEAM o Cradle to Cradle para identificar qué criterios cumple y qué falta para certificar, como orientación previa a consultor acreditado.", "input": "Memoria del proyecto + estándar de referencia en PDF.", "pasos": ["Sube memoria del proyecto y el estándar (ej. WELL v2) a Claude.", "Lanza el prompt: 'Compara este proyecto con WELL v2. Para cada categoría (aire, agua, luz, comodidad, mente, comunidad): qué puntos parece cumplir, cuáles podría cumplir con ajustes menores, cuáles serían inalcanzables. Estima puntuación total y nivel de certificación posible. Marca las asunciones que estás haciendo.'", "Pide priorización coste-beneficio: 'qué mejoras dan más puntos por menos esfuerzo'.", "Solicita comparativa entre WELL, LEED y BREEAM para tu tipo de proyecto.", "Cierra pidiendo un argumentario para presentar al cliente el valor de certificar y avísale de que la certificación real requiere consultor acreditado."], "riesgo": "medio", "madurez": "avanzado", "advertencia": "La estimación de puntuación es orientativa. La certificación real requiere consultor acreditado y verificación en obra."}, {"id": "5.7", "titulo": "Checklist preliminar de accesibilidad", "herramienta": "Claude", "descripcion": "Comprueba de forma orientativa itinerarios, anchos, aseos, mecanismos, mostradores y señalización para detectar puntos críticos antes de la revisión técnica definitiva.", "input": "Planos del proyecto + normativa de accesibilidad aplicable.", "pasos": ["Sube planos y normativa (DB-SUA + normativa autonómica) a Claude.", "Lanza el prompt: 'Verifica el cumplimiento preliminar de accesibilidad de este proyecto. Comprueba: itinerarios accesibles, anchos de paso, aseos adaptados, mostradores, alturas de mecanismos, señalización, plazas reservadas. Enumera posibles incumplimientos con ubicación en plano y propuesta de corrección. Marca los puntos donde solo puedas hipotetizar.'", "Pide un diagrama esquemático de los itinerarios accesibles del proyecto.", "Solicita revisión preliminar de la señalización propuesta con criterios DALCO.", "Cierra con: 'redacta un borrador del apartado de justificación de accesibilidad para la memoria del proyecto, pendiente de validación por técnico competente'."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "Checklist orientativo. La verificación de accesibilidad definitiva la firma un técnico competente. Usar como primera revisión o preparación de preguntas, no como validación definitiva."}, {"id": "5.8", "titulo": "Un pliego o una normativa como base de conocimiento navegable", "herramienta": "NotebookLM", "descripcion": "Sube el pliego de un concurso o una normativa extensa y conviértelo en una fuente a la que preguntar, con respuestas citadas al propio texto.", "input": "El PDF del pliego, la ordenanza o la normativa aplicable (uno o varios documentos).", "pasos": ["Crea un cuaderno en NotebookLM y sube el pliego o la normativa como fuentes (admite varios documentos a la vez).", "Pídele un resumen inicial: 'Hazme un mapa de este pliego: objeto, plazos, criterios de valoración, documentación exigida y requisitos técnicos.'", "Pregunta como si hablaras con un compañero: '¿Qué documentación gráfica piden y en qué formato?', '¿Hay superficie o presupuesto máximo?'. Cada respuesta viene con la cita al fragmento exacto.", "Pide una checklist de entregables con sus plazos para no dejarte nada.", "Contrasta siempre la respuesta con la cita al texto antes de darla por buena; NotebookLM responde solo desde tus fuentes, pero la lectura fina es tuya."], "riesgo": "medio", "madurez": "intermedio", "advertencia": "NotebookLM responde solo a partir de los documentos que subes; reduce la invención, pero no sustituye la lectura del pliego ni el criterio de un técnico. Verifica cada dato crítico en el texto citado."}, {"id": "5.9", "titulo": "Análisis de riesgos legales", "herramienta": "Claude", "descripcion": "Identifica posibles contingencias del proyecto o del contrato (responsabilidades, plazos, penalizaciones) para anticiparlas y consultarlas con un especialista.", "input": "Documentación del proyecto + contrato.", "pasos": ["Sube contrato, memoria y planos a Claude.", "Lanza el prompt: 'Actúa como consultor de riesgos legales. Analiza este proyecto y contrato. Identifica los 10 riesgos legales más probables (responsabilidad por defectos, plazos, terceros, garantías, subcontratación). Para cada uno: probabilidad, impacto, medida preventiva.'", "Pide una matriz de riesgos visual en formato tabla.", "Solicita para los riesgos altos: qué debe cubrir el seguro de responsabilidad civil.", "Cierra pidiendo las 5 preguntas concretas para llevar al abogado del estudio."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "Usar como preparación para una consulta con abogado del estudio. No sustituye asesoría legal profesional."}, {"id": "5.10", "titulo": "Revisión preliminar de RGPD para documentación del estudio", "herramienta": "ChatGPT", "descripcion": "Detecta posibles ausencias o incoherencias en cláusulas informativas, formularios, contratos y comunicaciones, preparando una revisión posterior con asesor legal.", "input": "Documentos, formularios y política del estudio.", "pasos": ["Sube contratos, formularios web, política del estudio a ChatGPT.", "Lanza el prompt: 'Revisa estos documentos contra el RGPD y la LOPD-GDD. Detecta: cláusulas informativas ausentes, tratamientos sin base legal clara, cesiones no declaradas, medidas de seguridad no documentadas. Propón textos de corrección. Marca lo que requiera validación legal.'", "Pide priorización por riesgo de sanción.", "Solicita textos exactos listos para pegar en cada documento, pendientes de validar con asesor legal.", "Cierra pidiendo un checklist anual de revisión RGPD adaptado al estudio."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "Los textos propuestos son borradores. Deben validarse con asesor legal antes de publicarse. Usar como primera revisión o preparación de preguntas, no como validación definitiva."}]}, {"id": 6, "numero": "06", "nombre": "Comercial", "descripcion": "Propuestas, presupuestos, negociación, honorarios y venta. Donde la IA se convierte en tu socio comercial.", "casos": [{"id": "6.1", "titulo": "Redacción de propuestas y ofertas", "herramienta": "Claude", "descripcion": "Genera borradores de propuestas técnicas y económicas adaptados al encargo, ahorrando tiempo en la parte repetitiva.", "input": "Datos del encargo + propuestas anteriores del estudio.", "pasos": ["Sube propuestas anteriores exitosas como plantilla.", "Describe el encargo actual: 'Reforma integral de vivienda 120 m² en Poblenou. Pareja joven con hijo. Presupuesto orientativo 150k€. Alcance: proyecto + dirección de obra + interiorismo. Plazo 8 meses.'", "Lanza el prompt: 'Redacta una propuesta completa siguiendo la estructura de las anteriores. Adáptala al perfil del cliente y al alcance. Incluye: introducción, entendimiento del encargo, metodología, fases, honorarios desglosados, plazos, referencias.'", "Pide 3 versiones con distinto tono: cálido, profesional-directo, editorial.", "Cierra con: 'sugiere qué imágenes o proyectos de referencia adjuntar para maximizar el impacto en este cliente'."], "riesgo": "bajo", "madurez": "basico"}, {"id": "6.2", "titulo": "Estimación por escenarios de presupuesto preliminar", "herramienta": "ChatGPT", "descripcion": "Construye una estimación inicial por partidas y escenarios —económico, medio y premium— usando supuestos explícitos, ratios y referencias del estudio cuando existan.", "input": "Datos del proyecto + histórico del estudio si existe.", "pasos": ["Describe el proyecto: 'Reforma vivienda 90 m² en Barcelona. Nivel medio-alto. Cocina y dos baños nuevos. Suelos, carpinterías, mobiliario a medida. Sin obra estructural.'", "Lanza el prompt: 'Actúa como responsable de presupuestos. Estima el presupuesto de ejecución material en 3 escenarios (económico, medio, premium) por partidas. Para cada uno: tabla partida-unidad-cantidad-precio unitario-subtotal, supuestos utilizados, partidas con más incertidumbre, rango mínimo/máximo y variables que más mueven el coste. No des un único número.'", "Pide análisis de sensibilidad: 'qué partidas mueven más el total y por qué'.", "Solicita comparación con proyectos del estudio si tienes ratios propios: 'ajusta usando estos €/m² de proyectos similares'.", "Cierra con: 'redacta el email al cliente presentando el rango estimado con transparencia sobre supuestos y variables, sin dar un número único'."], "riesgo": "alto", "madurez": "intermedio", "advertencia": "Es una estimación preliminar por ratios y supuestos. No sustituye a un presupuesto de ejecución material medido y contratado. Explicita siempre supuestos, partidas con más incertidumbre y rango mínimo/máximo."}, {"id": "6.3", "titulo": "Presentación comercial para ganar un encargo", "herramienta": "Canva", "descripcion": "Crea una presentación cuidada para convencer a un cliente potencial antes de contratar. Foco en entendimiento del encargo, metodología, fases, equipo, honorarios, plazos, referencias y próximos pasos.", "input": "Descripción del encargo, propuesta económica y proyectos de referencia del estudio.", "pasos": ["Escribe un guion estructurado de 6-8 apartados: entendimiento del encargo, metodología, equipo, fases, honorarios y forma de pago, plazos, referencias del estudio, próximos pasos.", "Sube a Canva con imágenes del estudio y proyectos de referencia.", "Lanza el prompt: 'Genera una presentación comercial de 12 slides para captar este encargo. Cliente: [perfil]. Encargo: [tipo]. Tono: cercano y profesional. Objetivo: que el cliente quiera trabajar con nosotros. Estructura editorial, muy visual, una sola idea por slide.'", "Itera: 'menos texto, más imagen', 'inserta un slide con 3 preguntas para el cliente al final para abrir conversación'.", "Pide notas del ponente con los mensajes clave por slide y una anticipación de las 3 preguntas más probables del cliente.", "Cierra con una versión reducida en PDF de una página para dejar tras la reunión."], "riesgo": "bajo", "madurez": "basico"}, {"id": "6.4", "titulo": "Preparación de negociaciones", "herramienta": "Claude", "descripcion": "Anticipa argumentos, objeciones y alternativas antes de una reunión con cliente o promotor, ensayando distintos escenarios.", "input": "Contexto de la negociación + posición inicial de las partes.", "pasos": ["Describe el contexto: 'Reunión con promotor para negociar honorarios de un hotel boutique de 8 habitaciones. Mi propuesta: 6% del PEM. Su contrapropuesta esperada: 4%. Sus argumentos previsibles: proyecto pequeño, precedente sector, escala.'", "Lanza el prompt: 'Prepárame la negociación. Anticipa: 5 objeciones que planteará, mis 3 mejores argumentos para cada una, mi mínimo aceptable, cuándo levantarme, qué contrapartidas puedo pedir si bajo honorarios.'", "Pide role play: 'actúa como el promotor y hazme la primera oferta, yo te respondo'.", "Solicita frases exactas para los momentos clave de la negociación.", "Cierra con: 'genera un email de seguimiento profesional para cerrar por escrito lo acordado en la reunión'."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "6.5", "titulo": "Value engineering sin destruir el concepto", "herramienta": "Claude o ChatGPT", "descripcion": "Cuando el presupuesto se dispara, ayuda a reducir costes diferenciando qué decisiones son esenciales para el concepto y cuáles pueden ajustarse sin perder calidad percibida. Protege la idea cuando aparecen restricciones económicas.", "input": "Presupuesto por partidas, concepto del proyecto, renders o moodboard, y prioridades del cliente.", "pasos": ["Sube o describe el presupuesto desglosado por partidas con su coste actual y el concepto rector del proyecto en 4-6 líneas.", "Explica las decisiones que sostienen el concepto (paleta, materiales clave, gestos espaciales, elemento icónico si lo hay).", "Lanza el prompt: 'Actúa como interiorista con experiencia en reducción de coste sin destruir el concepto. Clasifica las partidas en tres categorías: intocables (rompen el concepto si se ajustan), ajustables (se pueden bajar de gama manteniendo la calidad percibida) y prescindibles (se pueden eliminar o posponer a fase 2 sin daño).'", "Solicita alternativas económicas para las 5 partidas de mayor peso económico: 'para cada una, propón una alternativa que baje al menos un 25% el coste sin traicionar el concepto. Argumenta.'", "Pide una tabla con: partida, coste actual, alternativa propuesta, ahorro estimado, impacto en diseño (bajo/medio/alto), riesgo y recomendación.", "Cierra con: 'redacta un guion de 3-4 minutos para explicar al cliente los ajustes sin parecer que se empobrece el proyecto. Argumenta cada recorte desde la lógica del concepto, no desde el precio'."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "6.6", "titulo": "Calculadora de rentabilidad de un encargo", "herramienta": "Claude (o un maquinillo propio)", "descripcion": "Antes de aceptar un encargo, calcula su margen: horas por perfil, tarifas y gastos frente a los honorarios. Te dice si sale a cuenta y dónde renegociar.", "input": "Honorarios ofertados, horas y tarifa por perfil, gastos directos y tu margen objetivo.", "pasos": ["Reúne los números: honorarios, horas estimadas por perfil, tarifas por hora y gastos directos.", "Pídele a Claude (o abre el maquinillo de rentabilidad) que calcule el coste total y el margen en € y %.", "Fija tu margen objetivo para que te avise si el encargo cae por debajo.", "Si no sale, pídele tres palancas para renegociar (alcance, plazo, fases) sin bajar la calidad.", "Guarda el cálculo como base del siguiente presupuesto."], "riesgo": "bajo", "madurez": "avanzado", "destacado": true, "advertencia": "Es una estimación para decidir, no la contabilidad real del proyecto."}, {"id": "6.7", "titulo": "Formulario inteligente de pre-briefing y cualificación de leads", "herramienta": "ChatGPT, Typeform, Google Forms o Airtable", "descripcion": "Diseña un formulario de entrada para nuevos clientes que recoge información clave del proyecto y clasifica automáticamente si el lead encaja con el estudio antes de invertir tiempo en una primera reunión. El diseño empieza antes del diseño: empieza filtrando bien oportunidades.", "input": "Perfil de cliente ideal del estudio, tipos de proyecto que quiere atraer, presupuesto mínimo, plazos aceptables y criterios de encaje (estilo, ubicación, tipología).", "pasos": ["Define qué información imprescindible necesita el estudio antes de aceptar una primera llamada (tipo de proyecto, ubicación, presupuesto, plazo, estado de decisión, referencias visuales, motivación, urgencia).", "Lanza el prompt: 'Actúa como responsable comercial de un estudio de interiorismo. Diseña un formulario breve pero inteligente (máximo 12 preguntas) para nuevos leads. Mezcla campos cerrados (dropdown, rangos) con 2-3 abiertas potentes. Preguntas sobre presupuesto, timing, alcance, estilo, ubicación, quién decide y expectativas. Marca cada pregunta con su intención comercial (cualificación económica, cualificación de encaje, cualificación de urgencia).'", "Pide criterios de clasificación automática: 'define reglas simples que clasifiquen cada lead entrante en caliente / templado / frío / no encaja. Por ejemplo: presupuesto por debajo del mínimo = no encaja; timing menor de 2 meses = caliente pero riesgo de plazo; sin decisor claro = templado'.", "Genera respuestas automáticas por tipo: para lead caliente, invitación a primera llamada; para templado, contenido educativo del estudio y siguiente contacto en 4 semanas; para frío, respuesta cordial con recursos; para no encaja, redirección amable a otro perfil.", "Pide una plantilla de resumen interno de una página que se genere tras cada respuesta, lista para leer antes de la primera llamada: lo que el cliente pidió, señales relevantes, preguntas pendientes y ángulo de conversación recomendado.", "Cierra con la implementación: cómo montar el formulario en Typeform o Google Forms con lógica condicional, cómo conectarlo a Airtable, y qué persona del estudio revisa cada mañana los nuevos leads clasificados."], "riesgo": "bajo", "madurez": "basico"}, {"id": "6.8", "titulo": "Personalización de propuestas", "herramienta": "Claude", "descripcion": "Adapta el tono y contenido de una misma propuesta a distintos perfiles de cliente (particular, promotor, hostelero, marca).", "input": "Propuesta base + perfil del cliente destinatario.", "pasos": ["Sube la propuesta base del estudio.", "Describe el perfil del cliente: 'Propuesta para un promotor hotelero con 3 establecimientos en el norte, muy racional, orientado a rentabilidad, poco emocional.'", "Lanza el prompt: 'Adapta la propuesta a este perfil. Ajusta: tono (menos poético, más pragmático), argumentos (rentabilidad, retorno, eficiencia), referencias (proyectos con datos de éxito comercial), estructura (datos primero, imagen después).'", "Pide análisis de qué se ha cambiado y por qué, para aprender la lógica de adaptación.", "Cierra con: 'genera 3 titulares distintos para la portada según distintos perfiles de cliente'."], "riesgo": "bajo", "madurez": "basico"}, {"id": "6.9", "titulo": "Simulación comercial de objeciones antes de una reunión", "herramienta": "Claude", "descripcion": "Simula un cliente ficticio con perfil detallado y le muestras tu propuesta comercial para que reaccione como lo haría en la reunión real. Detecta objeciones sobre precio, honorarios, alcance, confianza y timing antes de que el cliente las plantee en persona.", "input": "Propuesta comercial (documento o resumen), perfil detallado del cliente (edad, contexto, estilo, presupuesto, dudas previsibles).", "pasos": ["Define el perfil del cliente con máximo detalle: 'Marta, 45, directora financiera, primera reforma integral, presupuesto 150k€, viene de dos presupuestos previos más baratos, teme sobrecoste y retraso.'", "Sube la propuesta comercial a Claude.", "Lanza el prompt: 'Eres Marta, con ese perfil. Acabas de leer esta propuesta. Reacciona en tres pases: (1) objeción sobre precio y honorarios, (2) objeción sobre alcance o plazos, (3) objeción sobre confianza (por qué este estudio y no otro). Sé realista, no exagerada.'", "Itera con 3 perfiles distintos (racional-financiero, emocional-relacional, escéptico-comparador) para detectar qué objeciones son universales y cuáles del perfil.", "Pide respuestas preparadas: 'para cada objeción detectada, dame una respuesta ideal que pueda decir en la reunión sin sonar defensiva, con argumentos y con un límite claro de negociación'.", "Cierra pidiendo el guion de un email de seguimiento posterior a la reunión que cierre por escrito lo acordado y neutralice objeciones pendientes."], "riesgo": "bajo", "madurez": "intermedio", "destacado": false}, {"id": "6.10", "titulo": "Secuencia de seguimiento de propuestas enviadas", "herramienta": "ChatGPT, Claude o Gmail", "descripcion": "Genera mensajes de seguimiento para clientes que han recibido una propuesta pero aún no han respondido, adaptando el tono según el tipo de cliente y el tiempo transcurrido. Cierra el problema real de enviar algo y no saber cómo hacer seguimiento sin sonar pesado.", "input": "Propuesta enviada, fecha de envío, perfil del cliente, dudas detectadas en reuniones previas y objetivo del seguimiento.", "pasos": ["Resume la propuesta enviada y el contexto del cliente en 5-8 líneas (encargo, presupuesto, plazo, dudas ya expresadas, personalidad).", "Lanza el prompt: 'Actúa como responsable comercial elegante y no invasivo. Genera una secuencia de seguimiento a 3 días, 7 días y 14 días para un cliente que recibió mi propuesta y no ha respondido. Cada mensaje debe abrir un ángulo distinto: aportar información útil, resolver duda anticipada, invitar a llamada breve.'", "Pide variantes por escenario: cliente silencioso, cliente que pide descuento, cliente indeciso entre 2 opciones, cliente que compara con otro estudio. Para cada uno, ajusta tono y contenido.", "Solicita dos formatos por mensaje: versión breve para WhatsApp (2-3 frases, cercana) y versión formal para email (5-8 líneas, profesional, con siguiente paso claro). El tono siempre elegante, nunca insistente.", "Pide una tabla de 'siguiente acción según respuesta del cliente': si responde con interés, agenda llamada; si pide bajar precio, activa caso 6.5 value engineering; si silencio total tras 14 días, cierra amablemente y mueve a lista de nurturing.", "Cierra con una regla simple para el estudio: qué día de la semana se hace revisión de propuestas pendientes, quién es responsable, y cuándo se declara oficialmente perdida una propuesta para dejar de perseguirla."], "riesgo": "bajo", "madurez": "basico"}]}, {"id": 7, "numero": "07", "nombre": "Gestión de Obra", "descripcion": "Cambios, planificación, incidencias y coordinación de gremios. Herramientas prácticas para el día a día del tajo.", "casos": [{"id": "7.1", "titulo": "Gestión de cambios de alcance", "herramienta": "Claude o ChatGPT", "descripcion": "Documenta y comunica cambios solicitados por el cliente durante el proyecto u obra, identificando impacto en honorarios, plazo, presupuesto y responsabilidades. Muchos problemas nacen de cambios no documentados.", "input": "Solicitud del cliente (email, mensaje, acta), contrato o propuesta inicial, fase del proyecto y alcance afectado.", "pasos": ["Describe la solicitud nueva del cliente literalmente y con contexto: '¿podéis mover el baño al otro lado del salón?', tras haberse aprobado ya la distribución hace 3 semanas.", "Sube el contrato original y lanza el prompt: 'Compara la solicitud con el alcance contratado. ¿Es un ajuste dentro del alcance, una ampliación de alcance o un nuevo encargo? Justifica.'", "Continúa: 'Actúa como interiorista senior. Determina impacto en horas del estudio, honorarios, plazo del proyecto, presupuesto de obra, industriales afectados y trabajo ya facturado que debe rehacerse.'", "Genera una minuta de cambio de alcance para firma con: descripción del cambio, motivo, impacto detallado, coste adicional, plazo adicional, condiciones.", "Pide un email profesional al cliente que reconozca la petición, exponga las implicaciones con transparencia, proponga alternativas si existen y pida confirmación por escrito antes de ejecutar.", "Cierra con un protocolo interno para registrar el cambio en el expediente y en el planning de obra."], "riesgo": "medio", "madurez": "intermedio", "destacado": false}, {"id": "7.2", "titulo": "Detección de defectos y acabados", "herramienta": "ChatGPT", "descripcion": "Reconoce defectos de acabado, juntas mal rematadas, manchas o desplomes en fotografías de obra para documentar incidencias.", "input": "Fotos del acabado en cuestión.", "pasos": ["Toma fotos del elemento sospechoso desde distintos ángulos.", "Sube a ChatGPT: 'Actúa como jefe de obra. Revisa esta foto de un encuentro entre pavimento de microcemento y rodapié de madera. Detecta defectos, riesgos futuros y qué correcciones exigir al industrial. Sé riguroso.'", "Pide comparativa contra normativa de calidad si aplica.", "Solicita anotación visual de los defectos sobre la foto (descripción de coordenadas).", "Cierra con: 'redacta el parte de incidencia formal con foto anotada y plazo de corrección exigido al industrial'."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "7.3", "titulo": "Checklist de recepción y entrega", "herramienta": "Claude o ChatGPT", "descripcion": "Genera la checklist para recibir la obra o entregar al cliente: qué revisar estancia por estancia, remates, instalaciones y documentación, adaptada a tu proyecto.", "input": "El tipo de proyecto y sus estancias/partidas.", "pasos": ["Describe el proyecto (estancias, materiales, instalaciones) y pide una checklist de recepción por estancia.", "Pide que marque los puntos críticos (siliconas, juntas, nivelación, enchufes, puertas) donde suele haber repasos.", "Añade la documentación a entregar (garantías, fichas de mantenimiento, manual de uso).", "Conviértela en una lista imprimible o una tabla para ir marcando en obra.", "Tras la visita, pásale tus notas y que te redacte el listado de repasos para los gremios."], "riesgo": "bajo", "madurez": "intermedio", "advertencia": "La checklist ayuda a no olvidar; no sustituye la vista experta en obra."}, {"id": "7.4", "titulo": "Optimización de la planificación", "herramienta": "ChatGPT", "descripcion": "Ajusta cronogramas y secuencias de tareas detectando solapes y cuellos de botella, permitiendo simular escenarios antes de comprometerse.", "input": "Planning actual + lista de industriales y sus plazos.", "pasos": ["Sube el planning en tabla o Excel.", "Lanza el prompt: 'Analiza este planning de obra. Detecta solapes imposibles entre gremios, cuellos de botella, tareas críticas sin margen, riesgos por dependencias. Propón una optimización con secuencia mejorada.'", "Simula escenarios: 'qué pasa si el pintor se retrasa una semana' o 'qué pasa si duplicamos el equipo de albañiles'.", "Pide identificación de la ruta crítica y qué tareas la componen.", "Cierra con: 'genera el planning optimizado en formato Gantt descriptivo para pasarlo a MS Project'."], "riesgo": "medio", "madurez": "intermedio", "destacado": true}, {"id": "7.5", "titulo": "Coordinación de industriales", "herramienta": "ChatGPT", "descripcion": "Apoya la organización de tareas y solapes entre oficios (electricista, fontanero, pintor, ebanista, tapicero) para evitar interferencias.", "input": "Lista de industriales + tareas asignadas + fechas.", "pasos": ["Reúne el listado de industriales con sus tareas y fechas en tabla.", "Lanza el prompt: 'Coordina el trabajo de estos 8 industriales en un local de 180 m² durante 12 semanas. Detecta interferencias físicas (dos gremios en la misma estancia), dependencias técnicas (¿quién puede empezar antes de qué?), propón el orden óptimo semana a semana.'", "Pide un plan semana a semana con presencia detallada por estancia.", "Solicita comunicaciones tipo para cada industrial explicando su encaje en el plan general.", "Cierra con: 'genera un email semanal automático que pueda enviar cada lunes coordinando la semana con todos los industriales'."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "7.6", "titulo": "Gestión de incidencias y RFIs", "herramienta": "Airtable con IA", "descripcion": "Clasifica y da seguimiento a incidencias y solicitudes de información (RFI) de obra, agrupando consultas similares y priorizando las urgentes.", "input": "Correos, notas o RFIs registrados durante la obra.", "pasos": ["Centraliza todas las incidencias en una base de datos.", "Lanza el prompt: 'Clasifica estas 40 incidencias por: tipo (técnica, económica, plazos, calidad), gremio afectado, urgencia, estado. Agrupa las similares. Detecta patrones (¿qué gremio genera más incidencias?).'", "Pide priorización con criterio de impacto vs esfuerzo de resolución.", "Solicita análisis de causas raíz: 'qué patrones subyacen a las incidencias más frecuentes'.", "Cierra con un dashboard de KPIs de obra para revisar semanalmente."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "7.7", "titulo": "Control de seguridad y salud", "herramienta": "ChatGPT", "descripcion": "Apoya la prevención de riesgos en obra detectando situaciones inseguras a partir de imágenes, reforzando el trabajo del coordinador de seguridad.", "input": "Fotos generales de la obra.", "pasos": ["Toma fotos amplias del tajo durante la visita.", "Sube a ChatGPT: 'Actúa como coordinador de seguridad. Detecta situaciones de riesgo en estas fotos: uso de EPIs, huecos sin proteger, andamios, accesos, orden y limpieza. Enumera cada riesgo con ubicación y medida correctora.'", "Pide priorización por gravedad legal.", "Solicita las acciones correctivas inmediatas vs las que requieren planificación.", "Cierra con: 'redacta el aviso formal al constructor con los riesgos detectados y plazo de corrección exigido'."], "riesgo": "alto", "madurez": "intermedio", "advertencia": "No sustituye al coordinador de seguridad y salud. Sirve como primera detección antes de la visita del profesional habilitado."}, {"id": "7.8", "titulo": "Control de calidad de mobiliario y acabados", "herramienta": "ChatGPT", "descripcion": "Compara mobiliario recibido y acabados ejecutados contra el proyecto y las fichas técnicas, detectando desviaciones de color, material, dimensión o calidad.", "input": "Foto de lo recibido + ficha técnica o especificación del proyecto.", "pasos": ["Toma foto del elemento recibido en obra.", "Sube junto con la ficha técnica original: 'Compara la pieza recibida (foto) con la ficha técnica del pedido. Detecta desviaciones en color, acabado, dimensiones, materiales, calidad. Recomienda si aceptar o rechazar.'", "Pide análisis de tolerancias: 'qué desviaciones son aceptables y cuáles no según normativa'.", "Solicita el listado de puntos a verificar visualmente en cualquier futura entrega similar.", "Cierra con: 'redacta el email al proveedor con las desviaciones detectadas y la exigencia de sustitución o corrección'."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "7.9", "titulo": "Apoyo a revisión as-built con escaneo 3D", "herramienta": "Polycam + Claude", "descripcion": "Usa escaneos o fotogrametría como apoyo para detectar posibles desviaciones entre obra ejecutada y proyecto, especialmente antes de fabricar mobiliario o carpinterías.", "input": "Escaneo 3D del espacio ejecutado + modelo del proyecto.", "pasos": ["Escanea el espacio con Polycam desde el iPhone y exporta la nube de puntos o modelo 3D.", "Sube modelo escaneado y modelo del proyecto a Claude: 'Compara ambos modelos. Detecta desviaciones dimensionales relevantes (>2 cm) entre lo ejecutado y lo proyectado. Enumera cada desviación con ubicación e impacto. Marca la precisión estimada del escaneo.'", "Pide priorización de las desviaciones que puedan afectar al mobiliario o carpinterías pendientes de fabricar.", "Valida las desviaciones críticas con medición manual en obra antes de pedir a industriales.", "Cierra con: 'genera un documento as-built con las medidas reales para adjuntar al expediente final, indicando cuáles se han validado manualmente y cuáles siguen sujetas a revisión'."], "riesgo": "alto", "madurez": "avanzado", "advertencia": "La precisión depende del escaneo, la escala, la alineación de modelos y la revisión manual. No sustituye a mediciones topográficas ni a la verificación en obra antes de fabricar."}, {"id": "7.10", "titulo": "Detección temprana de desviaciones de plazo y coste", "herramienta": "ChatGPT", "descripcion": "Analiza datos de avance y rendimientos para detectar señales tempranas de desviación en plazo o coste y proponer medidas correctoras antes de que sea irreversible.", "input": "Planning original + estado real de avance + histórico de partidas certificadas.", "pasos": ["Sube el planning original y el estado actual a ChatGPT.", "Lanza el prompt: 'Analiza la desviación entre planning original y avance real. Detecta señales tempranas: cuánto se retrasará la obra si se mantiene el ritmo actual, qué partidas están sobrepasando presupuesto y por qué, qué medidas correctoras aplicar (recursos extra, reordenar tareas, negociar con industrial).'", "Pide simulación de escenarios: 'qué pasa si aplicamos cada medida y cuál da mejor resultado'.", "Solicita el punto de no retorno: 'a partir de qué semana ya no será posible cumplir el plazo original'.", "Cierra con: 'redacta la comunicación al cliente si el retraso es probable, con transparencia y plan de acción'."], "riesgo": "medio", "madurez": "intermedio"}]}, {"id": 8, "numero": "08", "nombre": "Marketing / Comunicación", "descripcion": "Renders, portfolio, comunicación, marca y aprendizaje. El ámbito más maduro en IA aplicada y el que cierra el ciclo del proyecto.", "casos": [{"id": "8.1", "titulo": "Renders fotorrealistas de interiores", "herramienta": "Rendair (o LookX.ai / BLMN)", "descripcion": "Genera imágenes finales de alta calidad del interior a partir del modelo 3D, con IA aplicada a iluminación, materiales y mobiliario.", "input": "Modelo 3D básico del espacio.", "pasos": ["Prepara un modelo básico en SketchUp o Rhino con volumen y materialidad esencial, o parte de la mejor imagen de BLMN/LookX.", "Súbelo a Rendair y describe la atmósfera: 'Restaurante boutique mediterráneo, paleta terracota y crema, luz rasante de hora dorada, textiles de lino, mesas de olivo, latón patinado, elegancia serena, fotorrealista.'", "Usa los presets y controles de Rendair para fijar iluminación y materiales.", "Renderiza 4-6 vistas clave manteniendo consistencia visual entre ellas.", "Consolida las mejores en un 'render evidence board': qué prueba cada imagen y qué esconde."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "8.2", "titulo": "Post-producción de imágenes", "herramienta": "Krea o Nano Banana (Gemini)", "descripcion": "Cambia luces, añade mobiliario o vegetación, retoca texturas o aumenta la resolución de un render en segundos.", "input": "Render base a mejorar.", "pasos": ["Sube el render base a Krea (o a Gemini con Nano Banana).", "Pide cambios concretos por lenguaje natural: 'sustituye el fondo por una estantería con libros de diseño y cerámica', 'añade vegetación en la esquina', 'sube la calidez de la luz general'.", "Genera varias variaciones y elige la mejor.", "Cuida no embellecer de más: compara siempre contra la realidad material del proyecto.", "Cierra con un ajuste global de iluminación para uniformar el resultado."], "riesgo": "bajo", "madurez": "basico"}, {"id": "8.3", "titulo": "Estrategia editorial para atraer al cliente ideal", "herramienta": "Claude o ChatGPT", "descripcion": "Define los territorios de contenido de un estudio de interiorismo para atraer al tipo de cliente que quiere captar: residencial premium, hospitality, retail, promotores, restaurantes, hoteles o marcas. Evita que las redes sean solo 'subir renders bonitos' y las convierte en herramienta de captación con intención comercial.", "input": "Tipo de estudio, cliente ideal, proyectos que quiere atraer, tono de marca y canales principales.", "pasos": ["Describe el perfil del cliente ideal del estudio en 8-10 líneas: quién es, qué preocupa, dónde busca inspiración, qué le hace decidirse por un estudio en lugar de otro.", "Lanza el prompt: 'Actúa como director editorial de un estudio de interiorismo. Propón 4-6 territorios de contenido para atraer al cliente ideal descrito. Incluye territorios de: proyecto (obras, procesos, antes/después), método (cómo trabajamos, filosofía), material y detalle (por qué elegimos X material), errores frecuentes y educación al cliente. Justifica cada territorio en términos de captación.'", "Solicita ejemplos concretos: 'para cada territorio, dame 3 ideas de post con titular y ángulo, y qué tipo de cliente atrae específicamente ese contenido'.", "Pide una parrilla mensual equilibrada: 'diseña un calendario de 30 días con mezcla de territorios, alternando piezas comerciales, educativas y aspiracionales. Marca qué post va a captación y cuál a autoridad'.", "Pide una guía de tono editorial de 1 página: qué palabras usar, qué evitar, cómo abrir un post, cómo cerrar, y qué tipo de cliente debería atraer cada tipo de contenido.", "Cierra vinculando con caso 8.4 (ejecución de posts) y caso 8.5 (reciclaje de proyecto): la estrategia manda, los otros dos casos ejecutan."], "riesgo": "bajo", "madurez": "basico"}, {"id": "8.4", "titulo": "Calendario y estrategia de contenido para redes", "herramienta": "Claude o ChatGPT", "descripcion": "El plan continuo: qué publicar cada semana y por qué. Territorios de contenido, ritmo y formatos, más allá de un solo proyecto. (Convertir UN proyecto en muchas piezas es el 8.5.)", "input": "Los territorios/temas del estudio y los canales donde estás.", "pasos": ["Define 4-5 territorios de contenido del estudio (proceso, materiales, detrás de cámaras, opinión, proyectos).", "Pide un calendario editorial mensual: qué territorio y formato cada semana, por canal.", "Genera ganchos y titulares por lote, no publicación a publicación.", "Marca qué es contenido evergreen y qué es de proyecto puntual.", "Revisa el plan cada mes con lo que funcionó."], "riesgo": "bajo", "madurez": "intermedio", "advertencia": "Un calendario no sustituye tener algo que decir. Publica cuando aporte, no por rellenar."}, {"id": "8.5", "titulo": "Reciclaje de un proyecto en contenido para varios canales", "herramienta": "ChatGPT, Claude o Canva", "descripcion": "Convierte un solo proyecto de interiorismo en múltiples piezas de comunicación: Instagram, LinkedIn, Pinterest, newsletter, web, dossier comercial y nota de prensa. Cada proyecto alimenta captación, marca y portfolio durante semanas.", "input": "Memoria del proyecto, fotos, renders, planos, materiales, decisiones clave y anécdotas del proceso.", "pasos": ["Resume el proyecto en cuatro bloques cortos: problema del cliente, concepto, decisiones clave y resultado.", "Lanza el prompt: 'Actúa como director de comunicación de un estudio de interiorismo. Extrae 8-10 ángulos de comunicación distintos de este proyecto (concepto, material curioso, decisión difícil, antes/después, detalle constructivo, testimonio, error superado, referencia oculta, cliente-tipo, aprendizaje interno).'", "Convierte cada ángulo en formato adecuado: carrusel de Instagram, Reel corto, post editorial de LinkedIn, ficha web del proyecto, sección de newsletter, pin de Pinterest, dossier comercial, nota de prensa para medios.", "Solicita titulares y llamadas a la acción por canal, con la misma historia pero adaptando registro y longitud.", "Pide una planificación de publicación en 4 semanas: qué ángulo se publica cuándo y en qué canal, para no quemar el proyecto en una sola semana.", "Cierra con una checklist de assets necesarios: fotos horizontales y verticales, planos limpios, detalles, textos aprobados por el cliente, créditos (fotógrafo, industriales, colaboradores)."], "riesgo": "bajo", "madurez": "intermedio", "destacado": true}, {"id": "8.6", "titulo": "Diseño de portfolio", "herramienta": "Canva", "descripcion": "Maquetación, textos y narrativa del portfolio profesional. Ordena proyectos, afina el discurso y adapta el portfolio a cada destinatario.", "input": "Imágenes y datos de tus proyectos.", "pasos": ["Reúne 8-12 proyectos con imágenes, planos y datos clave.", "Lanza el prompt en Canva (y pídele los textos a Claude): 'Crea un portfolio profesional de interiorismo con estos 10 proyectos. Estructura: introducción del estudio, filosofía en una página, un proyecto por 2-3 slides (imagen, concepto, materiales, resultado). Tono editorial, minimalista.'", "Ajusta diseño iterativamente: 'menos texto', 'imágenes a sangre', 'tipografía más elegante'.", "Pide versiones específicas para cada destinatario (cliente residencial, hostelería, prensa).", "Cierra pidiendo un one-pager comercial (una sola página) para envíos rápidos."], "riesgo": "bajo", "madurez": "basico"}, {"id": "8.7", "titulo": "Redacción de textos (copywriting)", "herramienta": "Claude", "descripcion": "Memorias divulgativas, descripciones de proyecto, textos web y dossiers con tono claro y atractivo para público no técnico.", "input": "Memoria técnica + imágenes del proyecto + tono deseado.", "pasos": ["Sube la memoria técnica a Claude.", "Lanza el prompt: 'Reescribe esta memoria para la web pública del estudio. Público: cliente potencial, no técnico. Tono: cálido, culto, sin jerga. Longitud: 250 palabras. Estructura: contexto emocional del cliente, encargo, respuesta espacial, decisión material clave, resultado.'", "Pide 3 variantes con distinto tono (poético, comercial, editorial).", "Solicita adaptación por canal: '150 palabras para web, 60 para Instagram, 300 para dossier'.", "Cierra con un titular potente para presidir el proyecto en la web."], "riesgo": "bajo", "madurez": "basico"}, {"id": "8.8", "titulo": "Post-ocupación y aprendizaje del proyecto terminado", "herramienta": "Claude, ChatGPT o Typeform + IA", "descripcion": "Analiza feedback del cliente y uso real del espacio tras la entrega para detectar qué funcionó, qué dio problemas y qué aprendizajes deben incorporarse al siguiente proyecto. Cultura profesional de aprendizaje, no solo de entrega.", "input": "Encuesta al cliente, entrevista post-ocupación, fotos del uso real, incidencias de mantenimiento y observaciones del equipo.", "pasos": ["Diseña una encuesta breve de 10-15 preguntas para enviar 1-3 meses después de la entrega. Cubre: satisfacción global, funcionalidad por estancia, mantenimiento, confort (térmico, acústico, lumínico), mobiliario, comunicación durante el proyecto y valor percibido.", "Lanza el prompt: 'Actúa como diseñador de encuestas post-ocupación en interiorismo. Redacta 12 preguntas cerradas (escala 1-5) y 3 abiertas, escritas para un cliente no técnico, sin sonar defensivas.'", "Al recibir respuestas, súbelas a Claude: 'clasifica cada comentario por categoría (diseño, funcionalidad, mantenimiento, confort, presupuesto, comunicación, mobiliario) y sentimiento (positivo, mixto, negativo). Ordena por prioridad de acción.'", "Extrae aprendizajes accionables para futuros proyectos: 'qué cosas repetiríamos, qué evitaríamos, qué merece prototipar antes en el próximo proyecto similar'.", "Genera una ficha interna de lecciones aprendidas y súmala a la base de conocimiento del estudio (ver caso 4.5).", "Si el cliente autoriza, extrae 2-3 posibles testimonios o claims de comunicación para portfolio o redes."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "8.9", "titulo": "Crear la web del estudio (o una landing de proyecto)", "herramienta": "Lovable (o Claude)", "descripcion": "Describe lo que quieres y la IA te monta una web funcional —el portfolio del estudio o la landing de un proyecto—, lista para publicar y editar en lenguaje natural.", "input": "Textos del estudio o del proyecto, imágenes buenas y una referencia de estilo (una web que te guste).", "pasos": ["Reúne los textos (quiénes sois, proyectos, contacto) y unas imágenes de calidad. Si te faltan textos, pídeselos antes a Claude.", "En Lovable, describe la web en una frase: 'web de estudio de interiorismo, cálida y editorial, con portfolio en grid, página de proyecto y contacto'. La IA la construye funcionando.", "Itera en lenguaje natural: 'hero más grande', 'añade una sección de prensa', 'tipografía más editorial', 'modo oscuro'.", "Sube tus imágenes y repasa los textos.", "Publica con un clic (Lovable te da hosting y dominio) o exporta el código para llevártelo.", "Alternativa sin Lovable: pídele a Claude que te genere el HTML/CSS de una landing en un solo archivo y publícalo donde quieras."], "riesgo": "medio", "madurez": "intermedio", "advertencia": "Revisa la accesibilidad y que las imágenes de proyecto tengan derechos y créditos. Una web generada rápido suele necesitar un repaso de contenido y SEO."}, {"id": "8.10", "titulo": "Validación perceptiva de la propuesta con usuario sintético", "herramienta": "Claude", "descripcion": "Simula un cliente ficticio con perfil detallado y le muestras tu propuesta de diseño (render, moodboard, memoria) para detectar cómo se percibe emocionalmente y qué dudas surgen sobre estilo, uso, mantenimiento o habitabilidad. Detecta problemas de comunicación visual antes de la reunión.", "input": "Material de la propuesta (render, moodboard, memoria breve) + perfil detallado del usuario o cliente.", "pasos": ["Define un usuario sintético con máximo detalle: edad, contexto vital, estilo declarado, miedos con reformas anteriores, referentes que le gustan, presupuesto.", "Sube la propuesta visual a Claude (render, moodboard o memoria con imágenes).", "Lanza el prompt: 'Eres [perfil]. Te presento este render de tu salón. Reacciona en cuatro pases: (1) primera impresión emocional en 2 líneas, (2) qué te llama la atención positivamente, (3) 3 dudas sinceras sobre uso, mantenimiento o estilo, (4) una pregunta que harías antes de aprobarlo.'", "Repite con 3-4 perfiles distintos (particular, promotor, hostelero, marca) para detectar objeciones universales de percepción vs. objeciones ligadas al perfil.", "Pide una lectura crítica del diseño desde la perspectiva del usuario: '¿qué partes del render no se entienden bien?', '¿qué materiales podrían generar rechazo por percepción de mantenimiento?', '¿qué gestos del proyecto no llegan al usuario y necesitan explicarse mejor?'", "Cierra con: 'genera 3 ajustes de comunicación visual o de memoria que ayudarían a que el proyecto se entendiera mejor sin cambiar el diseño'."], "riesgo": "bajo", "madurez": "intermedio"}]}]}, "contenido-narrativo.json": {"hero": {"etiqueta": "Masterclass de IA", "titulo": "IA aplicada al interiorismo", "subtitulo": "Una capa que atraviesa cómo se investiga, se piensa, se decide, se produce y se interactúa con el cliente", "claim": "Cuando cualquiera puede generar, dirigir empieza a pesar.", "sub_claim": "", "texto": "Esta clase va de **cómo cambia el oficio** cuando aparece una capa que escribe, ve, compara, propone y ejecuta. Un mapa para atravesar la clase a través de **8 ámbitos de impacto**.", "cifras": [{"num": "80", "label": "casos de uso reales"}, {"num": "8", "label": "ámbitos del proceso"}, {"num": "5", "label": "niveles de madurez"}, {"num": "7", "label": "artefactos propios"}], "navegacion": [{"id": "estado-arte", "label": "Estado del arte", "num": "01"}, {"id": "escalera", "label": "Madurez", "num": "02"}, {"id": "prompting-gym", "label": "Prompting Gym", "num": "03"}, {"id": "casos", "label": "80 casos", "num": "04"}, {"id": "artefactos", "label": "Casos de mayor madurez", "num": "05"}, {"id": "lo-que-viene", "label": "Lo que viene", "num": "06"}, {"id": "espacio-inteligente", "label": "One more thing", "num": "07"}, {"id": "kit", "label": "Kit de herramientas", "num": "08"}, {"id": "ejercicio-final", "label": "Ejercicio final", "num": "09"}, {"id": "anexo-coste", "label": "Anexo · Coste", "num": "10"}], "ponente": {"etiqueta": "PRESENTACIÓN", "nombre": "Adrián Ager", "rol": "Director de Estrategia, IA & Business Design · Accenture Song", "iniciales": "AA", "bio": ["Llevo más de una década en el cruce entre **estrategia de negocio y producto digital**: ese punto donde una idea se convierte en algo que la gente usa. Hoy dirijo estrategia, **IA y diseño de negocio** en Accenture Song. Antes fui responsable de **producto digital en Iberia** y lideré estrategia en **VML The Cocktail**, con etapas previas en BBVA y Telefónica."], "trayectoria": ["Accenture Song", "Iberia", "VML The Cocktail", "BBVA", "Telefónica"], "enlaces": [{"label": "LinkedIn", "url": "https://www.linkedin.com/in/adrianagersalcedo"}, {"label": "Medium", "url": "https://agersalcedo.medium.com"}]}}, "estado_arte": {"numero": "01", "titulo": "Del \"hype\" a la utilidad", "subtitulo": "La conversación sobre IA en arquitectura empezó por el render. Es lo más visible y lo más viral. Pero **es solo una de las cinco capas** que están cambiando el oficio. Y quizá la menos interesante.", "intro": ["**Capa 1 · La imagen.** Generar, iterar, componer atmósferas en segundos.", "**Capa 2 · El proceso.** Briefing, propuesta, presupuesto, obra, entrega. El trabajo invisible que sostiene un proyecto.", "**Capa 3 · El conocimiento.** Un interlocutor experto 24/7. Lee 200 páginas de normativa en un minuto.", "**Capa 4 · Los sistemas propios.** Convertir la experiencia del estudio en herramientas reutilizables.", "**Capa 5 · El propio espacio.** Entornos que responden, adaptan y recuerdan. A veces, vigilan."], "evolucion": {"titulo": "Cómo hemos llegado hasta aquí", "parrafos": ["La inteligencia artificial no nació con ChatGPT. Lleva **setenta años** entre nosotros.", "Al principio fue **lógica**. Reglas escritas a mano. Si pasa esto, haz esto. Funcionaba para el ajedrez. Fallaba con el mundo real.", "Luego llegó el **aprendizaje automático**. Ya no programábamos las reglas: le dábamos ejemplos y encontraba el patrón sola. Detectaba spam, predecía ventas, reconocía caras.", "Después, el **aprendizaje profundo**. Redes neuronales con muchas capas, entrenadas con millones de imágenes y textos. Empezó a ver y a oír casi como nosotros.", "En 2017 aparece la idea que lo cambia todo: el **transformer**. Una arquitectura que **relaciona** el contexto de una frase entera a la vez, no palabra a palabra. Sobre ella se construyen los grandes modelos de lenguaje.", "En 2022 la IA se hace **generativa y popular**. Ya no solo clasifica: crea. Texto, imágenes, voz, vídeo, código. Con una frase.", "A día de hoy estamos dando el siguiente paso a los **agentes**. IA que no solo responde. Planifica, usa herramientas y ejecuta tareas de varios pasos."], "lead": "En arquitectura, la IA no llega a un terreno virgen. Es el **último eslabón** de una cadena: **dibujo a mano → CAD → render 3D → BIM → IA**. Cada salto amplió lo que podíamos mostrar. Este amplía lo que podemos **decidir**."}, "claves": {"titulo": "Lo que hay que saber como base mental", "items": [{"lead": "La IA no entiende. Predice.", "texto": "Calcula el resultado más probable, no el verdadero. No sabe lo que dice. Lo dice bien."}, {"lead": "Aprende de datos.", "texto": "Si los datos están sesgados, ella también. Lo que no estaba en su entrenamiento, lo improvisa."}, {"lead": "A veces inventa.", "texto": "Se llama alucinación. Suena segura aunque se equivoque. Nunca te avisa de que duda."}, {"lead": "Tiene memoria limitada.", "texto": "Solo ve lo que cabe en su ventana de contexto. Fuera de ahí, olvida."}, {"lead": "No conoce tu proyecto.", "texto": "No sabe tu presupuesto, tu cliente ni tu normativa. Solo sabe lo que le cuentas."}, {"lead": "Responde a cómo preguntas.", "texto": "Instrucción vaga, respuesta promedio. Instrucción precisa, respuesta útil. El resultado empieza en el prompt."}, {"lead": "Es multimodal.", "texto": "Lee texto, mira planos, escucha audio, analiza fotos de obra. Ya no es solo un chat."}], "cierre": "La conclusión es simple. La IA amplifica y el criterio sigue siendo tuyo."}, "sector": {"titulo": "Debates interesantes ligados al sector", "intro": "", "retos": [{"titulo": "¿Quién firma esto?", "texto": "Un diseño hecho por IA **no tiene autor claro**, y la ley aún no lo resuelve. En varios países, lo generado solo por IA no se puede registrar. La zona gris: el trabajo a medias (prompt + edición + selección)."}, {"titulo": "Entrenada con tu trabajo, sin permiso.", "texto": "Los modelos aprendieron de **millones de imágenes de arquitectos y diseñadores**. Nadie dio su consentimiento. Hay demandas abiertas y ninguna cerrada.", "fuente": "Andersen v. Stability · Getty v. Stability AI"}, {"titulo": "Todo acaba pareciéndose.", "texto": "La IA tiende al **promedio de sus datos**: beige, japandi, minimalismo neutro. No es casualidad, es estadística. La máquina aplana lo raro — y lo raro era el valor."}, {"titulo": "El cliente llega con un mueble que no existe.", "texto": "Trae una imagen de Pinterest y quiere ese sofá. Ese sofá **está alucinado**: no se fabrica. Una herramienta pensada para insertar muebles reales llegó a inventar patas en un Camaleonda de B&B Italia, que no tiene.", "fuente": "Retro.net, 2026"}, {"titulo": "Parece terminado, pero no está pensado.", "texto": "Un render hermoso **no resuelve estructura, normativa, presupuesto ni mantenimiento**. Los profesionales lo detectan al instante: ventanas que no coinciden entre vistas, barandillas ancladas a forjados que no existen.", "fuente": "Ravelin3D, 2025"}, {"titulo": "El renderista trabaja más y cobra menos.", "texto": "La IA no ha vaciado los estudios, pero **ha devaluado el render conceptual básico** y presiona las tarifas junior. Sube quien combina criterio y herramienta; baja quien solo ejecutaba.", "fuente": "Chaos + Architizer, 2024"}, {"titulo": "Las reglas se están escribiendo ahora.", "texto": "Dezeen pide **etiquetar lo generado con IA**. Los concursos empiezan a exigir que tengas los derechos de tus imágenes. Escuelas y colegios aún no tienen postura firme."}], "cita": "", "cita_autor": "", "frase": ""}, "video": {"yt": "UdE-W30oOXo", "titulo": "La IA explicada en 2 minutos", "autor": "KI-Campus", "dur": "2 min"}, "mitos": {"titulo": "Mitos y realidades", "subtitulo": "Siete ideas que conviene desmontar antes de tocar una herramienta.", "pares": [{"mito": "La IA piensa.", "realidad": "Predice. No entiende tu proyecto: completa lo más probable."}, {"mito": "La IA es objetiva.", "realidad": "Hereda el sesgo de sus datos: sobre todo arquitectura occidental y de revista."}, {"mito": "El render ya es el proyecto.", "realidad": "El render abre la conversación. El proyecto empieza cuando aparecen las preguntas difíciles."}, {"mito": "Cuantas más herramientas, mejor.", "realidad": "Mejor criterio, no más apps. La que no usas con intención, sobra."}, {"mito": "La IA reemplaza al interiorista.", "realidad": "Reemplaza la forma antigua de trabajar, no el criterio de quien decide."}, {"mito": "Si suena bien, está bien pensado.", "realidad": "El tono convence antes que el contenido. Que suene profesional no lo hace correcto."}, {"mito": "La IA aprende de mis chats y me vigila.", "realidad": "Aprendió una vez, antes. En tu chat solo usa lo que le das, por eso el contexto manda, y por eso no subes datos sensibles de cliente."}]}, "usan_ya": {"titulo": "Quién lo está usando ya", "subtitulo": "de referencia ya han metido la IA en su proceso.", "dato": {"num": "59%", "texto": "de los estudios de arquitectura del Reino Unido usaba IA en 2025 — eran el 41% un año antes.", "fuente": "RIBA AI Report 2025"}, "casos": [{"quien": "Zaha Hadid Architects", "que": "Tienen un equipo propio, **ZHA CODE**, y ya usan IA generativa (Stable Diffusion, Rhino.ai) desde las primeras fases. Más de 20 diseñadores trabajan con extensiones propias sobre NVIDIA Omniverse. Su exposición «Architecture of Possibility» (Shenzhen, 2025-26) muestra ese ecosistema digital.", "fuente": "ArchDaily", "enlace": "https://www.archdaily.com/1037409/zaha-hadid-architects-explores-ai-driven-design-at-architecture-of-possibility-exhibition-in-shenzhen-china"}, {"quien": "Tim Fu · Studio Tim Fu", "que": "Arquitecto ex-Zaha Hadid que montó en Londres un estudio **AI-native**. Acaba de presentar el que llama «primer proyecto arquitectónico totalmente guiado por IA»: siete villas en el lago Bled (Eslovenia).", "fuente": "timfu.com", "enlace": "https://www.timfu.com"}, {"quien": "BIG · Bjarke Ingels Group", "que": "Citado repetidamente como early adopter: exploración formal, optimización y simulación de comportamiento de usuarios con apoyo de IA.", "fuente": "prensa del sector", "enlace": ""}, {"quien": "MVRDV", "que": "Usa IA generativa para imágenes conceptuales y para ganar velocidad en la fase de idea, sin renunciar a su lenguaje propio.", "fuente": "prensa del sector", "enlace": ""}, {"quien": "Hassan Ragab", "que": "Diseñador que se hizo conocido en todo el mundo por su **arquitectura generada con IA**. No construye la mayoría, pero reabrió la pregunta de qué es imaginable.", "fuente": "Instagram · Midjourney", "enlace": "https://www.instagram.com/hsn.ra"}], "cierre": "El patrón no es \"la IA diseña sola\". Es estudios que la usan para **explorar más rápido y decidir con más criterio**. La herramienta cambia; el ojo, no.", "noticias": {"titulo": "Últimas noticias del sector", "items": [{"titular": "Interiorismo 2026: «calma curada» sobre opulencia superficial", "medio": "Dezeen", "fecha": "ene 2026", "enlace": "https://www.dezeen.com/2026/01/06/interior-design-trends-2026/"}, {"titular": "La encuesta de Chaos concluye que «la IA se está convirtiendo en un colaborador activo» en los estudios", "medio": "Dezeen", "fecha": "may 2026", "enlace": "https://www.dezeen.com/2026/05/14/chaos-survey-artificial-intelligence-architecture/"}, {"titular": "Qué esperan los arquitectos de las herramientas de IA en 2026", "medio": "ArchDaily", "fecha": "2026", "enlace": "https://www.archdaily.com/1040024/what-architects-expect-from-ai-tools-in-2026"}, {"titular": "Studio Tim Fu presenta el primer proyecto arquitectónico totalmente guiado por IA", "medio": "Parametric Architecture", "fecha": "2025", "enlace": "https://parametric-architecture.com/studio-tim-fu-ai-architectural-project/"}, {"titular": "¿Qué implica la IA para el interiorismo?", "medio": "Metropolis", "fecha": "2025", "enlace": "https://metropolismag.com/programs/ai-in-interior-design/"}]}, "video": {"yt": "6_aKBUfY2Yc", "titulo": "Qué viene después: 5 pioneros de la IA", "autor": "Business Insider", "dur": ""}}}, "prompting_gym": {"numero": "03", "titulo": "Prompting Gym: aprender a pedir antes de producir", "subtitulo": "Mejores herramientas no salvan instrucciones vagas. Antes de usar IA para diseñar, vender o gestionar un estudio, hay que aprender a formular encargos claros, con contexto, límites y criterio de evaluación.", "tesis": "Prompting no es escribir frases bonitas. Es aprender a dirigir una inteligencia que no conoce tu intención, tu contexto ni tus límites hasta que se los das.", "intro": ["La mayoría de errores con IA no empiezan en la herramienta. **Empiezan en la petición.**", "Pedimos «ideas», «algo bonito», «un texto profesional». Y la IA hace lo que le dejamos: **rellenar los huecos con respuestas promedio.**", "No falla porque no entienda. Falla porque **entiende demasiado rápido** y completa lo que no hemos pensado.", "Un prompt no es una frase al aire. Es **un briefing comprimido**: tarea, contexto, restricciones, formato y criterio de revisión."], "frase_clave": "Un buen prompt no pide una respuesta. Construye las condiciones para que la respuesta pueda ser útil.", "niveles": [{"numero": "N1", "nombre": "Diagnóstico", "titulo": "Antes de mejorar un prompt, hay que saber por qué falla", "claim": "La mayoría de prompts malos no están mal escritos. Están incompletos.", "texto": "Un prompt débil no falla por corto. Falla porque **no dice qué tarea, para quién, con qué límites ni en qué formato**. La IA solo trabaja con lo que dijiste, no con lo que pensaste.", "drills": [{"id": "d01", "titulo": "Drill 01 · Autopsia del prompt malo", "entrena": "Detectar lo que una instrucción no dice antes de intentar mejorarla.", "prompt_malo": "Dame ideas para un hotel boutique en Cabo de Gata.", "que_falta": ["¿Ideas de qué: concepto, distr
