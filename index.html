<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Clase magistral de IA aplicada al interiorismo." />
  <title>IA aplicada al interiorismo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
/* ============================================================
   IA para interioristas · estilos v5
   Editorial contemporáneo · nav lateral · tipografía escalada
   Referencia: supportgreenland.org
   ============================================================ */

:root {
  /* Paleta activista contemporánea — blanco puro, negro cálido, verde tundra */
  --bg:            #FBFAF6;
  --arena:         #F0EDE4;
  --text:          #0F0E0B;
  --text-2:        #5A554E;
  --acento:        #2D4A28;       /* verde tundra profundo */
  --acento-2:      #C13727;       /* rojo bandera de Groenlandia (accent puntual) */
  --arcilla:       #E8E4D8;
  --borde:         rgba(15, 14, 11, 0.12);
  --borde-fuerte:  rgba(15, 14, 11, 0.28);
  --bloque:        #F0EDE4;
  --dark:          #0F0E0B;

  /* Instrument Sans como voz principal (grotesque contemporánea)
     Instrument Serif solo para italic de acento */
  --sans:   "Instrument Sans", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  --serif:  "Instrument Serif", "Times New Roman", Georgia, serif;
  --mono:   "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;

  --max:        1440px;
  --max-content: 1100px;
  --max-narrow: 780px;
  --pad-x:      clamp(24px, 4.5vw, 56px);
  --nav-w:      220px;

  --shadow-hover: 0 12px 40px rgba(30, 23, 18, 0.08);
  --ease:         cubic-bezier(0.22, 0.7, 0.3, 1);
  --dur:          280ms;
}

*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: smooth; scroll-padding-top: 40px; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 17px;
  line-height: 1.55;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

img, svg { max-width: 100%; display: block; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
a { color: inherit; text-decoration: none; }

strong, b { font-weight: 600; color: var(--text); }
em { font-style: italic; }

.skip-link {
  position: absolute; left: -9999px; top: 0;
  background: var(--dark); color: var(--bg);
  padding: 8px 12px; z-index: 100; border-radius: 4px;
}
.skip-link:focus { left: 12px; top: 12px; }

:focus-visible { outline: 2px solid var(--acento); outline-offset: 3px; }

/* ============================================================
   Layout general: aside vertical + main
   ============================================================ */

.wrapper {
  display: grid;
  grid-template-columns: var(--nav-w) 1fr;
  max-width: var(--max);
  margin: 0 auto;
  min-height: 100vh;
}

/* Sidebar */
.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 40px 32px 40px 32px;
  border-right: 1px solid var(--borde);
  background: var(--bg);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  overflow-y: auto;
}
.sidebar-brand {
  display: block;
  font-family: var(--serif);
  font-size: 22px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--text);
  margin-bottom: 40px;
}
.sidebar-brand small {
  display: block;
  font-family: var(--sans);
  font-size: 10.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-2);
  font-weight: 500;
  margin-top: 8px;
}
.sidebar-nav { list-style: none; padding: 0; margin: 0; }
.sidebar-nav li { margin: 0 0 2px; }
.sidebar-nav a {
  display: grid;
  grid-template-columns: 28px 1fr;
  gap: 12px;
  align-items: baseline;
  padding: 8px 0;
  font-size: 13.5px;
  color: var(--text-2);
  border-bottom: 1px solid transparent;
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.sidebar-nav a:hover { color: var(--text); }
.sidebar-nav .num {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.02em;
  color: var(--text-2);
  transition: color var(--dur) var(--ease);
}
.sidebar-nav a.active {
  color: var(--text);
  font-weight: 500;
}
.sidebar-nav a.active .num { color: var(--acento); }
.sidebar-nav a.active .label { border-bottom: 1px solid var(--text); padding-bottom: 1px; }

.sidebar-foot {
  font-family: var(--sans);
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.04em;
  line-height: 1.5;
  padding-top: 24px;
  border-top: 1px solid var(--borde);
}

/* Mobile toggle */
.sidebar-toggle {
  display: none;
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 60;
  width: 44px;
  height: 44px;
  border-radius: 999px;
  background: var(--dark);
  color: var(--bg);
  font-size: 20px;
  line-height: 1;
  align-items: center;
  justify-content: center;
  box-shadow: 0 6px 20px rgba(30, 23, 18, 0.2);
}

@media (max-width: 960px) {
  .wrapper { grid-template-columns: 1fr; }
  .sidebar {
    position: fixed;
    inset: 0;
    z-index: 50;
    border-right: 0;
    transform: translateX(-100%);
    transition: transform var(--dur) var(--ease);
    padding: 64px 32px 40px;
    background: var(--bg);
  }
  .sidebar.abierto { transform: translateX(0); }
  .sidebar-toggle { display: inline-flex; }
}

main {
  min-width: 0;
  padding: 0 var(--pad-x);
}

/* ============================================================
   Secciones — genéricas
   ============================================================ */

.seccion {
  padding: clamp(72px, 10vw, 128px) 0;
  border-bottom: 1px solid var(--borde);
  max-width: var(--max-content);
}
.seccion:last-of-type { border-bottom: 0; }

.seccion--wide { max-width: 100%; }

.sec-tag {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em;
  color: var(--acento);
  text-transform: uppercase;
  margin: 0 0 24px;
  display: flex;
  align-items: center;
  gap: 14px;
}
.sec-tag::before {
  content: "";
  width: 32px;
  height: 1px;
  background: var(--acento);
  display: inline-block;
}
.sec-titulo {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(48px, 8vw, 128px);
  line-height: 0.92;
  letter-spacing: -0.035em;
  margin: 0 0 28px;
}
.sec-subtitulo {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(22px, 2.6vw, 32px);
  line-height: 1.28;
  color: var(--text);
  margin: 0;
  max-width: 780px;
}
.sec-subtitulo strong { color: var(--text); }
.sec-intro {
  max-width: 720px;
  margin: 48px 0 0;
}
.sec-intro p {
  margin: 0 0 22px;
  font-size: 17.5px;
  line-height: 1.65;
  color: var(--text);
}
.sec-intro p strong { color: var(--text); }
.sec-intro p:last-child { margin-bottom: 0; }

/* ============================================================
   Hero
   ============================================================ */

.hero {
  padding: clamp(56px, 10vw, 120px) 0 clamp(56px, 8vw, 96px);
  border-bottom: 1px solid var(--borde);
  max-width: var(--max-content);
}
.hero-etiqueta {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-2);
  margin: 0 0 clamp(48px, 6vw, 72px);
  font-weight: 500;
}
.hero-titulo {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(72px, 14vw, 196px);
  line-height: 0.85;
  letter-spacing: -0.045em;
  margin: 0 0 clamp(32px, 4vw, 48px);
  color: var(--text);
}
.hero-titulo em {
  font-style: italic;
  color: var(--acento);
}
.hero-subtitulo {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(24px, 2.8vw, 34px);
  line-height: 1.3;
  color: var(--text);
  margin: 0 0 48px;
  max-width: 820px;
}
.hero-subtitulo strong { font-style: normal; color: var(--text); }
.hero-claim {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(30px, 4.4vw, 60px);
  line-height: 1;
  letter-spacing: -0.035em;
  color: var(--acento);
  margin: clamp(48px, 6vw, 80px) 0 16px;
  max-width: 900px;
}
.hero-subclaim {
  font-family: var(--sans);
  font-size: 14px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-2);
  font-weight: 500;
  margin: 0 0 48px;
}
.hero-texto {
  max-width: 680px;
  font-size: 17.5px;
  line-height: 1.65;
  color: var(--text);
  margin: 0 0 clamp(48px, 6vw, 72px);
}
.hero-texto strong { color: var(--text); }

.hero-cifras {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  border-top: 1px solid var(--borde);
  padding-top: 32px;
  margin: 0;
}
@media (max-width: 720px) {
  .hero-cifras { grid-template-columns: repeat(2, 1fr); gap: 24px 16px; }
}
.hero-cifra .num {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(48px, 6vw, 96px);
  line-height: 1;
  color: var(--acento);
  letter-spacing: -0.04em;
  display: block;
}
.hero-cifra .label {
  font-family: var(--sans);
  font-size: 12px;
  letter-spacing: 0.08em;
  color: var(--text-2);
  margin-top: 8px;
  display: block;
}

/* ---- Ponente ---- */
.hero-ponente {
  margin-top: clamp(48px, 6vw, 72px);
  padding-top: clamp(40px, 5vw, 56px);
  border-top: 1px solid var(--borde);
}
.ponente-etiqueta {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--acento);
  margin: 0 0 28px;
}
.ponente-cuerpo {
  display: flex;
  gap: clamp(20px, 3vw, 36px);
  align-items: flex-start;
}
@media (max-width: 640px) {
  .ponente-cuerpo { flex-direction: column; gap: 20px; }
}
.ponente-avatar {
  flex: 0 0 auto;
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: var(--acento);
  color: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--sans);
  font-weight: 500;
  font-size: 32px;
  letter-spacing: -0.03em;
}
.ponente-texto { max-width: 720px; }
.ponente-nombre {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(28px, 3.4vw, 40px);
  line-height: 1;
  letter-spacing: -0.03em;
  color: var(--text);
  margin: 0 0 8px;
}
.ponente-rol {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 2vw, 22px);
  color: var(--acento);
  margin: 0 0 20px;
}
.ponente-bio p {
  font-size: 16.5px;
  line-height: 1.6;
  color: var(--text-2);
  margin: 0 0 14px;
  max-width: 660px;
}
.ponente-bio strong { color: var(--text); font-weight: 500; }
.ponente-trayectoria {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 20px 0 0;
}
.ponente-chip {
  font-family: var(--mono);
  font-size: 11.5px;
  letter-spacing: 0.04em;
  color: var(--text-2);
  padding: 5px 12px;
  border: 1px solid var(--borde);
  border-radius: 100px;
}
.ponente-enlaces {
  display: flex;
  gap: 20px;
  margin: 22px 0 0;
}
.ponente-link {
  font-family: var(--sans);
  font-weight: 500;
  font-size: 14px;
  color: var(--text);
  text-decoration: none;
  border-bottom: 1px solid var(--acento);
  padding-bottom: 2px;
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.ponente-link:hover { color: var(--acento); border-color: var(--acento-2); }

/* ============================================================
   Aviso general
   ============================================================ */

.aviso-general {
  margin: clamp(48px, 6vw, 72px) 0 0;
  padding: 32px 0;
  border-top: 1px solid var(--borde);
  border-bottom: 1px solid var(--borde);
  max-width: 900px;
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 32px;
}
@media (max-width: 720px) { .aviso-general { grid-template-columns: 1fr; gap: 12px; } }
.aviso-etiqueta {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--acento);
  font-weight: 500;
  margin: 4px 0 0;
}
.aviso-texto {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 1.9vw, 22px);
  line-height: 1.4;
  color: var(--text);
  margin: 0;
}
.aviso-texto strong { color: var(--text); font-style: normal; }

/* ============================================================
   Estado del arte · tarjetas
   ============================================================ */

.tarjetas-estado {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 32px 24px;
  margin-top: 56px;
}
.tarjeta-estado {
  padding: 32px 0 40px;
  border-top: 1px solid var(--borde-fuerte);
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.tarjeta-estado:nth-child(1) { grid-column: span 12; padding-top: 40px; }
.tarjeta-estado:nth-child(2) { grid-column: span 7; }
.tarjeta-estado:nth-child(3) { grid-column: span 5; }
.tarjeta-estado:nth-child(4) { grid-column: span 5; }
.tarjeta-estado:nth-child(5) { grid-column: span 7; }
@media (max-width: 960px) {
  .tarjeta-estado { grid-column: span 12 !important; }
}
.tarjeta-numero {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  color: var(--text-2);
  text-transform: uppercase;
}
.tarjeta-titulo {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(28px, 3vw, 40px);
  line-height: 1.05;
  letter-spacing: -0.015em;
  margin: 0;
}
.tarjeta-texto {
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  margin: 0;
  max-width: 660px;
}
.tarjeta-texto strong { color: var(--text); }
.tarjeta-claim {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(22px, 2.4vw, 28px);
  line-height: 1.25;
  color: var(--acento);
  margin: 8px 0 0;
  max-width: 620px;
}

.tarjeta-comparativa {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-top: 4px;
}
.tarjeta-comparativa .col {
  padding: 0;
  font-size: 14px;
  line-height: 1.5;
}
.tarjeta-comparativa .col-etiqueta {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-2);
  margin: 0 0 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--borde);
}
.tarjeta-comparativa .col-debil { color: var(--text-2); }
.tarjeta-comparativa .col-fuerte { color: var(--text); font-weight: 500; }

.tarjeta-flujo { margin-top: 4px; }
.tarjeta-flujo-cadena {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  line-height: 1.9;
  margin: 0 0 10px;
  overflow-wrap: anywhere;
}
.tarjeta-flujo-capa {
  font-family: var(--sans);
  font-size: 12.5px;
  color: var(--acento);
  font-weight: 500;
  margin: 0;
  letter-spacing: 0.02em;
}

.tarjeta-preguntas {
  margin-top: 4px;
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tarjeta-preguntas .p {
  font-family: var(--serif);
  font-style: italic;
  font-size: 15px;
  color: var(--text-2);
  padding: 4px 0;
}
.tarjeta-preguntas .p:not(:last-child)::after {
  content: "·";
  margin-left: 6px;
  color: var(--acento);
}

.tarjeta-escalera {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  margin-top: 4px;
}
.tarjeta-escalera .step {
  padding: 12px 8px;
  text-align: center;
  border-top: 2px solid var(--borde);
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--text-2);
}
.tarjeta-escalera .step:nth-child(1) { border-color: rgba(183,101,69,0.2); color: var(--text-2); padding-top: 12px; }
.tarjeta-escalera .step:nth-child(2) { border-color: rgba(183,101,69,0.35); padding-top: 24px; }
.tarjeta-escalera .step:nth-child(3) { border-color: rgba(183,101,69,0.55); padding-top: 36px; }
.tarjeta-escalera .step:nth-child(4) { border-color: rgba(183,101,69,0.78); color: var(--text); padding-top: 48px; }
.tarjeta-escalera .step:nth-child(5) { border-color: var(--acento); color: var(--acento); font-weight: 500; padding-top: 60px; }

/* ============================================================
   Prompting Gym
   ============================================================ */

.pg-tesis {
  max-width: 780px;
  margin: 48px 0 0;
  padding: 0 0 0 24px;
  border-left: 3px solid var(--acento);
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(22px, 2.4vw, 28px);
  line-height: 1.3;
  color: var(--text);
}
.pg-frase-clave {
  margin: 48px 0 0;
  max-width: 720px;
  font-family: var(--serif);
  font-size: clamp(24px, 2.6vw, 30px);
  line-height: 1.3;
  color: var(--acento);
  padding-top: 32px;
  border-top: 1px solid var(--borde);
}

.pg-nivel {
  margin-top: clamp(64px, 9vw, 112px);
  border-top: 1px solid var(--borde-fuerte);
  padding-top: 48px;
}
.pg-nivel-header {
  display: grid;
  grid-template-columns: 120px 1fr;
  gap: 32px;
  margin-bottom: 32px;
}
@media (max-width: 720px) { .pg-nivel-header { grid-template-columns: 1fr; gap: 8px; } }
.pg-nivel-etiqueta {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.1em;
  color: var(--acento);
  margin: 8px 0 0;
  text-transform: uppercase;
}
.pg-nivel-titulo {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(32px, 4.5vw, 52px);
  line-height: 1.02;
  letter-spacing: -0.015em;
  margin: 0 0 20px;
}
.pg-nivel-claim {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(20px, 2.3vw, 26px);
  color: var(--acento);
  margin: 0 0 24px;
  max-width: 680px;
}
.pg-nivel-texto {
  max-width: 720px;
  margin: 0 0 40px;
  font-size: 16.5px;
  line-height: 1.65;
  color: var(--text);
}

.pg-scaffold {
  margin: 32px 0 48px;
  max-width: 780px;
  padding: 32px 0;
  border-top: 1px solid var(--borde-fuerte);
  border-bottom: 1px solid var(--borde-fuerte);
}
.pg-scaffold-titulo {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--acento);
  margin: 0 0 24px;
}
.pg-scaffold-bloque {
  padding: 14px 0;
  border-bottom: 1px solid var(--borde);
  display: grid;
  grid-template-columns: 200px 1fr;
  gap: 24px;
  align-items: baseline;
}
.pg-scaffold-bloque:last-child { border-bottom: 0; }
.pg-scaffold-clave {
  font-family: var(--mono);
  font-size: 13px;
  letter-spacing: 0.06em;
  color: var(--text);
  font-weight: 500;
}
.pg-scaffold-desc {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text);
}
.pg-scaffold-frase {
  margin: 24px 0 0;
  font-family: var(--serif);
  font-style: italic;
  font-size: 20px;
  color: var(--acento);
}
@media (max-width: 700px) {

.ejer-etiqueta {

.ejer-cierre {

/* ============================================================
   Cierre
   ============================================================ */

}

.cinco-ideas {

}

.cierre-contrastes {

.cierre-contraste .ia {

.cierre-frase-final {
  margin: clamp(96px, 12vw, 176px) 0 clamp(48px, 6vw, 96px);

  border-top: 1px solid var(--borde);

  font-weight: 500;

/* ============================================================
   Casos (grid + expansión) — se mantiene funcional
   ============================================================ */

.vista { animation: fadeSlide var(--dur) var(--ease); }
.vista[hidden] { display: none !important; }
@keyframes fadeSlide {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.ambito-header {
  max-width: var(--max-narrow);
  margin-bottom: clamp(48px, 7vw, 88px);
  padding: clamp(48px, 6vw, 72px) 0 0;
}
.breadcrumb {
  display: flex; gap: 10px; align-items: center;
  font-family: var(--mono); font-size: 12px;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--text-2); margin-bottom: 40px;
}
.breadcrumb a { transition: color var(--dur) var(--ease); }
.breadcrumb a:hover { color: var(--acento); }
.ambito-numero {
  font-family: var(--mono); color: var(--acento);
  font-size: 13px; letter-spacing: 0.06em; margin: 0 0 16px;
}
.ambito-titulo {
  font-family: var(--serif); font-weight: 400;

  flex-direction: column;

.card-caso.abierta {
  grid-column: 1 / -1;

}
.card-caso:not(.abierta):hover,
.card-caso:not(.abierta):focus-within { background: var(--arena); }
.caso-toggle {
  padding: 28px 24px 32px;
  text-align: left; width: 100%;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 14px;
  color: inherit;
}
.caso-meta {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.caso-numero {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--acento);
  letter-spacing: 0.04em;
}
.pill {
  display: inline-block;
  padding: 3px 10px 4px;
  border: 1px solid var(--borde-fuerte);
  border-radius: 0;
  font-family: var(--mono);
  font-size: 10.5px;
  font-weight: 500;
  color: var(--text);
  letter-spacing: 0.04em;

}
.badge-destacado {
  padding: 3px 10px 4px;

  font-size: 10px;
  font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase;

.card-caso--destacado:not(.abierta):hover,
.card-caso--destacado:not(.abierta):focus-within { background: var(--arena); }

  font-family: var(--serif); font-style: italic;

  font-family: var(--sans); font-size: 12.5px; line-height: 1.45; opacity: 0.9;

.caso-titulo {
  font-family: var(--serif); font-weight: 400;

  margin: 4px 0 8px; letter-spacing: -0.005em;

.card-caso.abierta .caso-titulo {

.caso-descripcion { font-size: 14.5px; color: var(--text-2); line-height: 1.5; margin: 0; }

.caso-etiquetas { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }

.detalle-seccion { margin-top: 32px; max-width: 820px; }

.detalle-etiqueta {
  font-family: var(--mono); font-size: 11px;
  letter-spacing: 0.14em; text-transform: uppercase;

.bloque-input {
  border-top: 1px solid var(--borde); border-bottom: 1px solid var(--borde);

.pasos { list-style: none; counter-reset: paso; padding: 0; margin: 0; }

  counter-increment: paso;
  padding: 24px 0; border-bottom: 1px solid var(--borde);

}
.pasos li:last-child { border-bottom: 0; }
.pasos li::before {
  content: counter(paso, decimal-leading-zero);

  color: var(--acento); padding-top: 2px; letter-spacing: 0.04em;

.paso-texto { font-size: 16px; line-height: 1.65; }
.paso-prompt {
  margin-top: 12px;
  background: var(--dark); color: var(--bg);
  padding: 20px 24px 44px;
  font-family: var(--mono); font-size: 13px; line-height: 1.65;
  white-space: pre-wrap; word-break: break-word; position: relative;
}
.paso-prompt::before {
  content: "PROMPT"; position: absolute; top: 12px; right: 16px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.14em;
  color: var(--arcilla); font-weight: 500;
}
.btn-copiar {
  position: absolute; bottom: 12px; right: 16px;
  font-family: var(--mono); font-size: 11px;
  color: var(--arcilla); background: transparent;
  border: 1px solid rgba(232, 216, 200, 0.3);
  padding: 4px 12px; letter-spacing: 0.06em; text-transform: uppercase;
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.btn-copiar:hover { color: var(--bg); border-color: var(--bg); }
.btn-cerrar-caso {
  margin-top: 48px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text-2); border: 1px solid var(--borde-fuerte);
  padding: 12px 20px;
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.btn-cerrar-caso:hover { color: var(--acento); border-color: var(--acento); }
.btn-cerrar-flotante {
  display: none; width: 44px; height: 44px;
  background: var(--dark); color: var(--bg);
  font-size: 24px; line-height: 1;
  align-items: center; justify-content: center;
  z-index: 40;
}

.aviso-caso {
  padding: 20px 24px;
  background: #F5E4DA; border: 1px solid #E1BFB0;
  border-left: 3px solid var(--acento);
}
.aviso-caso .aviso-texto {
  font-style: normal; font-family: var(--sans);
  font-size: 14.5px; line-height: 1.55; color: #4A2314;
}
.aviso-caso .aviso-etiqueta { color: var(--acento); }

.btn-volver {
  position: fixed; top: 20px; right: 24px; z-index: 40;
  background: var(--dark); color: var(--bg);
  border: 0; padding: 12px 20px 12px 16px;
  font-family: var(--mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
  display: inline-flex; align-items: center; gap: 10px;
  transition: transform var(--dur) var(--ease);
}
.btn-volver:hover { transform: translateY(-1px); }
.btn-volver[hidden] { display: none; }

/* Biblioteca prompts por fase */
.biblio-link-wrap { margin: 48px 0 0; }
.biblio-link {
  display: inline-flex;
  align-items: center; gap: 12px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: var(--text); padding: 14px 24px;
  border: 1px solid var(--borde-fuerte);
  transition: color var(--dur) var(--ease), border-color var(--dur) var(--ease), background var(--dur) var(--ease);
}
.biblio-link::after { content: "→"; color: var(--acento); font-family: var(--sans); }
.biblio-link:hover { color: var(--bg); background: var(--acento); border-color: var(--acento); }
.biblio-link:hover::after { color: var(--bg); }

.biblio-header { max-width: var(--max-narrow); margin-bottom: 56px; padding: clamp(48px, 6vw, 72px) 0 0; }
.biblio-fases { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0; border-top: 1px solid var(--borde-fuerte); }
@media (max-width: 900px) { .biblio-fases { grid-template-columns: 1fr; } }
.fase-card {
  padding: 32px 24px 32px 0;
  border-right: 1px solid var(--borde);
  border-bottom: 1px solid var(--borde);
  display: flex; flex-direction: column; gap: 14px;
}
.fase-card:nth-child(2n) { padding-right: 0; padding-left: 24px; border-right: 0; }
.fase-titulo {
  font-family: var(--serif); font-weight: 400;
  font-size: clamp(24px, 2.4vw, 30px); line-height: 1.1;
  margin: 0; letter-spacing: -0.01em;
}
.fase-objetivo, .fase-input, .fase-revision {
  font-size: 14.5px; line-height: 1.55; color: var(--text); margin: 0;
}
.fase-objetivo strong, .fase-input strong, .fase-revision strong {
  font-family: var(--mono); font-weight: 500;
  color: var(--acento); letter-spacing: 0.14em;
  font-size: 10.5px; text-transform: uppercase;
  display: block; margin-bottom: 6px;
}
.fase-card .paso-prompt {
  margin-top: 4px; font-size: 12.5px; padding: 16px 20px 40px;
}
.fase-revision {
  padding-top: 14px;
  border-top: 1px solid var(--borde);
  font-family: var(--serif); font-style: italic;
}

/* Pie */
.pie {
  padding: 40px 0 64px;
  border-top: 1px solid var(--borde-fuerte);
  margin-top: clamp(72px, 10vw, 128px);
  font-size: 12px;
  color: var(--text-2);
  font-family: var(--mono);
  letter-spacing: 0.04em;
  line-height: 1.6;
}
.pie p { margin: 0; }

/* Responsive del grid de ámbitos en móvil de la vista casos */
@media (max-width: 1024px) { .grid-casos { grid-template-columns: repeat(2, 1fr); } .card-caso:nth-child(3n) { border-right: 1px solid var(--borde); } .card-caso:nth-child(2n) { border-right: 0; } }
@media (max-width: 720px) {
  .grid-casos { grid-template-columns: 1fr; }
  .card-caso { border-right: 0 !important; }
  .card-caso.abierta {
    grid-column: 1;
    position: fixed; inset: 0;
    z-index: 30;
    overflow-y: auto;
    background: var(--bg);
    animation: fadeSlide var(--dur) var(--ease);
  }
  .card-caso.abierta .caso-toggle { padding: 64px 20px 20px; }
  .card-caso.abierta .caso-detalle { padding: 0 20px 40px; }
  .card-caso.abierta .btn-cerrar-flotante { display: flex; position: fixed; top: 16px; right: 16px; }
  .pasos li { grid-template-columns: 36px 1fr; gap: 16px; }
}

/* ============================================================
   Estado del arte — sub-bloques (evolución, claves, sector)
   ============================================================ */

.sub-bloque {
  margin-top: clamp(64px, 8vw, 96px);
  padding-top: clamp(48px, 6vw, 64px);
  border-top: 1px solid var(--borde-fuerte);
}
.sub-titulo {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(30px, 4vw, 52px);
  line-height: 0.98;
  letter-spacing: -0.03em;
  margin: 0 0 40px;
  max-width: 900px;
}

/* Evolución: timeline tipográfico */
.evolucion-lista {
  max-width: 760px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.evolucion-p {
  margin: 0;
  padding: 18px 0;
  border-bottom: 1px solid var(--borde);
  font-size: clamp(17px, 1.9vw, 20px);
  line-height: 1.5;
  color: var(--text);
}
.evolucion-p:last-child { border-bottom: 0; }
.evolucion-p strong { color: var(--text); }

/* Claves: rejilla de propiedades */
.claves-lista {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid var(--borde-fuerte);
}
@media (max-width: 720px) { .claves-lista { grid-template-columns: 1fr; } }
.clave {
  padding: 24px 32px 24px 0;
  border-right: 1px solid var(--borde);
  border-bottom: 1px solid var(--borde);
}
.clave:nth-child(2n) { padding-right: 0; padding-left: 32px; border-right: 0; }
@media (max-width: 720px) { .clave { padding: 20px 0; border-right: 0; } .clave:nth-child(2n) { padding-left: 0; } }
.clave-lead {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(20px, 2.2vw, 26px);
  line-height: 1.15;
  color: var(--acento);
  margin: 0 0 8px;
}
.clave-texto {
  font-size: 15px;
  line-height: 1.55;
  color: var(--text-2);
  margin: 0;
}
.claves-cierre {
  margin: 40px 0 0;
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(22px, 2.6vw, 30px);
  line-height: 1.25;
  color: var(--text);
  max-width: 720px;
}

/* Sector: retos con fuentes */
.sector-intro {
  max-width: 760px;
  font-size: clamp(17px, 1.9vw, 20px);
  line-height: 1.6;
  margin: 0 0 40px;
  color: var(--text);
}
.sector-intro strong { color: var(--text); }
.fuente {
  display: inline;
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.06em;
  color: var(--text-2);
  text-transform: uppercase;
  white-space: nowrap;
}
.retos-lista {
  border-top: 1px solid var(--borde-fuerte);
}
.reto {
  display: grid;
  grid-template-columns: 60px 1fr;
  gap: 24px;
  padding: 28px 0;
  border-bottom: 1px solid var(--borde);
  align-items: start;
}
@media (max-width: 600px) { .reto { grid-template-columns: 1fr; gap: 8px; } }
.reto-num {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--acento);
  padding-top: 4px;
  letter-spacing: 0.04em;
}
.reto-titulo {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(22px, 2.6vw, 30px);
  line-height: 1.1;
  margin: 0 0 10px;
  letter-spacing: -0.01em;
}
.reto-texto {
  font-size: 15.5px;
  line-height: 1.6;
  color: var(--text);
  margin: 0;
  max-width: 720px;
}
.reto-texto .fuente { display: inline-block; margin-top: 6px; }
.sector-cita {
  margin: 48px 0 0;
  padding: 32px 0 0;
  border-top: 1px solid var(--borde-fuerte);
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(26px, 3.4vw, 44px);
  line-height: 1.15;
  color: var(--text);
  letter-spacing: -0.015em;
  max-width: 960px;
}
.sector-cita cite {
  display: block;
  font-family: var(--mono);
  font-style: normal;
  font-size: 12px;
  letter-spacing: 0.06em;
  color: var(--text-2);
  text-transform: uppercase;
  margin-top: 20px;
}
.sector-frase {
  margin: 40px 0 0;
  font-family: var(--serif);
  font-size: clamp(22px, 2.6vw, 30px);
  line-height: 1.25;
  color: var(--acento);
  max-width: 760px;
}

/* ============================================================
   Lo que viene — reflexiones prospectivas
   ============================================================ */

.lqv-intro {
  max-width: 820px;
  margin: 0 0 clamp(56px, 8vw, 88px);
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(22px, 2.6vw, 32px);
  line-height: 1.3;
  color: var(--text);
}
.lqv-intro strong { font-style: normal; color: var(--text); }

.lqv-lista {
  border-top: 1px solid var(--borde-fuerte);
}
.lqv-reflexion {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 32px;
  padding: 48px 0;
  border-bottom: 1px solid var(--borde);
  align-items: start;
}
@media (max-width: 720px) { .lqv-reflexion { grid-template-columns: 1fr; gap: 16px; } }
.lqv-num {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(48px, 6vw, 88px);
  line-height: 0.85;
  color: var(--acento);
  letter-spacing: -0.05em;
}
.lqv-titulo-r {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(28px, 3.6vw, 46px);
  line-height: 1.02;
  letter-spacing: -0.02em;
  margin: 0 0 20px;
  max-width: 900px;
}
.lqv-texto {
  font-size: clamp(16px, 1.8vw, 18px);
  line-height: 1.65;
  color: var(--text);
  margin: 0;
  max-width: 760px;
}
.lqv-texto strong { color: var(--text); }
.lqv-fuente {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-2);
  margin: 16px 0 0;
}
.lqv-cierre {
  margin-top: 56px;
  padding-top: 40px;
  border-top: 1px solid var(--borde-fuerte);
  max-width: var(--max-narrow);
}
.lqv-cierre-texto {
  font-size: clamp(17px, 1.9vw, 20px);
  line-height: 1.6;
  color: var(--text);
  margin: 0 0 24px;
}
.lqv-frase {
  margin: 0;
  font-family: var(--serif);
  font-size: clamp(28px, 3.6vw, 46px);
  line-height: 1.08;
  color: var(--acento);
  letter-spacing: -0.015em;
}

/* ============================================================
   Ejercicios · un caso por ámbito (probar con datos fake)
   ============================================================ */

.ej-nota-datos {
  max-width: 760px;
  margin: 0 0 40px;
  padding: 18px 22px;
  background: var(--bloque);
  border-left: 3px solid var(--acento-2);
  font-size: 14px;
  line-height: 1.55;
  color: var(--text);
}
.ej-nota-lbl {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--acento-2);
  margin-bottom: 6px;
}

.ej-lista {
  border-top: 1px solid var(--borde-fuerte);
}
.ej-caso {
  display: grid;
  grid-template-columns: 88px 1fr;
  gap: 28px;
  padding: 40px 0;
  border-bottom: 1px solid var(--borde);
  align-items: start;
}
@media (max-width: 720px) { .ej-caso { grid-template-columns: 1fr; gap: 12px; } }
.ej-caso-num {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(48px, 6vw, 80px);
  line-height: 0.85;
  color: var(--acento);
  letter-spacing: -0.05em;
}
.ej-caso-ambito {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-2);
  margin: 0 0 8px;
}
.ej-caso-titulo {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(26px, 3.2vw, 40px);
  line-height: 1.05;
  letter-spacing: -0.015em;
  margin: 0 0 12px;
  max-width: 780px;
}
.ej-caso .pill { margin-bottom: 16px; }
.ej-caso-prueba {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 2vw, 22px);
  line-height: 1.35;
  color: var(--text);
  margin: 0 0 20px;
  max-width: 720px;
}
.ej-caso-datos {
  padding: 18px 22px;
  background: var(--bloque);
  border: 1px solid var(--borde);
  margin: 0 0 20px;
  max-width: 760px;
}
.ej-caso-datos-lbl {
  display: block;
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--acento);
  margin-bottom: 10px;
}
.ej-caso-datos-texto {
  font-size: 14.5px;
  line-height: 1.6;
  color: var(--text);
  margin: 0;
}
.ej-caso-link {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--acento);
  border-bottom: 1px solid var(--borde-fuerte);
  padding-bottom: 3px;
  transition: border-color var(--dur) var(--ease);
}
.ej-caso-link:hover { border-color: var(--acento); }

/* ============================================================
   Lo que la IA no puede habitar (finale)
   ============================================================ */

.no-habitar {
  margin-top: clamp(56px, 8vw, 88px);
  padding-top: 40px;
  border-top: 1px solid var(--borde-fuerte);
}
.no-habitar-titulo {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(28px, 4vw, 48px);
  line-height: 1.02;
  letter-spacing: -0.02em;
  margin: 0 0 16px;
}
.no-habitar-intro {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(19px, 2.2vw, 24px);
  color: var(--text-2);
  margin: 0 0 32px;
  max-width: 720px;
}
.no-habitar-lista {
  list-style: none;
  padding: 0;
  margin: 0;
  max-width: 760px;
  border-top: 1px solid var(--borde);
}
.no-habitar-lista li {
  padding: 16px 0;
  border-bottom: 1px solid var(--borde);
  font-size: clamp(16px, 1.9vw, 20px);
  line-height: 1.5;
  color: var(--text);
}
.no-habitar-lista li::before { content: "— "; color: var(--acento); }
.no-habitar-lista strong { color: var(--text); }

/* ============================================================
   Finale · epílogo (el valor del interiorista fundido)
   ============================================================ */

.sec-tag--final {
  color: var(--acento-2);
}
.sec-tag--final::before { background: var(--acento-2); }

.epilogo {
  margin-top: clamp(72px, 10vw, 120px);
  padding-top: clamp(48px, 6vw, 72px);
  border-top: 1px solid var(--borde-fuerte);
}
.epilogo-titulo {
  font-family: var(--serif);
  font-weight: 400;
  font-size: clamp(32px, 4.5vw, 56px);
  line-height: 1.02;
  letter-spacing: -0.02em;
  margin: 0 0 32px;
  max-width: 820px;
}
.epilogo-parrafos { max-width: 760px; margin: 0 0 40px; }
.epilogo-parrafos p {
  font-size: clamp(18px, 2vw, 22px);
  line-height: 1.5;
  color: var(--text);
  margin: 0 0 24px;
}
.epilogo-parrafos p strong { color: var(--text); }
.epilogo-contrastes {
  border-top: 1px solid var(--borde-fuerte);
  margin: 0 0 48px;
}
.epilogo-frase {
  margin: 0;
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(40px, 8vw, 128px);
  line-height: 0.9;
  letter-spacing: -0.045em;
  color: var(--acento);
}

/* ============================================================
   Tarjeta de vídeo (carga diferida)
   ============================================================ */

.video-card {
  display: grid;
  grid-template-columns: 96px 1fr;
  gap: 24px;
  align-items: center;
  max-width: 760px;
  padding: 24px;
  border: 1px solid var(--borde-fuerte);
  background: var(--bg);
  cursor: pointer;
  transition: background var(--dur) var(--ease), border-color var(--dur) var(--ease);
}
.video-card:hover { background: var(--arena); border-color: var(--acento); }
.video-card-play {
  width: 96px; height: 72px;
  display: flex; align-items: center; justify-content: center;
  background: var(--dark); color: var(--bg);
  border: 0; cursor: pointer;
}
.video-card-tri { font-size: 22px; margin-left: 4px; }
.video-card-tag {
  font-family: var(--mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--acento);
}
.video-card-titulo {
  font-family: var(--serif);
  font-size: clamp(20px, 2.2vw, 26px);
  line-height: 1.15;
  margin: 6px 0 4px;
}
.video-card-desc { font-size: 14px; color: var(--text-2); margin: 0; line-height: 1.5; }
.video-card.cargado { display: block; padding: 0; border: 0; background: none; cursor: default; }
.video-frame { position: relative; width: 100%; max-width: 760px; aspect-ratio: 16 / 9; }
.video-frame iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: 0; }
@media (max-width: 560px) {
  .video-card { grid-template-columns: 1fr; gap: 14px; }
  .video-card-play { width: 100%; height: 56px; }
}

/* ============================================================
   Quién lo está usando ya
   ============================================================ */

.usan-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 2vw, 22px);
  color: var(--text-2);
  margin: 0 0 32px;
  max-width: 720px;
}
.usan-dato {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 24px;
  align-items: center;
  padding: 24px 0;
  border-top: 1px solid var(--borde-fuerte);
  border-bottom: 1px solid var(--borde-fuerte);
  margin: 0 0 40px;
  max-width: 720px;
}
.usan-dato-num {
  font-family: var(--sans);
  font-weight: 500;
  font-size: clamp(56px, 8vw, 96px);
  line-height: 0.85;
  letter-spacing: -0.05em;
  color: var(--acento);
}
.usan-dato-texto { font-size: 15.5px; line-height: 1.5; color: var(--text); margin: 0; }
.usan-lista {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 0;
  border-top: 1px solid var(--borde-fuerte);
}
@media (max-width: 780px) { .usan-lista { grid-template-columns: 1fr; } }
.usan-caso {
  padding: 28px 32px 28px 0;
  border-right: 1px solid var(--borde);
  border-bottom: 1px solid var(--borde);
}
.usan-caso:nth-child(2n) { padding-right: 0; padding-left: 32px; border-right: 0; }

/* Últimas noticias */

/* Acciones del ejercicio (descarga + ver caso) */

}

/* ============================================================
   Mitos y realidades
   ============================================================ */

.mitos-sub {
  font-family: var(--serif);
  font-style: italic;
  font-size: clamp(18px, 2vw, 22px);

}
.mitos-lista { border-top: 1px solid var(--borde-fuerte); max-width: 900px; }
.mito {

  align-items: baseline;

}
@media (max-width: 640px) {

}
.mito-falso {

/* ============================================================
   Glosario (dentro del Kit)
   ============================================================ */

}

  font-size: clamp(24px, 3vw, 40px);

}
.glosario-sub { font-size: 14px; color: var(--text-2); margin: 0 0 32px; }
.glosario-lista {

  gap: 0;
  margin: 0;
  border-top: 1px solid var(--borde);
}
@media (max-width: 720px) { .glosario-lista { grid-template-columns: 1fr; } }
.glosario-item {

  color: var(--acento);
  letter-spacing: 0.02em;

}
.glosario-item dd { margin: 0; font-size: 14px; line-height: 1.5; color: var(--text); }

/* ============================================================
   Kit de herramientas (apéndice)
   ============================================================ */

.kit-cat {
  margin-top: clamp(48px, 6vw, 72px);
  padding-top: 32px;
  border-top: 1px solid var(--borde-fuerte);
}

  font-weight: 500;
  font-size: clamp(20px, 2.4vw, 30px);

}
.kit-tools {

  grid-template-columns: repeat(3, 1fr);
  gap: 1px;

}
@media (max-width: 900px) { .kit-tools { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 560px) { .kit-tools { grid-template-columns: 1fr; } }
.kit-tool {
  background: var(--bg);
  padding: 22px 22px 24px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.kit-tool-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  gap: 12px;
}
.kit-tool-nombre {
  font-family: var(--serif);
  font-weight: 400;
  font-size: 22px;
  line-height: 1.1;
  margin: 0;
  letter-spacing: -0.01em;
}
.kit-tool-link {

  font-size: 10.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--acento);
  white-space: nowrap;
  border-bottom: 1px solid transparent;
  transition: border-color var(--dur) var(--ease);
}
a.kit-tool-link:hover { border-color: var(--acento); }
.kit-tool-link--pend { color: var(--text-2); }
.kit-tool-que {
  font-size: 14px;
  line-height: 1.5;
  color: var(--text);
  margin: 0;
}
.kit-tool-cuando {
  font-size: 13px;
  line-height: 1.45;
  color: var(--text-2);
  margin: 0;
  padding-top: 10px;
  border-top: 1px solid var(--borde);
}
.kit-tool-cuando-lbl {
  display: block;
  font-family: var(--mono);
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--acento);
  margin-bottom: 4px;
}
.kit-nota {
  margin: 48px 0 0;
  padding: 16px 20px;
  background: var(--bloque);
  border-left: 3px solid var(--acento-2);
  font-size: 13px;
  line-height: 1.55;
  color: var(--text-2);
  max-width: 760px;
}

/* ============================================================
   Reveal on scroll — fade + slide-up
   Se activan al añadir la clase .is-visible via IntersectionObserver
   ============================================================ */

[data-reveal] {
  opacity: 0;
  transform: translateY(28px);
  transition: opacity 900ms var(--ease), transform 900ms var(--ease);
  will-change: opacity, transform;
}
[data-reveal].is-visible {
  opacity: 1;
  transform: translateY(0);
}
[data-reveal][data-reveal-delay="1"] { transition-delay: 80ms; }
[data-reveal][data-reveal-delay="2"] { transition-delay: 160ms; }
[data-reveal][data-reveal-delay="3"] { transition-delay: 240ms; }
[data-reveal][data-reveal-delay="4"] { transition-delay: 320ms; }

/* Cursor: círculo que sigue el ratón sobre elementos interactivos */
.cursor-dot {
  position: fixed;
  top: 0; left: 0;
  width: 12px; height: 12px;
  border-radius: 999px;
  background: var(--acento);
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  opacity: 0;
  transition: opacity 200ms var(--ease), width 200ms var(--ease), height 200ms var(--ease);
  mix-blend-mode: multiply;
}
.cursor-dot.visible { opacity: 1; }
.cursor-dot.grande { width: 56px; height: 56px; }
@media (max-width: 720px), (pointer: coarse) {
  .cursor-dot { display: none; }
}

/* Enlaces con hover subrayado animado */
a:not(.sidebar-nav a):not(.sidebar-brand):not(.biblio-link):not(.btn-volver) {
  background-image: linear-gradient(currentColor, currentColor);
  background-repeat: no-repeat;
  background-size: 0% 1px;
  background-position: 0 100%;
  transition: background-size 300ms var(--ease);
}
a:not(.sidebar-nav a):not(.sidebar-brand):not(.biblio-link):not(.btn-volver):hover {
  background-size: 100% 1px;
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    transition-duration: 0.01ms !important;
  }
  [data-reveal] { opacity: 1; transform: none; }
}

const __DATA__ = {"contenido.json": {"meta": {"titulo": "IA para interioristas", "subtitulo": "80 casos de uso reales de la IA a lo largo del proceso de un estudio de interiorismo", "autor": "Máster de Interiorismo", "advertencia": null}, "ambitos": [{"id": 1, "numero": "01", "nombre": "Investigación", "descripcion": "Aterrizar el proyecto antes de dibujar nada: escuchar al cliente, mapear referentes, contexto y materiales.", "casos": [{"id": "1.1", "titulo": "Briefing inteligente del cliente", "herramienta": "Claude o ChatGPT", "descripcion": "Convierte entrevistas, notas, correos, audios o mensajes del cliente en un briefing estructurado que revela necesidades funcionales, estilo de vida, prioridades, miedos, contradicciones y preguntas pendientes. El proyecto no empieza generando imágenes, sino escuchando mejor.", "input": "Notas de reunión, transcripción de llamada, emails del cliente, mensajes de WhatsApp o formulario inicial.", "pasos": ["Reúne todas las notas y comunicaciones iniciales del cliente en un solo documento o hilo.", "Lanza el prompt: 'Actúa como interiorista senior. Analiza estas notas y comunicaciones de un cliente que quiere reformar su vivienda. Extrae: necesidades funcionales explícitas, necesidades implícitas o intuidas, prioridades declaradas, restricciones (espacio, presupuesto, plazos, familia), estilo de vida real, criterios de decisión que aparecen entre líneas. Devuélveme un briefing estructurado.'", "Pide un segundo análisis: 'ahora detecta contradicciones o zonas ambiguas del briefing — cosas que el cliente pide pero que chocan entre sí, o temas de los que no habla y deberían aclararse'.", "Solicita una lista de 8-10 preguntas de seguimiento para la siguiente reunión, priorizadas por impacto en el proyecto.", "Cierra pidiendo: 'redacta un briefing de una página listo para enviar al cliente y validar antes de empezar a diseñar'."], "riesgo": "bajo", "madurez": "basico", "destacado": true}, {"id": "1.2", "titulo": "Análisis de referentes de interiorismo", "herramienta": "Perplexity", "descripcion": "Identifica y compara proyectos de interiorismo desde imagen o descripción. Extrae patrones de paleta, materialidad y atmósfera para construir un banco de referentes razonado en minutos.", "input": "Una idea de proyecto (tipología + estilo + ubicación).", "pasos": ["Define la tipología, geografía, franja temporal y características a analizar antes de escribir el prompt.", "Lanza el prompt en Perplexity: 'Actúa como investigador de interiorismo. Búscame 10 restaurantes construidos en Europa entre 2020 y 2025 con estética japandi, paleta cálida y madera clara. Para cada uno: nombre, ciudad, año, estudio, 2-3 rasgos clave (materiales, iluminación, mobiliario) y enlace. Ordénalos por relevancia para inspirar un restaurante boutique en Barcelona.'", "Refina en segunda vuelta pidiendo profundizar en los 3 más interesantes.", "Cruza con imagen: sube una foto de tu proyecto en curso y pide referentes visualmente próximos entre los identificados.", "Pide a Perplexity que resuma los patrones comunes entre los referentes elegidos para extraer la línea de diseño implícita."], "riesgo": "bajo", "madurez": "basico"}, {"id": "1.3", "titulo": "Búsqueda en publicaciones de interiorismo", "herramienta": "Claude", "descripcion": "Sube los PDFs de revistas o artículos que tienes y usa la IA para localizar, comparar y sintetizar proyectos, autores o temas sin releer números enteros.", "input": "5-10 PDFs de revistas de interiorismo (AD, Wallpaper*, Frame, El Croquis Interiores, Dezeen printed).", "pasos": ["Sube los PDFs a Claude en una misma conversación.", "Lanza el prompt: 'Actúa como documentalista de interiorismo. Localiza todos los proyectos de hoteles boutique en el sur de Europa con enfoque wabi-sabi o mediterráneo contemporáneo. Para cada uno: nombre, ciudad, año, estudio, número y página, 3 rasgos clave y una cita textual relevante. Ordena por afinidad con un restaurante boutique en Barcelona.'", "Cruza publicaciones pidiendo: 'qué proyectos aparecen en más de una revista' y 'qué estudios se repiten en el archivo'.", "Profundiza en un tema transversal: 'cómo se está tratando la iluminación cálida en restaurantes en estos PDFs'.", "Pide fichas estructuradas exportables de las 5 referencias más relevantes en formato Markdown."], "riesgo": "bajo", "madurez": "basico"}, {"id": "1.4", "titulo": "Análisis del entorno comercial del local", "herramienta": "ChatGPT", "descripcion": "Caracteriza el barrio y contexto donde se ubica un local para entender público, competencia y oportunidades antes de proyectar.", "input": "Dirección real + tipo de local.", "pasos": ["Define emplazamiento y tipología con precisión antes del prompt.", "Lanza el prompt en ChatGPT: 'Actúa como consultor de retail y hostelería. Analiza el entorno comercial de [dirección]. Devuélveme: perfil demográfico, flujos peatonales, competencia directa en 500 m (8 establecimientos con nombre), cliente esperado, precios medios, oportunidades no cubiertas y 3 recomendaciones estratégicas para un [tipo de local]. Cita fuentes.'", "Pide que compare con dos barrios similares en la misma ciudad para poner el análisis en contexto.", "Solicita un DAFO específico del emplazamiento para tu tipo de local.", "Cierra con: 'redacta un párrafo que pueda usar en la memoria del proyecto para justificar las decisiones de diseño en función de este contexto'."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "1.5", "titulo": "Análisis de luz natural y confort interior", "herramienta": "ChatGPT", "descripcion": "Interpreta luz natural, orientación y confort a partir de fotos o planos, y sugiere estrategias de proyecto.", "input": "2-3 fotos del espacio + planta con orientación (norte marcado).", "pasos": ["Sube las fotos y la planta a ChatGPT. Si tienes fotos a distintas horas, mejor.", "Lanza el prompt: 'Actúa como consultor de iluminación. Analiza este [tipo de espacio] orientado a [orientación] en [ciudad]. Devuélveme: comportamiento de luz natural a lo largo del día, riesgos de sobrecalentamiento o sombras, 5 estrategias de proyecto (aberturas, textiles, colores, materiales) y recomendaciones de iluminación artificial complementaria.'", "Pide simulaciones estacionales: 'cómo cambia esto en invierno vs verano'.", "Cruza con el programa: 'qué actividad encaja mejor en la zona más luminosa y cuál en la más oscura, justifícalo'.", "Pide un esquema de zonificación lumínica que puedas usar directamente en el planteamiento del proyecto."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "1.6", "titulo": "Estudio de precedentes en rehabilitación", "herramienta": "Perplexity", "descripcion": "Recopila proyectos reales de rehabilitación comparables y sintetiza qué normativa y licencias tuvieron que resolver.", "input": "Descripción del proyecto (tipología, ciudad, tipo de intervención).", "pasos": ["Define el proyecto de referencia con precisión (uso original, uso nuevo, contexto patrimonial).", "Lanza el prompt: 'Búscame 8 proyectos publicados de rehabilitación de vivienda a oficina en cascos históricos europeos entre 2018 y 2024. Para cada uno: nombre, ubicación, estudio, grado de protección patrimonial, licencias tramitadas, exigencias normativas relevantes (accesibilidad, evacuación, sanidad), estrategia de resolución y enlace.'", "Pide profundizar en los 3 más similares al tuyo por tipología y contexto normativo.", "Extrae patrones comunes: 'qué problemas normativos se repiten y cómo se resolvieron en cada caso'.", "Cierra con: 'redacta 5 preguntas concretas que debería llevar a una preconsulta con el ayuntamiento basándote en estos precedentes'."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "1.7", "titulo": "Investigación de materiales y acabados", "herramienta": "Claude", "descripcion": "Compara materiales por propiedades, coste, durabilidad, sostenibilidad y mantenimiento para tomar decisiones informadas.", "input": "Una duda material concreta del proyecto.", "pasos": ["Formula la pregunta como comparación específica, no como consulta genérica.", "Lanza el prompt: 'Compárame microcemento, resina epoxi y terrazo continuo para el suelo de un restaurante de 180 m² con paso intenso y cocina abierta. Tabla con: coste €/m² instalado, durabilidad, resistencia a manchas y grasa, acústica, sostenibilidad, mantenimiento, ventajas y desventajas. Recomendación argumentada al final.'", "Pide fabricantes de referencia con enlaces para cada opción.", "Contrasta con casos reales: 'qué restaurantes conocidos usan cada uno de estos materiales'.", "Cierra pidiendo el texto exacto de la partida en el pliego para el material elegido."], "riesgo": "bajo", "madurez": "basico"}, {"id": "1.8", "titulo": "Técnicas y oficios artesanales del lugar", "herramienta": "Perplexity", "descripcion": "Investiga tradiciones artesanales locales (ebanistería, cerámica, textiles, forja) y cómo se han reinterpretado en proyectos contemporáneos.", "input": "Lugar concreto donde se ubica el proyecto + tipología.", "pasos": ["Delimita geografía y técnicas de interés antes del prompt.", "Lanza el prompt: 'Documenta las técnicas artesanales tradicionales de cerámica y forja del sur de España vivas hoy. Para cada una: origen, características técnicas y estéticas, talleres de referencia contemporáneos (con nombre y ubicación), 3 proyectos que las hayan reinterpretado recientemente y cómo aplicarlas en un hotel boutique de 12 habitaciones.'", "Pide una lista de artesanos concretos con datos de contacto verificables.", "Solicita un moodboard descriptivo (no visual) de cómo estas técnicas podrían aparecer en el proyecto.", "Cierra con: 'redacta un párrafo para la memoria que vincule el proyecto con la tradición artesanal del lugar'."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "1.9", "titulo": "Exploración de disciplinas adyacentes", "herramienta": "Claude", "descripcion": "Cruza el tema del proyecto con disciplinas ajenas (arte, moda, cine, psicología, antropología) para enriquecer el concepto.", "input": "Un concepto rector del proyecto.", "pasos": ["Nombra el concepto rector con precisión antes del prompt.", "Lanza el prompt: 'Actúa como pensador transdisciplinar. Voy a diseñar un hotel boutique cuyo concepto rector es lujo silencioso. Explórame el concepto desde: filosofía (autores), moda (diseñadores), cine (películas), psicología del habitar (necesidades) y arte contemporáneo (obras). Para cada disciplina, 3 referencias con nombre y una idea aplicable a decisiones de proyecto.'", "Elige las 3-5 referencias más potentes y pide profundizar en cada una.", "Traduce cada referencia a decisiones concretas: 'esta idea de X, cómo se aterriza en material, luz o gesto espacial'.", "Cierra con: 'redacta el discurso conceptual del proyecto en 200 palabras integrando estas referencias'."], "riesgo": "bajo", "madurez": "basico"}, {"id": "1.10", "titulo": "Análisis de casos de éxito y fracaso comercial", "herramienta": "Perplexity", "descripcion": "Recopila qué funcionó y qué no en proyectos similares, especialmente en hostelería y retail donde el éxito es medible.", "input": "Tipología del proyecto y contexto comercial.", "pasos": ["Define el tipo de éxito o fracaso relevante para tu proyecto.", "Lanza el prompt: 'Búscame 5 restaurantes mediterráneos de gama media-alta en Europa que sean éxitos comerciales sostenidos y 5 que hayan cerrado en menos de 3 años. Para cada uno: nombre, ciudad, estudio, aciertos o errores del diseño según prensa, y lecciones aplicables. Fuentes citadas.'", "Pide un análisis de patrones: 'errores repetidos en los fracasos y aciertos comunes en los éxitos'.", "Solicita hipótesis sobre por qué los aciertos suelen ir juntos y por qué los errores también.", "Cierra con: 'genera un checklist de 10 puntos para evitar los errores más frecuentes en un proyecto como el mío'."], "riesgo": "medio", "madurez": "intermedio"}]}, {"id": 2, "numero": "02", "nombre": "Creativo / Diseño", "descripcion": "Ideación, concepto, exploración formal y toma de decisiones argumentadas con apoyo de IA generativa.", "casos": [{"id": "2.1", "titulo": "Generación de ambientes y atmósferas", "herramienta": "Nano Banana (Gemini)", "descripcion": "Traduce una descripción escrita en atmósferas interiores completas (luz, materialidad, mobiliario) para explorar el carácter del espacio antes de modelar nada.", "input": "Una descripción de la atmósfera buscada, escrita en lenguaje sensorial.", "pasos": ["Articula la atmósfera con lenguaje sensorial (temperatura, textura, luz, peso), no con etiquetas de estilo.", "Abre Gemini y activa la generación de imagen (Nano Banana). Lanza el prompt: 'Interior de un restaurante boutique en Barcelona, mediterráneo contemporáneo, paleta terracota y crema, luz cálida rasante de tarde desde ventanales al oeste, textiles de lino natural, cerámica artesanal, mesas de madera de olivo, latón patinado, elegancia serena, fotografía de película, proporción 3:2.'", "Genera varias variaciones y quédate con la más cercana a la intención.", "Itera por conversación: 'haz la luz más cálida', 'quita el mobiliario de la derecha', 'materiales más envejecidos'. Nano Banana edita sobre la misma imagen sin rehacerla de cero.", "Cuando tengas la atmósfera buena, pide una variación coherente para otra vista del mismo espacio y guarda ambas como referencia."], "riesgo": "bajo", "madurez": "basico"}, {"id": "2.2", "titulo": "De boceto a render", "herramienta": "BLMN o LookX.ai", "descripcion": "Convierte un croquis o modelo 3D simple en una imagen detallada manteniendo la geometría base, permitiendo iterar el ambiente en minutos sin perder control del espacio.", "input": "Un modelo básico de SketchUp o Rhino, aunque sea muy simple.", "pasos": ["Exporta una vista de tu boceto o modelo básico (volumen y disposición, sin materiales ni detalles).", "Súbela a BLMN (o LookX.ai) y describe la atmósfera: 'Dormitorio japandi contemporáneo, suelo de roble, paredes de yeso hueso, cama baja con lino, luz de mañana filtrada por cortina, minimal y cálido, fotorrealista.'", "Ajusta la fidelidad a la geometría: alta para respetar tu modelo, más baja para dejar interpretar a la IA.", "Genera varias vistas manteniendo la composición y quédate con las 3-4 mejores.", "Pásalas a Krea si quieres iterar variaciones, o a Rendair para consolidar el render final controlado."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "2.3", "titulo": "Exploración de variantes de estilo", "herramienta": "Krea", "descripcion": "Genera versiones del mismo espacio en distintos estilos (japandi, mediterráneo, industrial, brutalista) para presentar opciones al cliente o tantear el lenguaje antes de fijarlo.", "input": "Una imagen o boceto del espacio base + referencias visuales de estilos a probar.", "pasos": ["Sube a Krea una imagen base del espacio (render, foto o boceto ya generado).", "Pide variaciones cambiando solo el estilo: 'la misma estancia en clave japandi', 'la misma estancia mediterránea contemporánea', 'la misma estancia industrial cálida'. Mantén la composición.", "Usa el control de intensidad de Krea para que la variación no rompa la geometría del espacio.", "Genera una tanda por estilo y ponlas lado a lado para comparar con el cliente.", "Anota, para cada estilo que guste, las decisiones materiales implícitas para trasladarlas al proyecto real."], "riesgo": "bajo", "madurez": "basico"}, {"id": "2.4", "titulo": "Zonificación preliminar en planta", "herramienta": "Floor-plan.ai (o Snaptrude)", "descripcion": "Propone organizaciones preliminares de planta a partir del programa y las restricciones, útil para arrancar la zonificación con varias opciones sobre la mesa antes de dibujar el proyecto definitivo. No sustituye al proyecto de arquitectura.", "input": "Superficie del local, programa (nº y tipo de estancias), restricciones (pilares, ventanas, entrada).", "pasos": ["Introduce en Floor-plan.ai la superficie y el contorno del local.", "Define el programa: 'vivienda 90 m², 2 dormitorios, 2 baños, salón-cocina abierta, despacho'.", "Añade las restricciones: pilares, ventanas, entrada, bajantes.", "Genera varias propuestas de distribución y ordénalas por criterio (circulación, luz, privacidad).", "Lleva la opción elegida a Snaptrude o Planner 5D para probarla en 3D, como zonificación preliminar — nunca como planta ejecutiva."], "riesgo": "medio", "madurez": "intermedio", "advertencia": "La distribución generada es punto de partida, no proyecto ejecutivo. Requiere verificación de normativa, evacuación e instalaciones por técnico competente."}, {"id": "2.5", "titulo": "Naming y relato del proyecto", "herramienta": "Claude (o Namelix)", "descripcion": "Del concepto a un nombre y un relato que lo sostengan: cómo se llama el proyecto, qué promete y qué NO es. La narrativa que guía materiales, imágenes y comunicación.", "input": "El concepto y el briefing del proyecto.", "pasos": ["Dale a Claude el concepto y el briefing y pídele el núcleo del proyecto: qué promete, su tensión, lo que NO es.", "Pide 20 nombres y quédate con 3, con su porqué (evita clichés: 'refugio', 'oasis', 'esencia').", "Redacta un relato de tres frases que puedas repetir a cliente, prensa y equipo.", "Somételo a crítica: 'ataca este relato, ¿suena genérico?'.", "Fija el relato: será la vara para decidir materiales, imágenes y textos."], "riesgo": "bajo", "madurez": "intermedio", "advertencia": "Un nombre bonito sin relato es humo. El relato manda."}, {"id": "2.6", "titulo": "Moodboards de materiales y acabados", "herramienta": "Google Mixboard", "descripcion": "Ensambla moodboards visuales coherentes de materiales, texturas, colores y mobiliario a partir de una intención escrita.", "input": "Concepto atmosférico del proyecto en lenguaje sensorial.", "pasos": ["Traduce el concepto a lenguaje sensorial (temperatura, textura, peso) antes de abrir Mixboard.", "Lanza el prompt inicial: 'Sensory moodboard for a boutique hotel room. Materials: travertine, natural linen, brushed brass, oak. Warm diffused light. Mediterranean minimalism. Quiet elegance, tactile, aged.'", "Edita imágenes concretas con lenguaje natural: 'más mineral', 'menos mobiliario', 'luz más cálida'.", "Usa 'More like this' en las imágenes más cercanas a tu visión para converger.", "Consolida un moodboard final de 8-10 imágenes coherentes en el mismo lienzo."], "riesgo": "bajo", "madurez": "basico", "destacado": true}, {"id": "2.7", "titulo": "Transferencia de estilo", "herramienta": "Nano Banana (Gemini)", "descripcion": "Aplica una estética concreta sobre un espacio base para probar lenguajes distintos sobre la misma propuesta sin rehacer nada.", "input": "Imagen del espacio base + imagen de referencia estilística.", "pasos": ["Abre Gemini con generación de imagen (Nano Banana) y sube dos imágenes: tu espacio base y la referencia estilística.", "Lanza el prompt: 'Aplica la materialidad y la luz de la segunda imagen al espacio de la primera, manteniendo su geometría y su composición.'", "Ajusta por conversación cuánto pesa el estilo: 'más fiel a mi espacio' o 'más cerca de la referencia'.", "Prueba varias referencias distintas sobre la misma base para comparar.", "Pide que describa las diferencias materiales y de iluminación entre las variantes generadas."], "riesgo": "bajo", "madurez": "intermedio"}, {"id": "2.8", "titulo": "Diseño de mobiliario a medida", "herramienta": "Nano Banana (Gemini) o Krea", "descripcion": "Genera propuestas de mobiliario a medida (mesas, sofás, librerías, barras) integradas en el espacio, útil para piezas singulares y para presentar opciones.", "input": "Boceto a mano de la pieza + descripción de material y proporciones.", "pasos": ["Dibuja un croquis a mano de la pieza con proporciones claras y hazle una foto.", "Súbelo a Nano Banana (Gemini) y describe: 'Mesa de comedor de madera de olivo para 8, 240x90 cm, patas cónicas, acabado aceite mate, uso en restaurante, luz cálida.'", "Genera variantes manteniendo la geometría del croquis.", "Itera detalles concretos: 'patas más cónicas', 'canto biselado', 'textura más rugosa'.", "Pide una vista con dimensiones aproximadas para pasarla al ebanista como referencia."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "2.9", "titulo": "Matriz de decisiones de diseño", "herramienta": "Claude o ChatGPT", "descripcion": "Compara alternativas de diseño usando criterios profesionales: coherencia conceptual, coste, mantenimiento, durabilidad, sostenibilidad, riesgo de obra, experiencia de usuario y valor percibido por el cliente. Diseñar no es solo producir imágenes, es tomar decisiones argumentadas.", "input": "2-4 alternativas de diseño (imágenes, descripciones o moodboards) para el mismo espacio o pieza.", "pasos": ["Define con claridad las opciones a comparar: 'Estoy decidiendo el pavimento del restaurante. Alternativas: A) microcemento continuo, B) terrazo en piezas, C) parquet chevron de roble ahumado. Todas dentro de un rango de coste similar.'", "Establece los criterios de decisión ponderados: 'Puntúa cada alternativa de 1 a 5 en: coste instalado, mantenimiento en uso hostelero, impacto acústico, coherencia con el concepto (calidez mediterránea contemporánea), riesgo técnico en obra, percepción del cliente y durabilidad a 5 años.'", "Lanza el prompt: 'Actúa como interiorista senior. Construye una matriz comparativa de las 3 alternativas con esa puntuación. Justifica cada valor. Suma total ponderado.'", "Pide riesgos ocultos: 'para cada alternativa, identifica un riesgo que no aparece en la matriz pero que un jefe de obra o un cliente descubrirá tarde'.", "Cierra pidiendo: 'redacta una recomendación defendible en 6 líneas para presentar al cliente, incluyendo un contraargumento anticipado por si el cliente prefiere otra opción'."], "riesgo": "bajo", "madurez": "basico", "destacado": false}, {"id": "2.10", "titulo": "Diálogo conceptual con un LLM", "herramienta": "Claude", "descripcion": "Interlocutor para construir el relato del proyecto, cuestionar la idea, encontrar analogías o nombrar el concepto rector. Funciona como crítico de mesa disponible 24/7.", "input": "Descripción inicial del proyecto y del contexto.", "pasos": ["Explica el proyecto con contexto: cliente, programa, restricciones, intuición inicial.", "Lanza el prompt: 'Actúa como crítico de proyectos de interiorismo experimentado. Voy a diseñar un [tipo de proyecto] con [concepto inicial]. Cuestióname: qué contradicción interna tiene esta idea, qué está evitando enfrentar, qué 3 direcciones alternativas abriría un pensador radical. No me des consejo blando, empújame.'", "Responde a sus cuestionamientos por escrito, defendiendo o reformulando la idea.", "Pide que resuma el concepto en una frase con tensión visible.", "Cierra con: 'genera 5 títulos posibles para el proyecto que capturen la tensión que hemos identificado'."], "riesgo": "bajo", "madurez": "basico"}]}, {"id": 3, "numero": "03", "nombre": "Técnico-Constructivo", "descripcion": "Detalles, mediciones, materiales, compras y coordinación técnica sin caer en la complejidad del BIM industrial.", "casos": [{"id": "3.1", "titulo": "Coordinación de instalaciones con el interiorismo", "herramienta": "ChatGPT", "descripcion": "Revisa la coordinación entre el diseño interior y las instalaciones (electricidad, fontanería, clima, iluminación) para detectar conflictos antes de obra.", "input": "Planta del proyecto con posición de mobiliario e instalaciones.", "pasos": ["Exporta la planta con capas de mobiliario e instalaciones visibles.", "Sube a ChatGPT: 'Revisa esta planta de restaurante. Detecta conflictos entre la posición del mobiliario (barras, mesas, cocina) y las instalaciones (electricidad, fontanería, clima, iluminación). Enumera cada conflicto, dónde ocurre y cómo resolverlo.'", "Sube también el plano de instalaciones y pide un cruce visual entre ambos.", "Pide un listado priorizado por gravedad de los conflictos detectados.", "Solicita propuestas de solución alternativa para los conflictos más críticos."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "3.2", "titulo": "Generación de detalles constructivos", "herramienta": "Claude", "descripcion": "Sugiere y completa detalles tipo (carpinterías, encuentros de pavimentos, juntas, remates, muebles a medida) a partir del contexto del proyecto.", "input": "Descripción del encuentro constructivo a resolver.", "pasos": ["Describe el encuentro con precisión: 'junta entre suelo de microcemento y rodapié de madera oculto en un salón residencial'.", "Lanza el prompt: 'Describe cómo resolver este detalle constructivo. Enumera materiales necesarios, orden de ejecución, dimensiones típicas, industriales que intervienen, y riesgos habituales. Termina proponiendo 2 variantes: económica y premium.'", "Pide que dibuje esquemáticamente el detalle en ASCII o con descripción precisa para replicarlo en CAD.", "Solicita referencias de detalles similares publicados en Detail Magazine o ArchDaily.", "Pide el texto exacto que usarías para describir este detalle en el pliego de condiciones."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "3.3", "titulo": "Búsqueda inteligente de mobiliario y proveedores", "herramienta": "Perplexity", "descripcion": "Encuentra piezas de mobiliario, luminarias o sanitarios que cumplan requisitos concretos (dimensiones, estilo, presupuesto, plazo) sin perder horas navegando catálogos.", "input": "Requisitos de la pieza + estilo del proyecto + presupuesto.", "pasos": ["Define los criterios con precisión: dimensiones máximas, estilo, material, presupuesto, plazo.", "Lanza el prompt: 'Búscame 10 sofás modulares de 3 plazas disponibles en Europa: máximo 260x100 cm, estética japandi, tapizado en boucle o lino natural, entrega menos de 8 semanas, presupuesto hasta 3.500€. Para cada uno: marca, modelo, dimensiones, materiales, precio con IVA, plazo, enlace directo. Ordena del más al menos afín.'", "Refina con follow-up: 'descarta las marcas que no envíen a España' o 'filtra solo las que estén en stock hoy'.", "Pide una comparativa de los 3 mejores en tabla con pros y contras.", "Sube una foto del salón del proyecto y pide a Perplexity que indique cuál encaja mejor visualmente."], "riesgo": "bajo", "madurez": "basico"}, {"id": "3.4", "titulo": "Pre-medición orientativa desde plano en PDF", "herramienta": "Claude", "descripcion": "Extrae magnitudes aproximadas de superficies, perímetros y partidas desde un plano en PDF para preparar un presupuesto preliminar o detectar órdenes de magnitud, siempre pendiente de validación en CAD/BIM o medición manual.", "input": "Plano del proyecto en PDF con escala gráfica visible.", "pasos": ["Sube el plano a Claude asegurándote de que la escala gráfica es legible.", "Lanza el prompt: 'Este es el plano de una vivienda a reformar. Escala 1:50, verificar con la barra gráfica. Devuélveme una tabla con: superficie estimada de cada estancia en m², longitud aproximada de rodapiés por estancia, perímetro de muros a pintar (descontando huecos), superficie de suelos por tipo de pavimento propuesto. Marca cada valor como orientativo.'", "Pide que enumere las asunciones que ha hecho (alturas, huecos, espesores) para validarlas.", "Ejecuta una segunda pasada con más precisión sobre las estancias críticas antes de trasladar valores al presupuesto preliminar.", "Cierra con la advertencia visible: 'estas mediciones no sustituyen medición en CAD ni en obra. No usar para pedidos finales'."], "riesgo": "alto", "madurez": "intermedio", "advertencia": "No usar para mediciones contractuales, pedidos finales ni certificaciones de obra. Usar como primera revisión o preparación de preguntas, no como validación definitiva."}, {"id": "3.5", "titulo": "Brief lumínico preliminar para proveedor o lighting designer", "herramienta": "ChatGPT", "descripcion": "Define intenciones de iluminación por zonas, capas de luz, temperaturas de color, tipos de luminaria y criterios de confort para preparar una conversación con proveedor o especialista.", "input": "Planta del espacio con usos por zona.", "pasos": ["Sube la planta y describe usos: 'Restaurante 180 m². Zona 1 barra (técnico+ambiental). Zona 2 comedor (ambiental cálida). Zona 3 aseos (funcional)'.", "Lanza el prompt: 'Actúa como interiorista preparando un brief lumínico para un lighting designer. Para cada zona: intención atmosférica en 2 líneas, capas de luz recomendadas (general, ambiental, focal, decorativa), temperatura de color deseada (K), CRI mínimo, tipo de luminaria y ubicación tentativa en planta. No calcules lúmenes concretos ni afirmes cumplimiento normativo: eso lo verificará el especialista.'", "Pide referencias visuales por zona: 'a qué proyectos publicados podría parecerse la iluminación de cada zona'.", "Solicita las 5 preguntas clave que el lighting designer o proveedor debería contestar antes de proponer una solución.", "Cierra con: 'redacta el brief en 1 página lista para enviar al lighting designer, incluyendo objetivos, restricciones y calendario'."], "riesgo": "alto", "madurez": "intermedio", "advertencia": "No sustituye al cálculo lumínico profesional ni a la verificación del CTE DB-HE3. Usar como primera revisión o preparación de preguntas, no como validación definitiva."}, {"id": "3.6", "titulo": "Detección de riesgos acústicos y estrategias de acondicionamiento", "herramienta": "ChatGPT", "descripcion": "Identifica riesgos previsibles de reverberación, ruido y falta de confort acústico a partir de dimensiones, materiales y uso del espacio, proponiendo estrategias iniciales de acondicionamiento.", "input": "Descripción del espacio (dimensiones, materiales, uso, aforo).", "pasos": ["Describe el espacio con detalle: 'Restaurante 180 m², altura 4 m, suelo microcemento, paredes yeso, techo hormigón visto, 60 comensales, cocina abierta'.", "Lanza el prompt: 'Actúa como interiorista sensibilizado con acústica. Identifica riesgos acústicos previsibles (reverberación excesiva, ruido de cocina, transmisión entre zonas) y propón 5 estrategias iniciales de acondicionamiento (materiales, ubicaciones, superficie estimada a tratar) ordenadas por impacto y coste. No des un tiempo de reverberación en segundos: eso lo calcula un ingeniero acústico.'", "Pide ejemplos de referencia: 'qué restaurantes conocidos han resuelto bien la acústica y cómo'.", "Solicita alternativas materiales que cumplan función acústica sin sacrificar estética.", "Cierra con: 'redacta 5 preguntas concretas para un ingeniero acústico si decidimos encargarle el estudio'."], "riesgo": "alto", "madurez": "intermedio", "advertencia": "No es un cálculo acústico válido. Si el proyecto requiere cumplimiento del CTE DB-HR o certificación, encargar estudio a ingeniero acústico. Usar como primera revisión o preparación de preguntas, no como validación definitiva."}, {"id": "3.7", "titulo": "Verificación de constructibilidad", "herramienta": "Claude", "descripcion": "Revisa el proyecto para detectar soluciones difíciles de ejecutar o caras de construir, anticipando problemas de montaje y accesibilidad de oficios antes de obra.", "input": "Planos y detalles del proyecto en PDF.", "pasos": ["Sube los planos de detalle a Claude.", "Lanza el prompt: 'Actúa como jefe de obra experimentado. Revisa estos detalles y planos. Detecta soluciones difíciles de ejecutar, tolerancias justas, encuentros complejos, accesos imposibles para gremios, y elementos caros sin justificación clara. Enumera cada problema con propuesta de solución alternativa.'", "Pide priorización por criticidad (bloqueante, importante, menor).", "Solicita estimación de sobrecoste probable para cada problema si no se corrige.", "Cierra con un checklist de puntos a revisar en visita de obra antes de que se ejecuten."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "3.8", "titulo": "Control de compras y FF&E", "herramienta": "Airtable con IA, Google Sheets + Claude", "descripcion": "Gestiona mobiliario, iluminación, textiles, arte, accesorios y equipamiento: proveedor, precio, plazo, estado, alternativas, incidencias y compatibilidad con presupuesto. Diseñar también implica comprar, coordinar y controlar.", "input": "Listado de piezas por estancia, proveedores, precios, plazos, fichas técnicas y estado de pedidos.", "pasos": ["Crea una tabla FF&E con columnas: pieza, estancia, proveedor, precio, plazo, estado, responsable, fecha entrega prevista, incidencias.", "Sube la tabla y lanza el prompt: 'Actúa como responsable de compras en un estudio de interiorismo. Revisa esta tabla FF&E. Detecta: piezas sin precio confirmado, piezas sin plazo cerrado, duplicados, piezas fuera del presupuesto asignado por estancia. Ordena por criticidad.'", "Pide alternativas para piezas de riesgo: 'para las 5 piezas con plazo más largo o precio más alto, propón 2 alternativas comparables con precio y plazo. Enlaza fuente cuando puedas'.", "Solicita un sistema de alertas: 'genera reglas simples para Airtable que me marquen en rojo cualquier pieza con plazo > 8 semanas, sin precio o sin proveedor confirmado a 4 semanas de la fecha de instalación'.", "Pide un resumen semanal para cliente o equipo: estado global, piezas en riesgo, decisiones pendientes.", "Cierra con una lista priorizada de decisiones que necesitas del cliente esta semana."], "riesgo": "medio", "madurez": "intermedio"}, {"id": "3.9", "titulo": "Comparativa de presupuestos de industriales", "herramienta": "Claude", "descripcion": "Compara 3-5 presupuestos de industriales del mismo trabajo (pintura, carpintería, alicatado) para detectar desviaciones injustificadas, partidas ocultas o mejores condiciones.", "input": "Presupuestos en PDF o Excel.", "pasos": ["Sube los presupuestos a Claude en una misma conversación.", "Lanza el prompt: 'Actúa como jefe de obra. Compara estos 4 presupuestos de carpintería para el mismo proyecto. Devuélveme tabla comparativa con: precio total, precio por partida, calidades ofrecidas, plazos, forma de pago, garantías. Detecta partidas incluidas en unos y no en otros, desviaciones de precio injustificadas, errores u
