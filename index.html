ibución, materiales, experiencia, negocio?", "¿Qué escala tiene el hotel?", "¿Qué cliente lo habita?", "¿Qué restricciones del lugar importan?", "¿Qué debe evitarse?", "¿Qué formato de salida se necesita?", "¿Debe proponer, comparar, priorizar o cuestionar?"], "version_mejorada": "Analiza el potencial conceptual de un hotel boutique de 40 habitaciones en Cabo de Gata. Separa observaciones del lugar, oportunidades de proyecto y riesgos de caer en clichés mediterráneos. No diseñes todavía el hotel. Devuelve una tabla con: insight del lugar, implicación espacial, riesgo, pregunta pendiente.", "idea_memorable": "Si no defines la tarea, la IA elegirá una por ti."}]}, {"numero": "N2", "nombre": "Musculatura", "titulo": "Los cuatro músculos de un buen prompt", "claim": "Un prompt fuerte tiene verbo, contexto, límites y forma.", "texto": "No necesitas prompts largos. Necesitas prompts **con estructura**: tarea, contexto, restricciones y formato. Ese esqueleto convierte una charla en un encargo.", "scaffold": {"titulo": "El scaffold maestro", "bloques": [{"clave": "TAREA", "descripcion": "Verbo fuerte + resultado esperado"}, {"clave": "CONTEXTO", "descripcion": "Proyecto, usuario, lugar, escala, fase, intención"}, {"clave": "RESTRICCIONES", "descripcion": "Qué debe respetar, qué debe evitar, qué no debe inventar"}, {"clave": "FORMATO DE SALIDA", "descripcion": "Tabla, checklist, matriz, guion, email, criterios, ranking"}], "frase_clave": "Prompting es briefing comprimido."}, "drills": [{"id": "d02", "titulo": "Drill 02 · Cambia verbos débiles por verbos que obligan a pensar", "entrena": "Sustituir verbos blandos por acciones con salida verificable.", "verbos_debiles": ["ayúdame", "dame ideas", "piensa", "trabaja sobre", "mira", "sugiere", "mejora"], "verbos_fuertes": ["identifica", "compara", "clasifica", "prioriza", "descarta", "justifica", "cuestiona", "separa", "traduce", "convierte", "detecta", "ordena", "evalúa"], "antes": "Ayúdame con materiales para un restaurante mediterráneo.", "despues": "Compara tres estrategias materiales para un restaurante mediterráneo de 180 m² en Barcelona: una cálida y artesanal, una mineral y austera, y una más contemporánea. Para cada una, evalúa coste relativo, mantenimiento, durabilidad, riesgo de cliché y coherencia con un ticket medio-alto. Recomienda una y descarta otra justificando por qué.", "idea_memorable": "\"Ayúdame\" pide compañía. \"Compara\" pide trabajo."}, {"id": "d03", "titulo": "Drill 03 · Mata el default", "entrena": "Bloquear respuestas genéricas nombrando explícitamente lo que no quieres.", "texto": "La IA tiende al promedio. Si pides hotel mediterráneo, probablemente aparecerán paredes blancas, madera clara, olivos, fibras naturales, arcos, lino, piedra local y luz dorada. No está mal. Pero es lo esperable. Para salir del default, no basta con pedir algo original: hay que prohibir los lugares comunes.", "antes": "Sugiere materiales para un hotel mediterráneo cerca del mar.", "despues": "Sugiere una estrategia material para un hotel cerca del mar en Cabo de Gata. Evita paredes encaladas, arcos decorativos, estética ibicenca, \"lujo barefoot\", paleta blanco-azul, decoración marinera y referencias literales a chiringuito. Busca una respuesta más mineral, seca, resistente al viento y compatible con bajo mantenimiento.", "cliches_a_evitar": ["paredes encaladas", "arcos decorativos", "estética ibicenca", "lujo barefoot", "paleta blanco-azul", "decoración marinera", "referencia chiringuito"], "idea_memorable": "La originalidad empieza muchas veces diciendo qué no vas a repetir."}, {"id": "d04", "titulo": "Drill 04 · Añade el contexto que la IA no puede adivinar", "entrena": "Poner delante las condiciones que cambian la respuesta.", "antes": "¿Qué tipo de habitaciones debería tener el hotel?", "despues": "CONTEXTO: Hotel boutique de 40 habitaciones en Cabo de Gata, paisaje protegido, viento de Levante, salinidad alta, baja altura, necesidad de bajo impacto visual y mantenimiento razonable. Cliente objetivo: adulto, sensible al paisaje, no busca resort convencional. TAREA: Propón 5 tipologías de habitación. RESTRICCIONES: no plantees villas aisladas de alto impacto ni soluciones que dependan de grandes superficies acristaladas expuestas al viento. OUTPUT: tabla con tipología, experiencia, ventaja, riesgo y condición de viabilidad.", "idea_memorable": "El contexto no decora el prompt. Lo cambia todo."}, {"id": "d05", "titulo": "Drill 05 · Pide formato de pensamiento, no solo texto bonito", "entrena": "Obligar a que la respuesta muestre razones, riesgos y renuncias.", "antes": "¿Cuál sería una buena distribución para el hotel?", "despues": "Propón 3 estrategias de implantación para un hotel de bajo impacto. Para cada una indica: principio espacial, ventaja principal, riesgo principal, qué obliga a sacrificar y qué evidencia faltaría para validarla. Termina con un ranking razonado.", "por_que_funciona": "El texto narrativo puede sonar convincente aunque no diga nada. Una estructura con riesgos, sacrificios y evidencia obliga a pensar.", "idea_memorable": "Una buena respuesta no solo propone. También enseña lo que cuesta elegirla."}]}, {"numero": "N3", "nombre": "Criterio", "titulo": "Obligar a la IA a no darte la razón demasiado pronto", "claim": "La IA es peligrosa cuando suena convincente antes de haber sido cuestionada.", "texto": "Lo primero que sale rara vez es lo mejor. Pídele que **critique, contraste y no te dé la razón tan pronto**. Desacuerdo, roles opuestos, evidencia.", "drills": [{"id": "d06", "titulo": "Drill 06 · Haz que la IA discrepe", "entrena": "Convertir una respuesta convincente en una respuesta revisada.", "prompt_seguimiento": "Ahora argumenta contra tu propia respuesta. Identifica su supuesto más débil, el contraargumento más fuerte y una evidencia que te haría cambiar de opinión.", "ejemplo": "Después de que la IA recomiende microcemento para un restaurante, pedirle que lo ataque: ¿qué pasa con manchas y mantenimiento?, ¿qué riesgo acústico introduce?, ¿qué alternativa sería menos de moda y más duradera?, ¿qué dato faltaría antes de decidir?", "idea_memorable": "No uses la IA solo para generar. Úsala para incomodarte."}, {"id": "d07", "titulo": "Drill 07 · Un prompt, tres miradas", "entrena": "Revisar una propuesta desde perspectivas que se contradicen.", "prompt_base": "Revisa esta propuesta tres veces: (1) como cliente preocupado por presupuesto y mantenimiento, (2) como jefe de obra preocupado por ejecución y tolerancias, (3) como crítico de diseño preocupado por coherencia conceptual. Dame una objeción distinta desde cada mirada. No repitas argumentos.", "por_que_funciona": "Un buen proyecto no solo debe gustar. Debe sobrevivir a miradas distintas: quien paga, quien construye, quien habita, quien mantiene, quien comunica.", "idea_memorable": "Un proyecto mejora cuando deja de defenderse desde una sola voz."}, {"id": "d08", "titulo": "Drill 08 · Construye la cadena", "entrena": "Usar outputs anteriores como inputs fijos para no empezar de cero cada vez.", "texto": "Uno de los errores más comunes es abrir una conversación nueva para cada tarea. Eso rompe la continuidad. La IA olvida criterios, cambia tono, contradice decisiones y vuelve al promedio. El trabajo profesional con IA debe encadenar pasos.", "cadena": ["Briefing del cliente", "Insights y contradicciones", "Concepto rector", "Matriz de decisiones", "Estrategia material", "Texto de presentación", "Objeciones del cliente", "Revisión final"], "prompt_encadenado": "Usa el briefing validado que pego abajo como input fijo. No lo contradigas ni inventes datos nuevos. A partir de él, genera una matriz de decisiones para comparar tres estrategias materiales. Señala cualquier punto donde el briefing sea insuficiente antes de recomendar.", "idea_memorable": "La IA mejora cuando cada respuesta se convierte en ladrillo para la siguiente."}]}], "prompt_canvas": {"titulo": "Prompt Canvas para interiorismo", "subtitulo": "De idea vaga a encargo útil", "bloques": [{"numero": "1", "clave": "TAREA", "pregunta": "¿Qué quieres que haga la IA?", "guia": "Usa un verbo fuerte: compara, clasifica, detecta, prioriza, cuestiona, convierte."}, {"numero": "2", "clave": "CONTEXTO", "pregunta": "¿Qué debe saber del proyecto?", "guia": "Tipología, lugar, escala, usuario, fase, intención, presupuesto, restricciones."}, {"numero": "3", "clave": "CRITERIO", "pregunta": "¿Cómo debe evaluar la respuesta?", "guia": "Coste, mantenimiento, coherencia, impacto, riesgo, experiencia, durabilidad."}, {"numero": "4", "clave": "LÍMITES", "pregunta": "¿Qué no debe hacer?", "guia": "No inventar datos, no diseñar todavía, no usar clichés, no decidir normativa, no cerrar precios."}, {"numero": "5", "clave": "FORMATO", "pregunta": "¿Cómo quieres recibirlo?", "guia": "Tabla, ranking, checklist, matriz, guion, email, briefing, pasos, preguntas."}, {"numero": "6", "clave": "REVISIÓN", "pregunta": "¿Qué debe cuestionar antes de terminar?", "guia": "Supuestos débiles, datos faltantes, riesgos, alternativas descartadas."}], "claim": "El prompt no es el final del pensamiento. Es la arquitectura mínima de una buena pregunta."}, "cierre_texto": "La IA no premia al que escribe más. Premia **al que piensa mejor antes de pedir**. La pregunta ya no es «¿qué herramienta uso?», sino: **¿qué decisión quiero mejorar y qué no dejo que decida por mí?**", "video": {"yt": "JDXOd7LQiNE", "titulo": "Prompts y alucinaciones, al estilo Big Lebowski", "autor": "kevin swearingen", "dur": ""}, "reto": {"kicker": "Calentamiento · reto interactivo", "titulo": "Say What You See", "fuente": "Google Arts & Culture", "texto": "Te enseñan una imagen y tienes que escribir el **prompt que la recree**. La IA la regenera y te puntúa el parecido. Tres intentos por imagen, y cada nivel pide más precisión.", "porque": "Es el músculo base del prompting visual: **describir con precisión lo que ves**. Justo lo que necesitas para dirigir un render o un moodboard.", "comojugar": ["Míralo bien: luz, materiales, encuadre, atmósfera.", "Escribe un prompt corto y preciso (máx. 120 caracteres).", "Sube el parecido en tres intentos y pasa de nivel."], "url": "https://artsandculture.google.com/experiment/say-what-you-see/jwG3m7wQShZngw", "boton": "Abrir el reto a pantalla completa"}, "video_loop": {"yt": "3Uf9q8TZtT0", "titulo": "Loop engineering: trabajar en bucle, no repromptear", "autor": "Cloud Edventures", "dur": ""}}, "escalera_madurez": {"numero": "02", "titulo": "La escalera de madurez: de jugar con IA a trabajar distinto", "intro": "Casi todos empezamos usando la IA como un chat: preguntar, copiar, corregir. Está bien, pero **hay más allá**.", "niveles": [{"numero": "1", "nombre": "Preguntar", "subtitulo": "La IA como conversación.", "texto": "Le pides ideas, resúmenes, referentes. Es el nivel más accesible. Sirve para desbloquear, pero **todo depende del prompt**: contexto pobre, respuesta genérica.", "ejemplo": "Dame 10 ideas de concepto para una vivienda mediterránea contemporánea en Barcelona.", "riesgo": "Creer que una respuesta rápida es una respuesta buena."}, {"numero": "2", "nombre": "Configurar", "subtitulo": "La IA empieza a hablar el idioma del estudio.", "texto": "Ya no partes de cero. Defines **tono, criterios, tipo de cliente y límites**. La IA deja de ser genérica y empieza a hablar el idioma del estudio.", "ejemplo": "Redacta como un estudio de interiorismo residencial de gama media-alta: tono cálido, preciso, sin clichés, con foco en uso, materialidad y atmósfera.", "riesgo": "Confundir tono con criterio. Que suene bien no significa que esté bien pensado."}, {"numero": "3", "nombre": "Conectar", "subtitulo": "La IA entra en la carpeta del proyecto.", "texto": "La IA entra en la **carpeta del proyecto**: propuestas, memorias, actas, fotos de obra. El valor no es que sepa mucho, sino que **ordene lo que tú ya sabes**.", "ejemplo": "Lee estas tres propuestas anteriores y redacta una nueva manteniendo estructura, tono y nivel de detalle, pero adaptada a este cliente.", "riesgo": "Subir información desordenada y esperar claridad automática. La IA ayuda, pero no sustituye una buena estructura documental."}, {"numero": "4", "nombre": "Delegar", "subtitulo": "La IA trabaja por paquetes.", "texto": "No le pides piezas sueltas: le encargas **flujos completos** (analizar un lead, preparar una llamada, redactar el email). Tú pasas de ejecutar a **dirigir y revisar**.", "ejemplo": "Con este formulario de cliente, clasifica el lead, prepara la primera llamada, genera preguntas de briefing y redacta el email de confirmación.", "riesgo": "Delegar sin revisar. Cuanto más completa es la tarea, más importante es la supervisión humana."}, {"numero": "5", "nombre": "Construir", "subtitulo": "La IA se convierte en herramienta propia.", "texto": "El estudio **encapsula su forma de trabajar** en artefactos reutilizables: calculadora de honorarios, asistente de briefing, base de conocimiento. La pregunta: ¿qué hacemos tantas veces que merece ser herramienta?", "pregunta_clave": "¿Qué hacemos tantas veces que merece convertirse en herramienta?", "ejemplo": "Un asistente que convierte respuestas de un formulario en briefing, diagnóstico de encaje, preguntas para primera reunión y email de respuesta.", "riesgo": "Construir herramientas antes de entender bien el proceso. Primero criterio, luego sistema."}], "cierre": "La escalera no va de menos IA a más IA. Va de **menos intención a más intención**. Preguntar es explorar; configurar, orientar; conectar, contextualizar; delegar, operar; construir, **convertir criterio en sistema**.", "frase_final": "La IA inmadura produce más cosas. La IA madura produce mejores decisiones.", "video": {"yt": "8PuX_onqhUY", "titulo": "¿Qué es la IA agéntica? En 2 minutos", "autor": "DaveAI", "dur": "2 min"}, "diagnostico": {"kicker": "Autodiagnóstico · 1 minuto", "titulo": "¿En qué peldaño está tu estudio?", "intro": "Seis preguntas sobre vuestro día a día real a través de un voluntario", "preguntas": [{"p": "En tu estudio, la IA hoy es…", "opciones": [{"t": "Algo que casi no tocamos", "n": 1}, {"t": "Un chat para ideas y textos sueltos", "n": 1}, {"t": "Algo a lo que ya le hemos explicado nuestro tono y criterios", "n": 2}, {"t": "Una ayuda que trabaja con los documentos reales del proyecto", "n": 3}, {"t": "Alguien a quien le encargamos tareas completas de principio a fin", "n": 4}, {"t": "Una herramienta que nos hemos construido a medida", "n": 5}]}, {"p": "Cuando ponéis precio a un encargo…", "opciones": [{"t": "A ojo, según la experiencia del socio", "n": 1}, {"t": "Le pido a la IA una estimación genérica", "n": 1}, {"t": "Le he explicado nuestras tarifas y ratios para que estime como nosotros", "n": 2}, {"t": "Le paso presupuestos anteriores para que calque nuestra lógica", "n": 3}, {"t": "Tenemos un sistema que lo calcula casi solo", "n": 5}]}, {"p": "Vuestras referencias e inspiración…", "opciones": [{"t": "Viven en carpetas caóticas que nadie vuelve a mirar", "n": 1}, {"t": "Las guardo y a veces le pido ideas a la IA", "n": 1}, {"t": "Le he descrito nuestro estilo para que filtre mejor", "n": 2}, {"t": "La IA lee nuestra biblioteca y trabaja con ella", "n": 3}, {"t": "Algo las cataloga o las critica casi solo", "n": 5}]}, {"p": "Memorias, actas y entregables…", "opciones": [{"t": "Los escribo de cero cada vez", "n": 1}, {"t": "Le pido a la IA textos sueltos", "n": 1}, {"t": "Le he fijado nuestro tono y formato", "n": 2}, {"t": "Le doy los documentos del proyecto y trabaja sobre ellos", "n": 3}, {"t": "Le encargo el paquete entero y solo reviso", "n": 4}]}, {"p": "Las tareas repetitivas (leads, correos, seguimiento)…", "opciones": [{"t": "Las hacemos a mano, una a una", "n": 1}, {"t": "Uso la IA puntualmente para alguna", "n": 2}, {"t": "Le encargo flujos completos (de lead a email)", "n": 4}, {"t": "Están automatizadas con un sistema (Make, agentes)", "n": 5}]}, {"p": "Si pienso en lo que repetimos mil veces en el estudio…", "opciones": [{"t": "Ni me lo he planteado", "n": 1}, {"t": "Sé cuáles son, pero no he hecho nada", "n": 2}, {"t": "He probado a configurar la IA para alguna", "n": 3}, {"t": "He delegado alguna tarea completa", "n": 4}, {"t": "Hemos convertido alguna en herramienta propia", "n": 5}]}], "cta": "Ver mi nivel", "reiniciar": "Volver a empezar", "resultado_titulo": "Tu estudio está en el peldaño", "pasos_titulo": "Tres primeros pasos", "pasos_por_nivel": {"1": ["Escribe en un párrafo el tono y los criterios de tu estudio y pégalo antes de cada petición.", "Guarda los 3 prompts que ya te funcionan y reutilízalos.", "Pasa por el bloque 03 (Prompting Gym) y entrena la precisión."], "2": ["Mete a la IA en la carpeta del proyecto: pásale memorias y actas reales.", "Reutiliza 3 propuestas anteriores como plantilla viva.", "Ordena tu documentación: la IA necesita estructura para dar claridad."], "3": ["Elige una tarea recurrente y encárgala entera (de lead a email).", "Define el flujo por pasos antes de delegar.", "Pon siempre un punto de revisión humana al final."], "4": ["Identifica lo que repites cada semana y conviértelo en artefacto.", "Empieza por un maquinillo sencillo (mira el bloque 05 · Herramientas propias).", "Primero el criterio, luego el sistema: no automatices lo que aún no entiendes."], "5": ["Documenta y comparte tus artefactos para que no dependan de una persona.", "Mide el tiempo que ahorran: sin dato, no hay mejora.", "Conecta unos artefactos con otros: ahí está el salto de verdad."]}, "nota": "Es una foto para pensar, no una nota. Nadie vive en un solo peldaño."}}, "puente_casos": {"titulo": "Un mapa de 80 usos reales, ámbito por ámbito", "texto": "Los 80 casos recorren los **8 ámbitos** del proceso de un estudio. Casi todos viven en el **primer nivel de madurez**: usar la IA como asistente. Cada caso trae herramienta, input, pasos con prompts listos para copiar y una capa visible de riesgo.", "frase": "Este es el mapa completo. Justo después elegimos una ruta corta —un caso por ámbito— para probarlos con datos de ejemplo.", "video": {"yt": "FLY75Gn0gyU", "titulo": "Cómo la IA hace avanzar la arquitectura · TEDx", "autor": "Eda Erol · TEDxBoston", "dur": ""}}, "artefactos_skills": {"numero": "05", "titulo": "Casos de mayor madurez", "subtitulo": "Ya sabéis en qué peldaño estáis (bloque 02). Ahora subimos: del grado 1 —solo preguntar— a los de arriba. **Cada artefacto encarna un nivel de madurez.**", "intro": ["Hasta aquí hemos visto **dónde** puede entrar la IA. Ahora, el salto: dejar de pedirle una respuesta cada vez y **subir de peldaño**.", "Del grado 2 en adelante empiezas a **configurar, conectar, delegar y construir**. Cada artefacto de abajo vive en un peldaño distinto de la escalera.", "No hace falta llegar al 5. Se trata de saber en cuál estás y dar el **siguiente paso**."], "comparativo": [{"nombre": "Prompt", "definicion": "Una instrucción puntual.", "ejemplo": "Redacta un email de seguimiento para este cliente.", "valor": "Rápido, flexible.", "limite": "Depende mucho de cómo lo escribas cada vez."}, {"nombre": "Plantilla", "definicion": "Una estructura reutilizable.", "ejemplo": "Plantilla de propuesta, acta, briefing o checklist.", "valor": "Ordena la salida.", "limite": "No siempre adapta bien el criterio."}, {"nombre": "Artefacto", "definicion": "Una herramienta sencilla que combina input, lógica y output.", "ejemplo": "Formulario de lead → clasificación → preguntas → email → resumen interno.", "valor": "Convierte una tarea repetida en flujo.", "limite": "Necesita estar bien diseñado y revisado."}, {"nombre": "Skill", "definicion": "Una capacidad empaquetada con instrucciones, criterios, ejemplos y reglas de uso.", "ejemplo": "Skill de honorarios del estudio que sabe cómo calcular escenarios según alcance, fases y riesgos.", "valor": "Encapsula conocimiento del estudio.", "limite": "Si el criterio de base es malo, la skill escala el error."}], "claim_seccion": "Un prompt acelera una tarea. Un artefacto mejora un proceso. Una skill conserva una forma de trabajar.", "artefactos": [{"numero": "1", "titulo": "Skill de materiales y proveedores", "herramienta": "Claude · Skills / Projects", "subtitulo": "Le enseñas tu paleta y tus proveedores. Deja de recomendar genérico.", "que_es": "Una skill que carga la **paleta de materiales, acabados y proveedores de confianza del estudio**. Cuando pides materiales para un proyecto, Claude propone desde **tu repertorio** —con tus rangos de precio y tus proveedores—, no desde un catálogo genérico.", "problema": "El saber de materiales del estudio —qué usas, de quién, a qué precio, qué funciona en hostelería vs. vivienda— vive en la cabeza de los socios y en mil correos. La IA genérica (o un junior) recomienda cosas que el estudio nunca especificaría.", "como_funciona": ["Reúnes tu **repertorio de materiales y acabados** (con notas de uso: dónde sí, dónde no) y tus **proveedores de confianza** (contacto, rangos de precio, plazos).", "Lo empaquetas como skill con un archivo de instrucciones: cuándo y cómo recomendar.", "Claude la carga sola cuando pides materiales para un proyecto.", "Te devuelve una selección **desde tu paleta**, justificada, con proveedor y rango de precio."], "input": ["Tu repertorio de materiales y acabados, con notas de uso", "Tus proveedores de confianza (contacto, precios, plazos)", "El proyecto: tipología, concepto, presupuesto"], "output": ["Materiales de tu línea, no de revista", "Proveedor y rango de precio de cada uno", "Alternativas si algo no cabe en presupuesto", "Coherencia: siempre habla tu idioma material"], "conecta": "Es transversal: la usan Diseño (para especificar), Técnico (para comprar) y Comercial (para estimar). Y complementa al Brand Guardian: una propone materiales de tu línea, el otro vigila que el proyecto no se desvíe del ADN.", "aprendizaje": "Que el saber más artesanal de un estudio —qué materiales usa y de quién— puede codificarse una vez y dejar de depender de que el socio esté disponible.", "demo": "Cargar la skill con un repertorio ficticio y pedir los materiales para dos proyectos (una vivienda cálida y un restaurante): recomienda desde la misma paleta.", "frase": "Un prompt te da materiales de revista. Una skill te da los materiales de tu estudio.", "nivel": "Peldaño 2 · Configurar", "descargable": "art-materiales", "descarga_nota": "Un repertorio de materiales y proveedores de ejemplo."}, {"numero": "2", "titulo": "Brand Guardian", "herramienta": "Claude (Proyectos)", "subtitulo": "Un crítico interno que conoce el ADN del estudio y no te deja traicionarlo.", "que_es": "Un crítico interno: un **Proyecto de Claude** al que le das el ADN del estudio (una biblioteca de referentes + un manifiesto) y que revisa si un proyecto en curso se mantiene fiel a él.", "problema": "La identidad del estudio vive en la **intuición de los socios**. Cuesta transmitirla a un junior o a uno mismo un martes cansado. Los proyectos derivan: un material que no es, una luz que no toca. Y nadie lo dice a tiempo.", "como_funciona": ["Reúnes la biblioteca de referentes (proyectos que SÍ son «el estudio») y escribes un manifiesto: valores, materiales, luz, tono.", "Creas un **Proyecto en Claude** y subes ahí el manifiesto y las referencias como conocimiento.", "Le pasas el proyecto en curso a revisar (descripción o imágenes).", "Te devuelve un diagnóstico de coherencia: dónde encaja y dónde se desvía, con propuestas de ajuste."], "input": ["Biblioteca curada de referentes del estudio (el ADN)", "Un manifiesto.md: quién es el estudio, en palabras", "El proyecto en curso a revisar"], "output": ["Diagnóstico de coherencia con el ADN del estudio", "Señales concretas de deriva (material, luz, tono, gesto)", "Propuestas de ajuste argumentadas desde los referentes", "Preguntas incómodas: ¿esto es evolución o descuido?"], "conecta": "Vive en el peldaño «Conectar»: la IA entra en tu documentación. La biblioteca la curas a mano; si quieres máxima privacidad del ADN, la versión local con Claude Code es una opción.", "aprendizaje": "Que la IA más valiosa no es la que sabe de todo, sino la que sabe de TI. Y que articular la propia identidad en un manifiesto es un ejercicio de estudio, no de tecnología.", "demo": "Enseñarle un proyecto que encaja y otro que se desvía. Ver cómo aprueba uno y señala con precisión por qué el otro «no es del estudio».", "frase": "No es un buscador de referencias. Es la voz del estudio cuando nadie la está diciendo.", "nivel": "Peldaño 3 · Conectar", "descargable": "art-manifiesto", "descarga_nota": "El ADN del estudio + un proyecto para que lo critique."}, {"numero": "3", "titulo": "Agente Radar de Concursos", "herramienta": "Make + Gemini (búsqueda con grounding) + fuentes de concursos", "subtitulo": "Deja de leer bases de concursos. Recibe un veredicto.", "que_es": "Un asistente que trabaja en **cuatro fases** —rastreo, extracción, viabilidad y dictamen— y termina con un semáforo: 🟢 presentarse, 🟡 valorar, 🔴 descartar. No te da información: te da una **decisión argumentada**.", "problema": "Los concursos se publican dispersos y con bases larguísimas. **Leerlas cuesta horas.** Muchos estudios se presentan a lo que no encaja, o descartan por pereza algo que sí. La decisión se toma tarde y mal.", "como_funciona": ["**Rastreo** — con Make vigilas fuentes reales (Plataforma de Contratación del Sector Público, boletines, webs de colegios) o le pides a Gemini, que busca en la web y **cita la fuente**, las convocatorias nuevas.", "**Extracción** — un LLM saca de cada convocatoria lo que importa: objeto, plazos, criterios de valoración y documentación.", "**Viabilidad** — cruza cada concurso con el perfil del estudio y su capacidad actual.", "**Dictamen** — termina con un semáforo 🟢/🟡/🔴 y su porqué."], "input": ["Fuentes a vigilar (plataformas, boletines, newsletters)", "Perfil del estudio: tipologías fuertes, tamaño, geografía", "Capacidad actual: equipo y huecos de agenda", "Criterios de encaje y umbrales (presupuesto, distancia)", "La Skill de tarifas, para estimar rentabilidad"], "output": ["Concursos nuevos, cada uno con su ficha extraída", "Semáforo 🟢/🟡/🔴 con justificación breve", "Fechas críticas y checklist de documentación", "Para los verdes: primeros pasos y quién lidera", "Para los ámbar: qué falta por saber para decidir"], "conecta": "Se apoya en el artefacto 1: sin la Skill de tarifas no puede estimar si un concurso es rentable. Un artefacto se monta sobre otro.", "aprendizaje": "Que un agente no es un chat más listo: es un flujo con fases, criterios y una decisión al final. Y que decidir a qué NO presentarse vale tanto como decidir a qué sí.", "demo": "Darle tres bases de concurso ficticias —una que encaja, una dudosa y una que no— y ver cómo emite tres dictámenes distintos con su porqué.", "frase": "El mejor radar no te trae más concursos. Te ahorra los que no debías mirar.", "nivel": "Peldaño 4 · Delegar", "descargable": "art-bases", "descarga_nota": "Tres convocatorias para que las dictamine."}, {"numero": "4", "nivel": "Peldaño 5 · Construir", "titulo": "Diario de obra automático", "subtitulo": "La obra habla por mil canales. El diario se escribe solo.", "herramienta": "Claude Code (local)", "que_es": "Un sistema que te construyes: **Claude Code lee una carpeta local** con los mensajes y fotos que llegan de la obra y escribe solo un diario ordenado, marcando incidencias y retrasos. Los datos de obra **no salen de tu máquina**.", "problema": "En una obra entran mensajes por todos lados —jefe de obra, industriales, fotos— y nadie tiene tiempo de escribir el diario. Y cuando surge un problema, no hay registro de qué se dijo y cuándo.", "como_funciona": ["Vuelcas en una carpeta los mensajes y fotos de la obra (exportas el chat, guardas los correos).", "Le pides a **Claude Code** que lea la carpeta y, de cada entrada, extraiga: fecha, gremio, qué avanzó, qué se decidió y qué se torció.", "Escribe un **diario.md** ordenado por día, con las **incidencias y retrasos marcados**.", "Te resume las incidencias críticas (un retraso, un conflicto entre gremios) al final."], "input": ["Una carpeta con los mensajes y fotos de la obra", "(Opcional) el calendario de obra para cruzar retrasos"], "output": ["Un diario.md al día, sin escribirlo", "Incidencias y retrasos detectados y fechados", "Un registro que te cubre si luego hay discusión", "Todo en local: nada sensible sube a la nube"], "conecta": "Es el peldaño 5: un sistema propio. Y por qué **en local** (Claude Code): los datos de una obra —clientes, presupuestos, incidencias— son sensibles y no tienen por qué salir de tu ordenador.", "aprendizaje": "Que la IA más útil no siempre genera algo nuevo: a veces ordena el caos que ya tienes. Y que construir en local te deja usar datos reales sin exponerlos.", "demo": "Dejar una carpeta con los mensajes de una semana de obra y ver a Claude Code escribir el diario con las incidencias marcadas.", "frase": "La mejor documentación de obra es la que se escribe sola mientras tú estás en la obra.", "descargable": "art-diario", "descarga_nota": "Mensajes de una semana de obra para que Claude Code los ordene.", "descargable_2": "art-plan-obra", "descarga_nota_2": "El calendario de obra, para cruzarlo con el diario y ver el impacto del retraso."}], "metodologia": {"titulo": "Cómo convertir una tarea repetida en una herramienta IA", "pasos": [{"numero": "1", "nombre": "Nombra la tarea", "pregunta": "¿Qué haces muchas veces?", "ejemplo": "Responder leads, preparar reuniones, comparar acabados."}, {"numero": "2", "nombre": "Define el input", "pregunta": "¿Qué información necesita la herramienta para funcionar?", "ejemplo": "Presupuesto, ubicación, fase, fotos, propuesta, restricciones."}, {"numero": "3", "nombre": "Define el criterio", "pregunta": "¿Cómo decide si algo está bien o mal?", "ejemplo": "Encaje con estudio, riesgo, coste, mantenimiento, coherencia conceptual."}, {"numero": "4", "nombre": "Define el output", "pregunta": "¿Qué debe devolver?", "ejemplo": "Tabla, email, checklist, briefing, recomendación, resumen."}, {"numero": "5", "nombre": "Añade revisión humana", "pregunta": "¿Qué no debe decidir sola?", "ejemplo": "Precio final, normativa, contrato, promesa comercial, aprobación técnica."}, {"numero": "6", "nombre": "Guárdalo como sistema", "pregunta": "¿Dónde vive la herramienta?", "ejemplo": "Prompt, plantilla, GPT, Claude Project, Airtable o documento de proceso."}], "claim": "Una herramienta propia no empieza con código. Empieza con una tarea bien entendida."}, "mencion": "Otro ejemplo del peldaño 4 (Delegar), que no desarrollamos hoy: un **recordatorio de cita al cliente con Make**, que vigila la agenda y envía solo el aviso 24 h antes de cada visita."}, "espacio_inteligente": {"numero": "07", "titulo": "Cuando el espacio empieza a comportarse", "subtitulo": "La IA no solo cambia cómo proyectamos un interior. También empieza a cambiar qué puede hacer un espacio una vez terminado.", "intro": ["Hasta ahora, el interiorismo diseñaba condiciones: distribución, luz, materiales, mobiliario, recorridos, atmósfera. Con IA, empezamos a diseñar también comportamientos.", "Qué detecta un espacio. Qué adapta. Qué recuerda. Qué recomienda. Qué oculta. Qué datos recoge. Qué límites no debe cruzar.", "El espacio deja de ser un final estático y empieza a comportarse como un sistema vivo: mide, aprende, responde y a veces se equivoca."], "preguntas_apertura": ["¿Cómo se ve este espacio?", "¿Qué sabe este espacio?", "¿Qué decide?", "¿Qué experiencia produce?", "¿Cuándo ayuda y cuándo invade?"], "principios": [{"numero": "1", "titulo": "El espacio puede responder", "texto": "Museos inmersivos e instalaciones generativas muestran algo nuevo: el espacio **ya no tiene por qué ser una escena fija**. Puede cambiar con datos, sonido, movimiento y tiempo.", "idea_clave": "Diseñar ya no es solo fijar una forma. También puede ser definir un rango de comportamientos.", "ejemplo": "DATALAND / Refik Anadol como caso de entorno inmersivo generativo.", "pregunta": "Si una sala cambia en tiempo real, ¿qué sigue siendo diseño y qué pasa a ser dirección de comportamiento?"}, {"numero": "2", "titulo": "La mejor tecnología desaparece", "texto": "En hoteles, la IA promete habitaciones que ajustan luz, clima y servicio. Pero **no debería parecer una demo tecnológica**: debería sentirse más cómoda, más atenta.", "idea_clave": "La inteligencia espacial no debería sentirse como interfaz. Debería sentirse como cuidado.", "ejemplo": "Habitación conectada / hotel inteligente / personalización invisible.", "pregunta": "¿Qué preferiría un huésped: una habitación muy tecnológica o una habitación que simplemente siempre está bien?"}, {"numero": "3", "titulo": "El retail físico se vuelve experiencia aumentada", "texto": "Si el producto se compra online, la tienda física **tiene que justificar el viaje**. La IA personaliza recorridos y atención, pero el valor sigue siendo espacial: deseo, sorpresa, pertenencia.", "idea_clave": "La IA no salva una mala experiencia. Amplifica una intención espacial fuerte.", "ejemplo": "Retail inmersivo, tiendas experienciales, fitting personalizado, espacios tipo Gentle Monster.", "pregunta": "Si el producto ya está en internet, ¿para qué existe la tienda?"}, {"numero": "4", "titulo": "La tecnología también puede fracasar", "texto": "No todo lo impresionante es deseable. Las tiendas «coge y sal» demuestran que una experiencia sin fricción puede volverse **cara, opaca o vigilante** si depende de infraestructura compleja.", "idea_clave": "El espacio inteligente fracasa cuando la tecnología pesa más que la experiencia.", "pregunta": "¿Un espacio automatizado es mejor porque requiere menos interacción humana, o peor porque reduce confianza y calidez?"}, {"numero": "5", "titulo": "Diseñar espacios inteligentes es diseñar límites", "texto": "Privacidad, datos, consumo y dependencia entran en el briefing. Un espacio puede adaptarse al usuario, pero también **observarlo de más**. Puede personalizar, pero también manipular.", "idea_clave": "El interiorismo inteligente no consiste en añadir sensores. Consiste en diseñar confianza.", "pregunta": "¿Puede un espacio ser confortable si el usuario siente que está siendo observado?"}], "cierre": "El futuro no será llenar los espacios de tecnología. Será decidir **qué inteligencia merece estar** en un espacio y cuál no. Qué automatizar, qué dejar manual, qué recordar y qué olvidar.", "frase_final": "El reto no será diseñar espacios más inteligentes. Será diseñar espacios que se comporten bien.", "es_final": true, "kicker": "One more thing", "video_futuro": {"yt": "2wP_n6id4qM", "titulo": "La IA y el futuro de la arquitectura", "autor": "COTAPAREDES Arquitectos", "dur": "2 min", "start": 250, "end": 370}, "experiencia": {"titulo": "Dónde ya está pasando: el espacio que se adapta", "intro": "No es promesa de feria. En hoteles y edificios, la IA ya está **dentro del espacio** —no en la pantalla del proyectista, sino en cómo se habita—. Esto es lo que dice el sector ahora mismo.", "items": [{"t": "Hoteles que te reconocen", "x": "La personalización es **la** tendencia de la hospitality para 2026: con el perfil del huésped, el hotel adapta la estancia antes de llegar y en el check-in —saludo, upgrades, preferencias recordadas—. Se traduce en más conversión, estancias más largas y más vínculo de marca.", "fuente": "EY · PwC, 2026"}, {"t": "Edificios que se regulan solos", "x": "Sistemas que ajustan clima y luz por **ocupación y CO₂ real**, no por horario fijo: el confort sube y el desperdicio baja. El mercado de edificio inteligente casi se duplica hacia 2026.", "fuente": "Informes de sector, 2026"}, {"t": "El confort primero (y sale más eficiente)", "x": "Dato contraintuitivo: los sistemas que priorizan el **confort del ocupante** logran más ahorro que los que solo persiguen el ahorro. Quien está a gusto usa mejor el edificio. Bienestar y eficiencia no están reñidos.", "fuente": "Penn State IEE, 2026"}, {"t": "El giro para el interiorista", "x": "El diseño deja de terminar en la entrega. El espacio **sigue trabajando**: aprende, se adapta y responde a quien lo habita —siempre que el usuario vea el beneficio y controle sus datos—. Empiezas a diseñar comportamiento, no solo objeto.", "fuente": ""}], "nota": "Fuentes: informes de EY, PwC y del sector de edificio inteligente (2025-2026). Cifras orientativas."}}, "lo_que_viene": {"tag": "Prospectiva", "titulo": "Lo que viene no son herramientas nuevas. Son preguntas nuevas.", "intro": "La IA de dentro de dos años no será más potente en lo obvio. Será **más incómoda en lo importante**. No cambia qué botón pulsas: cambia el suelo que pisas. Quién posee el conocimiento, quién responde cuando algo falla, y de dónde saldrán las ideas nuevas cuando todos beban del mismo pozo.", "reflexiones": [{"titulo": "El conocimiento que no se indexa, no existe.", "texto": "Un estudio acumula décadas de criterio: decisiones, errores, proveedores. Mientras eso viva en la cabeza de los socios, una IA genérica te gana en velocidad. La ventaja de mañana no es *usar* IA: es **entrenarla con lo que solo tú sabes**. Tu archivo pasa de memoria a **activo estratégico**.", "fuente": "Zaha Hadid Architects · equipo ZHA CODE"}, {"titulo": "Lo caro dejará de ser la imagen. Será que sea construible.", "texto": "Una IA propone vidrio curvo con la misma facilidad que recto. No te avisa de que cuesta **diez veces más**. La frontera se mueve de *bonito* a *verdadero*: herramientas que respetan estructura, presupuesto y normativa. El que no lo calcula dentro de su flujo, no entra al concurso.", "fuente": "Hypar · Finch3D · regla de carbono de Róterdam"}, {"titulo": "Cuando el promedio es gratis, lo escaso es la desviación.", "texto": "Generar una imagen «de buen gusto» cuesta segundos. Lo que la IA **no puede promediar** es el contexto local, el presupuesto real, la contradicción de este cliente. El valor se muda ahí: a **lo idiosincrásico, lo situado, lo que no está en ningún dataset**.", "fuente": "Jonathan Oliver, Building Design (2025)"}, {"titulo": "El pozo del que bebíamos se llena de nuestro propio reflejo.", "texto": "Un estudio en *Nature* demostró que una IA entrenada con lo que genera otra IA **colapsa**: pierde lo raro, lo local, y se hunde en el promedio. Pinterest e Instagram se llenan de imágenes de IA que luego entrenan a la IA. **¿De dónde saldrán las referencias nuevas?** De quien conserve acceso a lo no digitalizado.", "fuente": "Shumailov et al., Nature (2024) · model collapse"}, {"titulo": "La responsabilidad no se delega en el algoritmo.", "texto": "Los agentes pronto ejecutarán flujos enteros. Ganas velocidad. **No cedes responsabilidad.** El AIA lo dice claro: tú estampas los planos, el cliente confía en tu juicio. El director de orquesta solo sirve si entiende la música, no solo el tempo.", "fuente": "AIA · EU AI Act"}, {"titulo": "La transparencia deja de ser ética y pasa a ser infraestructura.", "texto": "Ya se construyen los estándares para trazar qué hizo una IA y con qué datos. Desde **agosto de 2026 el EU AI Act obliga a declararlo**. En dos años, un proyecto sin trazabilidad tendrá un problema de confianza. Ser claro no será confesar debilidad: será **el nuevo certificado de calidad**.", "fuente": "C2PA · SynthID · EU AI Act, art. 50"}, {"titulo": "El render deja de ser el entregable. Lo siguiente es el espacio simulado.", "texto": "El precio de un render ha caído de 500 € a 15 € en tres años. Ese entregable ya no diferencia. El salto: **el espacio mismo, habitable antes de existir**. Cómo lo cruza un flujo de personas, cómo lo vive alguien con movilidad reducida. El estudio que lo entienda antes de construir no vende renders: vende **certeza**.", "fuente": "World models · NVIDIA Cosmos"}, {"titulo": "Lo próximo no es verse bien: es rendir.", "texto": "Energía, confort térmico, luz natural a lo largo del año, huella de carbono. La IA empieza a **simular cómo se comporta un espacio**, no solo cómo se ve. El render vendía la imagen; lo que viene mide el **rendimiento** — y cada vez más clientes y normativas lo van a exigir.", "fuente": "análisis energético y de carbono asistido por IA"}], "cierre": "No todo lo que viene es deseable. Ni viable. Ni humano. Parte del oficio será decir que no.", "frase_final": "El futuro no premia a quien adopta todo. Premia a quien elige bien."}, "kit_herramientas": {"tag": "Apéndice", "titulo": "Kit de herramientas", "subtitulo": "Todas las herramientas que aparecen en la clase, con para qué sirve cada una y cuándo usarla.", "intro": "Las herramientas cambian cada mes. Esta lista es una foto de hoy: **quédate con la función, no con el nombre**. Están agrupadas por para qué sirven, no por marca.", "categorias": [{"nombre": "Asistentes (LLM)", "tools": [{"nombre": "Claude", "que_es": "Asistente de texto largo, documentos y criterio. Base de Skills, Projects y Claude Code.", "cuando": "Redactar, analizar, comparar, decidir, construir tus propias herramientas.", "enlace": "https://claude.ai"}, {"nombre": "ChatGPT", "que_es": "Asistente versátil con visión. Admite abrir con el prompt ya escrito.", "cuando": "Uso general, análisis de imágenes, tareas rápidas del día a día.", "enlace": "https://chatgpt.com"}, {"nombre": "Gemini", "que_es": "Asistente multimodal de Google. Incluye Nano Banana para generar y editar imagen.", "cuando": "Cuando quieres texto + imagen en la misma herramienta.", "enlace": "https://gemini.google.com"}]}, {"nombre": "Investigación y conocimiento", "tools": [{"nombre": "Perplexity", "que_es": "Buscador con IA que cita sus fuentes.", "cuando": "Investigar referentes, precedentes, normativa, competencia — con enlaces verificables.", "enlace": "https://perplexity.ai"}, {"nombre": "NotebookLM", "que_es": "Sintetiza tus propios PDFs y fuentes; genera resúmenes y audio.", "cuando": "Digerir documentación técnica, normativa o el archivo del estudio.", "enlace": "https://notebooklm.google.com"}]}, {"nombre": "Ideación y marca", "tools": [{"nombre": "Ideamap", "que_es": "Mapa de ideas / brainstorming estructurado con IA.", "cuando": "Abrir el campo conceptual antes de decidir una dirección.", "enlace": "https://ideamap.ai"}, {"nombre": "Cosmos", "que_es": "Descubrimiento y curación visual de referentes.", "cuando": "Construir tu banco de referencias con criterio.", "enlace": "https://www.cosmos.so"}, {"nombre": "Namelix", "que_es": "Generador de nombres de marca bajo restricciones.", "cuando": "Nombrar un proyecto, un local o el propio estudio.", "enlace": "https://namelix.com"}, {"nombre": "Pomelli", "que_es": "Herramienta de marca y marketing de Google (piezas a partir de tu marca).", "cuando": "Generar campañas y piezas coherentes con una identidad.", "enlace": "https://labs.google.com/pomelli"}, {"nombre": "Writer", "que_es": "IA de escritura orientada a la voz de marca.", "cuando": "Fijar y aplicar el tono del estudio en textos.", "enlace": "https://writer.com"}]}, {"nombre": "Imagen y sistema visual", "tools": [{"nombre": "Nano Banana (Gemini)", "que_es": "Generación y edición de imagen por conversación, dentro de Gemini.", "cuando": "Atmósferas, transferencia de estilo, retoque — sin sintaxis rara.", "enlace": "https://gemini.google.com"}, {"nombre": "Mixboard", "que_es": "Moodboards con IA (Google Labs).", "cuando": "Ensamblar un moodboard coherente desde lenguaje sensorial.", "enlace": "https://labs.google/mixboard"}, {"nombre": "Krea", "que_es": "Iteración visual rápida en tiempo real.", "cuando": "Variar y mejorar imágenes ya definidas: luz, color, estilo.", "enlace": "https://krea.ai"}, {"nombre": "Recraft", "que_es": "Gráficos vectoriales, logos e ilustración con estilo consistente.", "cuando": "Sistema visual de marca y piezas gráficas.", "enlace": "https://recraft.ai"}, {"nombre": "Leonardo", "que_es": "Generación de imagen con plantillas controladas (Blueprints).", "cuando": "Imágenes con estructura y control de composición.", "enlace": "https://leonardo.ai"}]}, {"nombre": "Arquitectura: planta, 3D y render", "tools": [{"nombre": "Snaptrude", "que_es": "De investigación a programa a modelo BIM, integrado.", "cuando": "Pasar del análisis del sitio al modelo, en un mismo flujo.", "enlace": "https://www.snaptrude.com"}, {"nombre": "Floor-plan.ai", "que_es": "Generación de plantas a partir del programa.", "cuando": "Arrancar la zonificación con varias opciones.", "enlace": "https://floor-plan.ai"}, {"nombre": "Planner 5D", "que_es": "Plano a 3D, accesible.", "cuando": "Probar rápido una distribución en 3D.", "enlace": "https://planner5d.com"}, {"nombre": "Coohom", "que_es": "Plano a 3D y walkthrough, más completo.", "cuando": "Recorrido 3D de una distribución.", "enlace": "https://www.coohom.com"}, {"nombre": "BLMN", "que_es": "Boceto o planta a primera imagen espacial.", "cuando": "Convertir un croquis en la primera atmósfera del espacio.", "enlace": "https://blmn.ai"}, {"nombre": "LookX.ai", "que_es": "Render arquitectónico desde boceto, entrenado en arquitectura.", "cuando": "Render fiel a la geometría del proyecto.", "enlace": "https://lookx.ai"}, {"nombre": "ArchiVinci", "que_es": "Render arquitectónico desde boceto (opcional).", "cuando": "Alternativa para render desde croquis.", "enlace": "https://www.archivinci.com"}, {"nombre": "Rendair", "que_es": "Render arquitectónico controlado / evidence board.", "cuando": "Consolidar el render final con control de la escena.", "enlace": "https://rendair.ai"}]}, {"nombre": "Vídeo y movimiento", "tools": [{"nombre": "Google Flow", "enlace": "https://labs.google/fx/tools/flow", "que_es": "El estudio de imagen y vídeo con IA de Google (Veo). Combina referencias (sujeto + escena + estilo), genera imágenes y anima clips cortos.", "cuando": "Para dar vida a un concepto o montar un reel/pieza de marketing rápida."}, {"nombre": "Runway", "que_es": "Generación y edición de vídeo con IA.", "cuando": "Vídeos cortos y transiciones de proyecto.", "enlace": "https://runwayml.com"}, {"nombre": "Kling", "que_es": "Generación de vídeo con IA.", "cuando": "Secuencias y movimiento a partir de imagen o texto.", "enlace": "https://klingai.com"}, {"nombre": "Higgsfield", "que_es": "Vídeo con IA y control de movimientos de cámara.", "cuando": "Recorridos cinematográficos del espacio.", "enlace": "https://higgsfield.ai"}, {"nombre": "Pippit", "que_es": "Creación de contenido y vídeo de marketing (de CapCut).", "cuando": "Piezas de vídeo para redes.", "enlace": "https://www.pippit.ai"}]}, {"nombre": "Documentación, diseño y automatización", "tools": [{"nombre": "Descript", "que_es": "Edición de audio/vídeo por transcripción.", "cuando": "Transcribir reuniones y visitas de obra; generar actas y partes.", "enlace": "https://www.descript.com"}, {"nombre": "Canva", "que_es": "Diseño y maquetación con IA integrada.", "cuando": "Piezas gráficas, dossieres, redes.", "enlace": "https://www.canva.com"}, {"nombre": "Make", "que_es": "Automatización sin código (conecta apps y APIs).", "cuando": "Encadenar tareas: Drive → Claude → base de datos.", "enlace": "https://www.make.com"}, {"nombre": "Airtable", "que_es": "Base de datos flexible con IA.", "cuando": "Control de FF&E, incidencias, seguimiento.", "enlace": "https://airtable.com"}]}, {"nombre": "Captura y escaneo", "tools": [{"nombre": "Polycam", "que_es": "Escaneo 3D y fotogrametría desde el móvil.", "cuando": "As-built y medición de apoyo antes de fabricar.", "enlace": "https://poly.cam"}]}], "glosario": {"titulo": "Glosario mínimo", "subtitulo": "Veinte términos para no perderte. Uno por línea.", "terminos": [{"t": "LLM", "d": "Modelo de lenguaje: la IA que escribe (Claude, ChatGPT, Gemini)."}, {"t": "Token", "d": "El trozo en que la IA parte el texto para leerlo. No lee palabras exactas: tokens."}, {"t": "Ventana de contexto", "d": "Lo que la IA puede ver a la vez. Fuera de ahí, olvida."}, {"t": "Prompt", "d": "La instrucción que le das. Cuanto más claro el encargo, mejor la respuesta."}, {"t": "Alucinación", "d": "Cuando la IA inventa con seguridad. Suena cierto aunque no lo sea."}, {"t": "Multimodal", "d": "Que entiende texto, imagen, audio y planos, no solo texto."}, {"t": "Visión", "d": "Su capacidad de mirar imágenes: fotos de obra, planos, renders."}, {"t": "Grounding", "d": "Darle material real (pliego, normativa, tus memorias) para que no invente."}, {"t": "Few-shot", "d": "Enseñarle con ejemplos: hazlo como estos dos."}, {"t": "Temperatura", "d": "Cuánto se arriesga: alta = más creativa y variable; baja = más predecible."}, {"t": "Entrenamiento / inferencia", "d": "Aprendió una vez (entrenamiento); al usarla solo aplica lo aprendido (inferencia)."}, {"t": "Agente", "d": "IA que no solo responde: planifica, usa herramientas y ejecuta varios pasos."}, {"t": "Skill", "d": "Conocimiento del estudio empaquetado que la IA carga cuando toca."}, {"t": "RAG", "d": "Conectar la IA a tus documentos para que responda con ellos."}, {"t": "Fine-tuning", "d": "Reentrenar un modelo con tus datos para que hable como tú."}, {"t": "MCP", "d": "Protocolo que deja a un agente usar tus herramientas y datos."}, {"t": "Model collapse", "d": "Cuando la IA se entrena con lo que ella misma generó y degenera hacia el promedio."}, {"t": "C2PA", "d": "Estándar que marca qué se hizo con IA (procedencia)."}, {"t": "Render", "d": "Imagen fotorrealista del proyecto. Con IA casi gratis: por eso deja de diferenciar."}, {"t": "Prompt Canvas", "d": "La plantilla de esta clase: tarea, contexto, criterio, límites, formato, revisión."}]}}, "ejercicio_final": {"numero": "09", "tag": "Ejercicio final", "titulo": "Un caso de punta a punta", "subtitulo": "En grupos de 4, una hora: de una llamada de diez minutos con el cliente a una web que cuenta el proyecto.", "situacion": {"titulo": "La situación de partida", "texto": "Acabáis de colgar. El estudio ha tenido una **primera llamada de diez minutos** con el cliente sobre una reforma de 90 m² en Poblenou: la queréis cálida pero fácil de mantener, hay un labrador, una suegra que viene a dormir, teletrabajo y una galería con una luz que no se puede perder. Tenéis la **transcripción entera**. En una hora, id de esa llamada a una propuesta con imagen —y sabed defenderla.", "artefacto_ref": "ej-final", "nota": "La grabación transcrita (TXT). Descargadla y empezad por convertirla en un briefing."}, "formato": {"grupos": "Grupos de 4", "duracion": "~1 h + 3 min de pitch", "flujo": "Un portátil por grupo. En cada movimiento **conduce una persona distinta** (rota el teclado); el resto dicta y critica. Los prompts vienen dados y el material está descargable. Al final, enseñáis la web y contáis el recorrido en 3 minutos."}, "fases": [{"n": "1", "min": "8 min", "titulo": "El briefing", "texto": "Pegáis la transcripción de la llamada y sacáis un briefing con necesidades, contradicciones y preguntas pendientes.", "herramientas": "Claude o ChatGPT"}, {"n": "2", "min": "8 min", "titulo": "Research", "texto": "Reunís referencias (proyectos, materiales, normativa) y NotebookLM las sintetiza y responde a vuestras dudas, citando la fuente.", "herramientas": "NotebookLM"}, {"n": "3", "min": "12 min", "titulo": "Concepto + imagen", "texto": "Del briefing y el research, definís dos direcciones de atmósfera y generáis una imagen del concepto elegido.", "herramientas": "Nano Banana (Gemini) o Krea"}, {"n": "4", "min": "8 min", "titulo": "Presupuesto", "texto": "Estimáis partidas y honorarios. Truco: pasadle también **la imagen del concepto** a ChatGPT (visión) para que estime desde lo que ve —orientativo, no la verdad—.", "herramientas": "ChatGPT"}, {"n": "5", "min": "10 min", "titulo": "Contadlo fuera", "texto": "Un post de Instagram y un gancho de LinkedIn, más una imagen o un reel corto del concepto.", "herramientas": "ChatGPT / Gemini · Google Flow · Pomelli"}, {"n": "6", "min": "12 min", "titulo": "La web que lo cuenta", "texto": "Montáis una web/landing que cuenta el proyecto con vuestros textos y la imagen, y la publicáis con un clic.", "herramientas": "Lovable"}], "cierre": "No importa quién lo borde: lo que os lleváis es haber recorrido el oficio de punta a punta, con la IA de copiloto y el criterio en vuestras manos."}, "hilo": {"etiqueta": "Hilo conductor", "titulo": "El estudio que vamos a acompañar", "texto": "Durante toda la clase acompañamos a **un estudio de interiorismo** que recibe un encargo y lo lleva de punta a punta: una reforma integral de 90 m² en Poblenou. En cada ámbito verás **cómo lo resuelve el estudio** en esa fase, del primer contacto con el cliente hasta contarlo fuera.", "protagonista": "Un estudio de interiorismo · encargo de reforma en Poblenou (90 m²)", "fase_lbl": "Cómo lo resuelve el estudio, en esta fase", "fases": {"01": "El estudio recibe el primer contacto y ordena el caos en un briefing que revela hasta lo que el cliente no dijo.", "02": "Explora dos conceptos para el proyecto y decide con criterio cuál defender, no por gusto.", "03": "Cruza los presupuestos de los industriales y caza las partidas ocultas.", "04": "Documenta y comunica: redacta las actas y el email difícil cuando algo se tuerce en obra.", "05": "Prepara la licencia y el pre-chequeo normativo antes de tocar nada.", "06": "Presenta la propuesta y ensaya las objeciones del cliente antes de la reunión.", "07": "Gestiona el cambio de alcance que pide el cliente y calcula su impacto en horas, plazo y honorarios.", "08": "Convierte el proyecto terminado en contenido para varios canales."}}, "anexo_coste": {"numero": "10", "tag": "Anexo", "titulo": "Coste y ROI: ¿cuánto cuesta y cómo lo justifico?", "subtitulo": "Antes de montar nada, la pregunta del socio: **¿esto qué me cuesta al mes y cómo sé que sale a cuenta?**", "intro": "No hace falta gastar mucho para empezar. Lo caro no suele ser la herramienta: es el tiempo de aprenderla y la disciplina de revisar lo que devuelve.", "tabla": [{"concepto": "Suscripción individual (ChatGPT, Claude o Gemini)", "rango": "~20–25 €/mes por persona", "nota": "El punto de entrada. Una sola, bien usada, ya cambia el día a día."}, {"concepto": "Plan de equipo (Team)", "rango": "~25–35 €/usuario/mes", "nota": "Más control y privacidad de datos. Cuando ya lo usa el estudio entero."}, {"concepto": "API (pago por uso)", "rango": "céntimos por consulta", "nota": "Para maquinillos y automatizaciones. Un artefacto como la calculadora cuesta céntimos al día."}, {"concepto": "Imagen y vídeo (Krea, Flow…)", "rango": "~10–30 €/mes", "nota": "Plan aparte, según cuánto generes. Empieza por el plan bajo."}, {"concepto": "Automatización (Make)", "rango": "gratis → ~10–20 €/mes", "nota": "El plan gratuito da para empezar; se paga solo cuando escalas escenarios."}], "oculto": ["**El tiempo de aprender.** Las primeras semanas rindes menos, no más. Es inversión, no gasto.", "**Montar los artefactos.** Una skill o un maquinillo lleva un rato la primera vez; se amortiza a la décima.", "**Revisar y verificar.** La IA acelera, pero la supervisión humana cuesta horas y no es opcional."], "roi": ["No lo midas en abstracto (\"ahorra tiempo\"): ligalo a **una tarea concreta** —un briefing, unas actas, cruzar presupuestos— y cronométrala con y sin IA.", "Conéctalo a tu rentabilidad: usa la **calculadora del bloque 05** y la **skill de tarifas** para ver el ahorro en euros, no en sensación.", "Regla rápida: una suscripción de ~25 €/mes **se paga sola** si te ahorra algo más de **media hora** al mes. Casi siempre lo hace."], "regla": "Empieza con UNA suscripción, mide qué te ahorra en una tarea real, y solo escala lo que ya funciona. Primero el criterio, luego el gasto.", "nota": "Precios orientativos de 2026 y cambiantes: úsalos como orden de magnitud, no como tarifa. Verifica siempre el plan vigente."}}, "artefactos.json": {"1.1": {"reto": "Convertir mensajes sueltos de un cliente en un briefing estructurado, con contradicciones y preguntas pendientes.", "descripcion": "El hilo de WhatsApp que te manda la clienta antes de la primera reunión. Súbelo a la IA y pídele el brief     alto:  { label: 'Alto',  cls: 'chip-riesgo chip-riesgo--alto'  }
  };
  const ETIQUETAS_MADUREZ = {
    basico:     { label: 'Básico',     cls: 'chip-madurez' },
    intermedio: { label: 'Intermedio', cls: 'chip-madurez' },
    avanzado:   { label: 'Avanzado',   cls: 'chip-madurez' }
  };

  /* ---------- Utilidades ---------- */

  function extraerPrompt(texto) {
    const abre = texto.indexOf("'");
    const cierra = texto.lastIndexOf("'");
    if (abre === -1 || cierra === -1 || cierra - abre < 40) return null;
    const intro = texto.slice(0, abre).trim().replace(/[:\s]+$/, '');
    const prompt = texto.slice(abre + 1, cierra).trim();
    if (prompt.length < 60) return null;
    return { intro, prompt };
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Convierte **texto** a <strong>texto</strong> y *texto* a <em>texto</em>.
  // Se aplica sobre texto ya escapado, así que las etiquetas resultantes son seguras.
  function md(text) {
    if (!text) return '';
    let s = escapeHtml(text);
    s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/(^|[^*])\*([^*]+)\*(?!\*)/g, '$1<em>$2</em>');
    return s;
  }

  // Tarjeta de vídeo con carga diferida (click → iframe). Soporta recorte (start/end).
  function videoCard(v) {
    if (!v) return '';
    const attrs = [`data-yt="${escapeHtml(v.yt)}"`];
    if (v.start != null) attrs.push(`data-start="${v.start}"`);
    if (v.end != null) attrs.push(`data-end="${v.end}"`);
    const recorte = (v.start != null || v.end != null) ? ' · fragmento' : '';
    return `
      <div class="video-card sub-bloque-video" ${attrs.join(' ')}>
        <button class="video-card-play" type="button" aria-label="Reproducir vídeo">
          <span class="video-card-tri" aria-hidden="true">▶</span>
        </button>
        <div class="video-card-meta">
          <span class="video-card-tag">Vídeo · ${escapeHtml(v.dur || '')}${v.autor ? ' · ' + escapeHtml(v.autor) : ''}${recorte}</span>
          <p class="video-card-titulo">${escapeHtml(v.titulo)}</p>
          ${v.desc ? `<p class="video-card-desc">${escapeHtml(v.desc)}</p>` : ''}
        </div>
      </div>
    `;
  }

  function chipsCaso(caso) {

      render();
      initScrollSpy();
      initSidebarToggle();
      initReveal();
      initCursor();
    } catch (err) {
      console.error('Error cargando JSONs:', err);
      gridAmbitos.innerHTML =
        `<p style="color:var(--acento); grid-column:1/-1;">
          No se ha podido cargar el contenido. Sirve la carpeta desde un servidor local
          (por ejemplo <code>python3 -m http.server</code>) o despliega en Netlify/Vercel.
        </p>`;
    }
  }

  function initSidebarToggle() {
    sidebarToggle?.addEventListener('click', () => {

      // Si estamos dentro de un ámbito/biblioteca, el menú vuelve a la portada y salta a la sección.
      const a = e.target.closest('a[data-target]');

  function initReveal() {
    // Marca todos los elementos revelables tras el render.
    const selectors = [
      '.hero-etiqueta', '.hero-titulo', '.hero-subtitulo', '.hero-claim',
      '.hero-subclaim', '.hero-texto', '.hero-cifras', '.hero-ponente',
      '.aviso-general',
      '.sec-tag', '.sec-titulo', '.sec-subtitulo',
      '.sub-titulo', '.evolucion-lead', '.evolucion-p', '.clave', '.claves-cierre',
      '.video-card', '.mito',
      '.usan-dato', '.usan-caso', '.noticia', '.usan-cierre',
      '.tarjeta-estado',
      '.sector-intro', '.reto', '.sector-cita', '.sector-frase',
      '.lqv-intro', '.lqv-reflexion', '.lqv-cierre',
      '.pg-tesis', '.pg-frase-clave', '.pg-reto', '.pg-nivel-header', '.pg-scaffold', '.pg-drill', '.pg-canvas', '.pg-cierre',
      '.escalera-nivel', '.escalera-cierre', '.diagnostico',
      '.puente-titulo', '.puente-texto', '.puente-frase',
      '.card-ambito',
      '.arte-comparativo', '.arte-claim', '.arte-tarjeta', '.arte-metodologia',
      '.esp-preguntas', '.esp-principio', '.esp-cierre', '.no-habitar-titulo', '.no-habitar-lista li',
      '.epilogo-titulo', '.epilogo-parrafos p', '.epilogo-contrastes .cierre-contraste', '.epilogo-frase',
      '.kit-cat-titulo', '.kit-tool',
      '.ef-situacion', '.ef-objetivo', '.ef-bloque', '.ef-flujo', '.ef-cierre',
      '.hilo-intro', '.ac-tabla', '.ac-lista', '.ac-regla'
    ];
    selectors.forEach(sel => {
      $$(sel).forEach((el, i) => {
        el.setAttribute('data-reveal', '');
        if (i % 4 && i < 20) el.setAttribute('data-reveal-delay', String(i % 4));
      });
    });

    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          en.target.classList.add('is-visible');
          io.unobserve(en.target);
        }
      });
    }, { threshold: 0.08, rootMargin: '0px 0px -60px 0px' });

    $$('[data-reveal]').forEach(el => io.observe(el));
  }

  function initCursor() {
    if (window.matchMedia('(pointer: coarse)').matches) return;
    const dot = document.createElement('div');
    dot.className = 'cursor-dot';
    document.body.appendChild(dot);

    let raf;
    document.addEventListener('mousemove', (e) => {
      if (raf) cancelAnimationFrame(raf);
      raf = requestAnimationFrame(() => {
        dot.style.transform = `translate(${e.clientX}px, ${e.clientY}px) translate(-50%, -50%)`;
        dot.classList.add('visible');
      });
    });
    document.addEventListener('mouseleave', () => dot.classList.remove('visible'));

    // Crece sobre elementos interactivos
    const grow = 'a, button, .card-ambito, .card-caso, .pg-drill summary, details summary';
    document.addEventListener('mouseover', (e) => {
      if (e.target.closest(grow)) dot.classList.add('grande');
    });
    document.addEventListener('mouseout', (e) => {
      if (e.target.closest(grow)) dot.classList.remove('grande');
    });
  }

  function initScrollSpy() {
    const items = narr.hero.navegacion.filter(n => !n.disabled && document.getElementById(n.id));
    const sections = items.map(n => document.getElementById(n.id));
    const links = items.map(n => sidebarNav.querySelector(`a[data-target="${n.id}"]`));

    if (!sections.length) return;

    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        if (en.isIntersecting) {
          const idx = sections.indexOf(en.target);
          links.forEach((l, i) => l?.classList.toggle('active', i === idx));
        }
      });
    }, { rootMargin: '-40% 0px -55% 0px', threshold: 0 });

    sections.forEach(s => io.observe(s));
  }

  function renderDrill(d) {
    const bloques = [];

    if (d.texto) {
      bloques.push(`<p class="pg-drill-etiqueta">Contexto</p><p style="margin:0 0 16px; font-size:15px; line-height:1.6;">${md(d.texto)}</p>`);
    }
    if (d.prompt_malo) {
      bloques.push(`<p class="pg-drill-etiqueta">Prompt malo</p><div class="pg-drill-antes">${escapeHtml(d.prompt_malo)}</div>`);
    }
    if (d.que_falta) {
      bloques.push(`<p class="pg-drill-etiqueta">Lo que no dice</p><ul class="pg-drill-lista">${d.que_falta.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>`);
    }
    if (d.version_mejorada) {
      bloques.push(`<p class="pg-drill-etiqueta">Versión mejorada</p><div class="pg-drill-despues">${escapeHtml(d.version_mejorada)}</div>`);
    }
    if (d.verbos_debiles && d.verbos_fuertes) {
      bloques.push(`
        <div class="pg-drill-verbos">
          <div class="grupo grupo-debil">
            <p>Verbos que debilitan</p>
            <div class="verbos">${d.verbos_debiles.map(v => `<span class="verbo">${escapeHtml(v)}</span>`).join('')}</div>
          </div>
          <div class="grupo grupo-fuerte">
            <p>Verbos que fortalecen</p>
            <div class="verbos">${d.verbos_fuertes.map(v => `<span class="verbo">${escapeHtml(v)}</span>`).join('')}</div>
          </div>
        </div>
      `);
    }
    if (d.antes) {
      bloques.push(`<p class="pg-drill-etiqueta">Antes</p><div class="pg-drill-antes">${escapeHtml(d.antes)}</div>`);
    }
    if (d.despues) {
      bloques.push(`<p class="pg-drill-etiqueta">Después</p><div class="pg-drill-despues">${escapeHtml(d.despues)}</div>`);
    }
    if (d.cliches_a_evitar) {
      bloques.push(`
        <p class="pg-drill-etiqueta">Clichés a tachar</p>
        <div class="pg-drill-cliches">${d.cliches_a_evitar.map(c => `<span class="cliche">${escapeHtml(c)}</span>`).join('')}</div>
      `);

  function renderDiagnostico(dg, niveles) {
    const cont = $('#es-diagnostico');
    if (!cont) return;
    const preguntas = dg.preguntas.map((q, i) => `
      <div class="diag-preg" data-preg="${i}">
        <p class="diag-preg-txt"><span class="diag-preg-n">${i + 1}</span>${escapeHtml(q.p)}</p>
        <div class="diag-opciones">
          ${q.opciones.map((o, j) => `<button type="button" class="diag-opcion" data-nivel="${o.n}" data-op="${j}">${escapeHtml(o.t)}</button>`).join('')}
        </div>
      </div>`).join('');
    cont.innerHTML = `
      <div class="diagnostico">
        <p class="diag-kicker">${escapeHtml(dg.kicker)}</p>
        <h3 class="diag-titulo">${escapeHtml(dg.titulo)}</h3>
        <p class="diag-intro">${escapeHtml(dg.intro)}</p>
        <div class="diag-preguntas">${preguntas}</div>
        <div class="diag-acciones">
          <button type="button" class="diag-cta" id="diag-cta" disabled>${escapeHtml(dg.cta)}</button>
          <span class="diag-progreso" id="diag-progreso">0 / ${dg.preguntas.length}</span>
        </div>
        <div class="diag-resultado" id="diag-resultado" hidden></div>
      </div>`;

    const total = dg.preguntas.length;
    const seleccion = {};

    cont.querySelectorAll('.diag-opcion').forEach(btn => {
      btn.addEventListener('click', () => {
        const grupo = btn.closest('.diag-preg');
        const idx = grupo.dataset.preg;
        grupo.querySelectorAll('.diag-opcion').forEach(b => b.classList.remove('elegida'));
        btn.classList.add('elegida');
        seleccion[idx] = parseInt(btn.dataset.nivel, 10);
        const n = Object.keys(seleccion).length;
        $('#diag-progreso').textContent = `${n} / ${total}`;
        $('#diag-cta').disabled = n < total;
      });
    });

    $('#diag-cta').addEventListener('click', () => {
      const valores = Object.values(seleccion);
      const media = valores.reduce((a, b) => a + b, 0) / valores.length;
      const nivel = Math.min(5, Math.max(1, Math.round(media)));
      const info = niveles.find(n => String(n.numero) === String(nivel)) || {};
      const pasos = (dg.pasos_por_nivel[String(nivel)] || []);
      const res = $('#diag-resultado');
      res.hidden = false;
      res.innerHTML = `
        <div class="diag-res-head">
          <span class="diag-res-num">${nivel}</span>
          <div>
            <p class="diag-res-lbl">${escapeHtml(dg.resultado_titulo)}</p>
            <h4 class="diag-res-nombre">${escapeHtml(info.nombre || '')}</h4>
            <p class="diag-res-sub">${escapeHtml(info.subtitulo || '')}</p>
          </div>
        </div>
        <p class="diag-res-pasos-lbl">${escapeHtml(dg.pasos_titulo)}</p>
        <ol class="diag-res-pasos">${pasos.map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ol>
        <p class="diag-nota">${escapeHtml(dg.nota)}</p>
        <button type="button" class="diag-reiniciar" id="diag-reiniciar">${escapeHtml(dg.reiniciar)}</button>`;
      res.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      $('#diag-reiniciar').addEventListener('click', () => {
        cont.querySelectorAll('.diag-opcion').forEach(b => b.classList.remove('elegida'));
        for (const k in seleccion) delete seleccion[k];
        $('#diag-progreso').textContent = `0 / ${total}`;
        $('#diag-cta').disabled = true;
        res.hidden = true; res.innerHTML = '';
        cont.querySelector('.diagnostico').scrollIntoView({ block: 'start', behavior: 'smooth' });
      });
    });
  }

  function renderArtefactoCard(a) {
    // Estructura enriquecida: soporta herramienta, que_es, como_funciona y conecta,
    // manteniendo compatibilidad con el formato antiguo (que_hace_ia).
    const herramienta = a.herramienta
      ? `<span class="arte-herramienta">${escapeHtml(a.herramienta)}</span>` : '';
    const queEs = a.que_es
      ? `<p class="arte-quees">${md(a.que_es)}</p>` : '';
    const comoFunciona = a.como_funciona
      ? `<div class="arte-como">
           <p class="arte-col-titulo">Cómo funciona</p>
           <ol class="arte-pasos">${a.como_funciona.map(p => `<li>${md(p)}</li>`).join('')}</ol>
         </div>`
      : '';
    // Columnas: si hay como_funciona, mostramos Input | Devuelve; si no, el formato antiguo.
    const grid = a.como_funciona
      ? `<div class="arte-grid arte-grid--2">
           <div>
             <p class="arte-col-titulo">Qué necesita</p>
             <ul class="arte-col-lista">${a.input.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>
           </div>
           <div>
             <p class="arte-col-titulo">Qué devuelve</p>
             <ul class="arte-col-lista">${a.output.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>
           </div>
         </div>`
      : `<div class="arte-grid">
           <div>
             <p class="arte-col-titulo">Input</p>
             <ul class="arte-col-lista">${a.input.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>
           </div>
           <div>
             <p class="arte-col-titulo">Qué hace la IA</p>
             <ul class="arte-col-lista">${(a.que_hace_ia || []).map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>
           </div>
           <div>
             <p class="arte-col-titulo">Output</p>
             <ul class="arte-col-lista">${a.output.map(x => `<li>${escapeHtml(x)}</li>`).join('')}</ul>
           </div>
         </div>`;
    const conecta = a.conecta
      ? `<p class="arte-conecta"><span class="arte-conecta-lbl">Conecta con el sistema</span>${md(a.conecta)}</p>` : '';

    const dlBtn = (key, nota) => {
      const x = key && artefactos[key];
      return x
        ? `<button class="artefacto-cta arte-descarga" type="button" data-descargar-artefacto="${key}">
             <span class="artefacto-cta-icono" aria-hidden="true">↓</span>
             <span class="artefacto-cta-texto">
               <span class="artefacto-cta-titulo">Descargar ${escapeHtml(x.nombre)}</span>
               <span class="artefacto-cta-sub">${escapeHtml(nota || 'Ejemplo para probarlo con la IA.')}</span>
             </span>
           </button>`
        : '';
    };
    const descarga = dlBtn(a.descargable, a.descarga_nota) + dlBtn(a.descargable_2, a.descarga_nota_2);

    return `
      <article class="arte-tarjeta">
        <div class="arte-num">${escapeHtml(a.numero.padStart(2, '0'))}</div>
        ${a.nivel ? `<p class="arte-nivel">${escapeHtml(a.nivel)}</p>` : ''}
        <div class="arte-head">
          <h3 class="arte-titulo">${escapeHtml(a.titulo)}</h3>
          ${herramienta}
        </div>
        <p class="arte-sub">${escapeHtml(a.subtitulo)}</p>
        ${queEs}
        ${a.video ? videoCard(a.video) : ''}

        <p class="arte-col-titulo arte-lbl-problema">El problema</p>
        <p class="arte-problema">${md(a.problema)}</p>

        ${comoFunciona}
        ${grid}
        ${conecta}
        ${descarga}

        <div class="arte-abajo">
          <div class="card">
            <span class="lbl">La idea de fondo</span>
            ${escapeHtml(a.aprendizaje)}
          </div>
          <div class="card">
            <span class="lbl">En acción</span>
            ${escapeHtml(a.demo)}
          </div>
        </div>

        <p class="arte-frase">${escapeHtml(a.frase)}</p>
      </article>
    `;
  }
